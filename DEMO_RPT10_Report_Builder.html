<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RPT-10 Report Builder · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.tb-t{font-size:11px;font-weight:700;color:var(--sub);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.body{flex:1;overflow:hidden;display:grid;grid-template-columns:296px 1fr;}
.cfg{background:#fff;border-right:1px solid var(--bd);overflow-y:auto;padding:14px;}
.cfg-sec{margin-bottom:16px;}
.cfg-sec h4{font-size:10px;font-weight:800;color:var(--pp);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.cfg-sec h4 .n{width:16px;height:16px;border-radius:50%;background:var(--pp);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;}
select{width:100%;padding:6px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.chk{display:flex;align-items:center;gap:7px;padding:5px 8px;border:1px solid var(--bd);border-radius:5px;margin-bottom:5px;cursor:pointer;font-size:11.5px;}
.chk:hover{background:#f0fdf4;}
.chk.on{background:#ecfdf5;border-color:var(--pp);font-weight:700;}
.chk .box{width:15px;height:15px;border:1.5px solid var(--bd);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;}
.chk.on .box{background:var(--pp);border-color:var(--pp);}
.viz-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.viz{border:1px solid var(--bd);border-radius:6px;padding:8px 4px;text-align:center;cursor:pointer;font-size:10px;font-weight:700;}
.viz:hover{background:#f0fdf4;}
.viz.on{background:var(--pp);color:#fff;border-color:var(--pp);}
.viz .vi{font-size:17px;display:block;margin-bottom:2px;}
.prev{overflow-y:auto;padding:20px 24px;}
.prev-paper{background:#fff;border:1px solid var(--bd);border-radius:8px;min-height:calc(100% - 4px);padding:22px 26px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.pp-head{border-bottom:2px solid var(--pp);padding-bottom:12px;margin-bottom:18px;}
.pp-head h2{font-size:18px;font-weight:900;}
.pp-head .pm{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace;margin-top:4px;}
.summ{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.summ .sc{border:1px solid var(--bd);border-radius:7px;padding:9px 14px;}
.summ .sc .sv{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--pp);}
.summ .sc .sl{font-size:9px;color:var(--sub);}
.chart{display:flex;align-items:flex-end;gap:10px;height:200px;border-bottom:2px solid var(--bd);padding:0 6px;margin-bottom:6px;}
.cbar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.cbar .bb{width:60%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,#34d399,#059669);}
.cbar .bv{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--sub);}
.cbar .bl{font-size:9px;color:var(--sub);text-align:center;}
.lwrap{position:relative;height:200px;border-bottom:2px solid var(--bd);margin-bottom:6px;}
.pie-wrap{display:flex;align-items:center;gap:24px;padding:10px 0;}
.pie{width:170px;height:170px;border-radius:50%;flex-shrink:0;}
.pie-leg .pl{display:flex;align-items:center;gap:8px;font-size:11px;padding:5px 0;}
.pie-leg .pl i{width:12px;height:12px;border-radius:3px;}
.pie-leg .pl .pv{margin-left:auto;font-weight:800;font-family:'JetBrains Mono',monospace;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 10px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);}
thead th.c{text-align:right;}
tbody td{padding:8px 10px;border-bottom:1px solid #eef1f5;}
tbody td.c{text-align:right;font-family:'JetBrains Mono',monospace;}
tfoot td{padding:9px 10px;background:#f0fdf4;font-weight:800;border-top:2px solid var(--pp);}
tfoot td.c{text-align:right;font-family:'JetBrains Mono',monospace;}
.axis-cap{text-align:center;font-size:9px;color:#9ca3af;margin-bottom:14px;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">RPT-10</div>
  <div class="sh-tt"><div class="sh-en">Report Builder</div><div class="sh-ko">리포트 빌더 — 사용자 정의 분석 리포트 작성</div></div>
  <span class="sh-tag">/rpt/builder</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <span class="tb-t">🧩 데이터 소스 · 항목 · 시각화를 선택하면 오른쪽에 리포트가 즉시 생성됩니다</span>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-s" onclick="resetAll()">↺ 초기화</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
    <button class="btn btn-p" onclick="saveRpt()">💾 리포트 저장</button>
  </div>
</div>
<div class="body">
  <div class="cfg">
    <div class="cfg-sec">
      <h4><span class="n">1</span>데이터 소스</h4>
      <select id="cSource" onchange="changeSource()"></select>
    </div>
    <div class="cfg-sec">
      <h4><span class="n">2</span>그룹 기준 (행)</h4>
      <select id="cDim" onchange="build()"></select>
    </div>
    <div class="cfg-sec">
      <h4><span class="n">3</span>측정 항목</h4>
      <div id="cMeasures"></div>
    </div>
    <div class="cfg-sec">
      <h4><span class="n">4</span>기간 필터</h4>
      <select id="cPeriod" onchange="build()">
        <option>2026년 5월</option><option>2026 Q2</option><option>2026 YTD</option></select>
    </div>
    <div class="cfg-sec">
      <h4><span class="n">5</span>시각화 유형</h4>
      <div class="viz-grid" id="cViz">
        <div class="viz on" data-v="table" onclick="pickViz('table')"><span class="vi">▦</span>테이블</div>
        <div class="viz" data-v="bar" onclick="pickViz('bar')"><span class="vi">▮</span>막대</div>
        <div class="viz" data-v="line" onclick="pickViz('line')"><span class="vi">📈</span>꺾은선</div>
        <div class="viz" data-v="pie" onclick="pickViz('pie')"><span class="vi">◕</span>파이</div>
      </div>
    </div>
  </div>
  <div class="prev">
    <div class="prev-paper">
      <div class="pp-head"><h2 id="ppTitle">리포트</h2><div class="pm" id="ppMeta"></div></div>
      <div class="summ" id="ppSumm"></div>
      <div id="ppBody"></div>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var PIECOL=['#059669','#2563eb','#f59e0b','#8b5cf6','#0891b2','#dc2626','#65a30d','#ec4899'];
/* sources: each has dims (group options), measures, rows */
var SOURCES={
 '생산 실적':{
   dims:['라인','일자','교대','품목'],
   measures:[{k:'qty',nm:'생산량',u:'EA'},{k:'good',nm:'양품 수',u:'EA'},{k:'def',nm:'불량 수',u:'EA'}],
   rows:[
    {라인:'INJ-01',일자:'05-18',교대:'주간',품목:'도어트림',qty:612,good:604,def:8},
    {라인:'INJ-01',일자:'05-19',교대:'야간',품목:'도어트림',qty:498,good:492,def:6},
    {라인:'INJ-02',일자:'05-18',교대:'주간',품목:'몰딩',qty:720,good:706,def:14},
    {라인:'INJ-02',일자:'05-19',교대:'야간',품목:'그릴',qty:602,good:591,def:11},
    {라인:'ASSY-01',일자:'05-18',교대:'주간',품목:'콘솔',qty:441,good:436,def:5},
    {라인:'ASSY-01',일자:'05-19',교대:'야간',품목:'범퍼',qty:392,good:388,def:4},
    {라인:'PNT-01',일자:'05-18',교대:'주간',품목:'범퍼',qty:352,good:343,def:9},
    {라인:'PNT-01',일자:'05-19',교대:'야간',품목:'그릴',qty:298,good:291,def:7}]
 },
 '품질 검사':{
   dims:['공정','불량유형','검사원'],
   measures:[{k:'insp',nm:'검사 수',u:'건'},{k:'pass',nm:'합격',u:'건'},{k:'fail',nm:'불합격',u:'건'}],
   rows:[
    {공정:'사출',불량유형:'미성형',검사원:'김검사',insp:1200,pass:1158,fail:42},
    {공정:'사출',불량유형:'버',검사원:'이검사',insp:980,pass:939,fail:41},
    {공정:'조립',불량유형:'스크래치',검사원:'박검사',insp:760,pass:734,fail:26},
    {공정:'도장',불량유형:'색상불량',검사원:'김검사',insp:540,pass:519,fail:21},
    {공정:'검사',불량유형:'치수불량',검사원:'이검사',insp:430,pass:412,fail:18}]
 },
 '출하 실적':{
   dims:['거래선','차수','품목'],
   measures:[{k:'qty',nm:'출하량',u:'EA'},{k:'amt',nm:'출하금액',u:'백만'}],
   rows:[
    {거래선:'SAV',차수:'1차',품목:'도어트림',qty:560,amt:13.6},
    {거래선:'SAV',차수:'2차',품목:'몰딩',qty:380,amt:13.8},
    {거래선:'SAV',차수:'3차',품목:'범퍼',qty:300,amt:12.0},
    {거래선:'GEO',차수:'1차',품목:'콘솔어퍼',qty:180,amt:9.0},
    {거래선:'GEO',차수:'2차',품목:'그릴',qty:320,amt:16.0},
    {거래선:'GEO',차수:'3차',품목:'범퍼',qty:250,amt:16.5}]
 }
};
var viz='table';
function curSrc(){return SOURCES[document.getElementById('cSource').value];}
function selMeasures(){
  return [].slice.call(document.querySelectorAll('#cMeasures .chk.on')).map(function(el){return el.dataset.k;});
}
function init(){
  document.getElementById('cSource').innerHTML=Object.keys(SOURCES).map(function(s){return '<option>'+s+'</option>';}).join('');
  changeSource();
}
function changeSource(){
  var src=curSrc();
  document.getElementById('cDim').innerHTML=src.dims.map(function(d){return '<option>'+d+'</option>';}).join('');
  document.getElementById('cMeasures').innerHTML=src.measures.map(function(m,i){
    return '<div class="chk'+(i<2?' on':'')+'" data-k="'+m.k+'" data-nm="'+m.nm+'" data-u="'+m.u+'" onclick="toggleM(this)">'+
      '<span class="box">✓</span><span>'+m.nm+' <span style="color:#9ca3af;font-weight:400;">('+m.u+')</span></span></div>';
  }).join('');
  build();
}
function toggleM(el){
  if(el.classList.contains('on')&&selMeasures().length<=1){
    toast('info','최소 1개 필요','측정 항목은 최소 1개 이상 선택해야 합니다.');return;}
  el.classList.toggle('on');build();
}
function pickViz(v){
  viz=v;
  [].slice.call(document.querySelectorAll('#cViz .viz')).forEach(function(el){el.classList.toggle('on',el.dataset.v===v);});
  build();
}
function build(){
  var src=curSrc();
  var dim=document.getElementById('cDim').value;
  var ms=selMeasures();
  var msDef=src.measures.filter(function(m){return ms.indexOf(m.k)>=0;});
  /* aggregate by dimension */
  var groups={};
  src.rows.forEach(function(r){
    var g=r[dim];
    if(!groups[g])groups[g]={};
    msDef.forEach(function(m){groups[g][m.k]=(groups[g][m.k]||0)+r[m.k];});
  });
  var keys=Object.keys(groups);
  document.getElementById('ppTitle').textContent=document.getElementById('cSource').value+' — '+dim+'별 '+
    msDef.map(function(m){return m.nm;}).join('·');
  document.getElementById('ppMeta').textContent='기간: '+document.getElementById('cPeriod').value+
    ' · 그룹: '+dim+' ('+keys.length+') · 측정: '+msDef.length+'개 · 시각화: '+vizName(viz)+
    ' · 생성 '+new Date().toTimeString().slice(0,5);
  /* summary cards: total per measure */
  document.getElementById('ppSumm').innerHTML=msDef.map(function(m){
    var t=keys.reduce(function(s,k){return s+groups[k][m.k];},0);
    return '<div class="sc"><div class="sv">'+Math.round(t).toLocaleString()+'</div>'+
      '<div class="sl">총 '+m.nm+' ('+m.u+')</div></div>';
  }).join('');
  /* body by viz */
  var body='';
  if(viz==='table')body=tableView(keys,groups,dim,msDef);
  else if(viz==='bar')body=barView(keys,groups,dim,msDef);
  else if(viz==='line')body=lineView(keys,groups,dim,msDef);
  else body=pieView(keys,groups,dim,msDef);
  document.getElementById('ppBody').innerHTML=body;
  window._rpt={keys:keys,groups:groups,dim:dim,ms:msDef};
}
function vizName(v){return {table:'테이블',bar:'막대',line:'꺾은선',pie:'파이'}[v];}
function tableView(keys,groups,dim,ms){
  var h='<table><thead><tr><th>'+dim+'</th>'+
    ms.map(function(m){return '<th class="c">'+m.nm+' ('+m.u+')</th>';}).join('')+'</tr></thead><tbody>';
  keys.forEach(function(k){
    h+='<tr><td><b>'+k+'</b></td>'+
      ms.map(function(m){return '<td class="c">'+Math.round(groups[k][m.k]).toLocaleString()+'</td>';}).join('')+'</tr>';
  });
  h+='</tbody><tfoot><tr><td>합계</td>'+
    ms.map(function(m){var t=keys.reduce(function(s,k){return s+groups[k][m.k];},0);
      return '<td class="c">'+Math.round(t).toLocaleString()+'</td>';}).join('')+'</tr></tfoot></table>';
  return h;
}
function barView(keys,groups,dim,ms){
  var m=ms[0];
  var max=Math.max.apply(null,keys.map(function(k){return groups[k][m.k];}))||1;
  var h='<div class="chart">';
  keys.forEach(function(k){
    var v=groups[k][m.k];
    h+='<div class="cbar"><div class="bv">'+Math.round(v).toLocaleString()+'</div>'+
      '<div class="bb" style="height:'+(v/max*165)+'px;"></div>'+
      '<div class="bl">'+k+'</div></div>';
  });
  h+='</div><div class="axis-cap">'+dim+'별 '+m.nm+' ('+m.u+')'+
    (ms.length>1?' · 막대 차트는 첫 번째 측정 항목을 표시합니다':'')+'</div>';
  return h;
}
function lineView(keys,groups,dim,ms){
  var m=ms[0];
  var vals=keys.map(function(k){return groups[k][m.k];});
  var max=Math.max.apply(null,vals)||1,min=Math.min.apply(null,vals);
  var n=keys.length;
  var pts=vals.map(function(v,i){
    return {x:(i+0.5)/n*100,y:175-(v-min)/(max-min||1)*150};
  });
  var h='<div class="lwrap">'+
    '<svg viewBox="0 0 100 200" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;">'+
    '<polyline points="'+pts.map(function(p){return p.x+','+p.y;}).join(' ')+
    '" fill="none" stroke="#059669" stroke-width="0.8"/></svg>';
  pts.forEach(function(p,i){
    h+='<div style="position:absolute;left:'+p.x+'%;top:'+p.y+'px;width:9px;height:9px;background:#059669;'+
      'border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);"></div>'+
      '<div style="position:absolute;left:'+p.x+'%;top:'+p.y+'px;transform:translate(-50%,-150%);'+
      'font-size:9px;font-weight:700;font-family:JetBrains Mono,monospace;color:#059669;">'+Math.round(vals[i]).toLocaleString()+'</div>'+
      '<div style="position:absolute;left:'+p.x+'%;bottom:-16px;transform:translateX(-50%);font-size:9px;color:#656d76;">'+keys[i]+'</div>';
  });
  h+='</div><div class="axis-cap" style="margin-top:20px;">'+dim+'별 '+m.nm+' ('+m.u+') 추이</div>';
  return h;
}
function pieView(keys,groups,dim,ms){
  var m=ms[0];
  var tot=keys.reduce(function(s,k){return s+groups[k][m.k];},0)||1;
  var seg='',acc=0;
  keys.forEach(function(k,i){
    var p=groups[k][m.k]/tot*100;
    seg+=PIECOL[i%PIECOL.length]+' '+acc+'% '+(acc+p)+'%,';acc+=p;
  });
  var h='<div class="pie-wrap"><div class="pie" style="background:conic-gradient('+seg.slice(0,-1)+')"></div>'+
    '<div class="pie-leg">';
  keys.forEach(function(k,i){
    var v=groups[k][m.k];
    h+='<div class="pl"><i style="background:'+PIECOL[i%PIECOL.length]+'"></i>'+k+
      '<span class="pv">'+Math.round(v).toLocaleString()+' · '+Math.round(v/tot*100)+'%</span></div>';
  });
  h+='</div></div><div class="axis-cap">'+dim+'별 '+m.nm+' 구성비</div>';
  return h;
}
function exportCsv(){
  var r=window._rpt;
  var csv=r.dim+','+r.ms.map(function(m){return m.nm;}).join(',')+'\n';
  r.keys.forEach(function(k){
    csv+=k+','+r.ms.map(function(m){return Math.round(r.groups[k][m.k]);}).join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='RPT_Custom_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','사용자 정의 리포트를 CSV로 내보냈습니다.');
}
function saveRpt(){
  toast('','리포트 저장 완료','「'+document.getElementById('ppTitle').textContent+'」 리포트가 내 리포트 목록에 저장되었습니다.');
}
function resetAll(){
  document.getElementById('cSource').selectedIndex=0;
  document.getElementById('cPeriod').selectedIndex=0;
  pickViz('table');changeSource();
  toast('info','초기화','리포트 빌더를 초기 상태로 되돌렸습니다.');
}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
init();
</script>
</body>
</html>
