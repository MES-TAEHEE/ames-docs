<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FG-03 Shipment Order · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid var(--pda);}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#22d3ee;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.tabs{display:flex;gap:6px;}
.tb{flex:1;padding:9px 0;background:#1a3540;border:1px solid #2c5564;border-radius:7px;text-align:center;font-size:11px;font-weight:800;color:#67e8f9;cursor:pointer;font-family:inherit;}
.tb.on{background:var(--pda);color:#fff;border-color:var(--pda);}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.k{background:rgba(6,182,212,.08);border:1px solid #1a3540;border-top:3px solid var(--c);border-radius:9px;padding:9px 10px;text-align:center;}
.k .l{font-size:8.5px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.k .v{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:900;color:var(--c);margin-top:2px;line-height:1;}
.k .s{font-size:8.5px;color:#7a9aa3;}
.section-h{font-size:10px;color:#67e8f9;text-transform:uppercase;letter-spacing:2px;font-weight:800;display:flex;align-items:center;gap:6px;}
.section-h .b{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;background:rgba(6,182,212,.18);padding:2px 6px;border-radius:4px;color:#22d3ee;}
.so{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-radius:9px;padding:11px 13px;cursor:pointer;border-left:3px solid var(--st);}
.so:active{transform:scale(.98);}
.so .h{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.so .id{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;color:#fff;}
.so .pri{margin-left:auto;font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;}
.pri-u{background:rgba(220,38,38,.18);color:#fca5a5;}
.pri-n{background:rgba(6,182,212,.18);color:#22d3ee;}
.so .cust{font-size:12px;font-weight:800;color:#fff;}
.so .item{font-size:10.5px;color:#fdba74;margin-top:2px;}
.so .meta{display:flex;justify-content:space-between;font-size:10px;color:#7a9aa3;margin-top:6px;}
.so .meta b{color:#fbbf24;font-family:'JetBrains Mono',monospace;}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,var(--pda),var(--pda-dk));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #155e75;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #155e75;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid var(--pda);font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">FG-03</div>
    <div class="pda-t">Shipment Order</div>
    <span class="live"><span class="d"></span>LIVE</span>
    <span class="pda-bat">🔋 68%</span>
  </div>
  <div class="pda-body">
    <div class="tabs">
      <button class="tb on" data-f="all" onclick="pickF(this)">ALL</button>
      <button class="tb" data-f="urgent" onclick="pickF(this)">URGENT (D-0)</button>
      <button class="tb" data-f="sav" onclick="pickF(this)">SAV</button>
      <button class="tb" data-f="geo" onclick="pickF(this)">GEO</button>
    </div>
    <div class="kpis">
      <div class="k" style="--c:#22d3ee"><div class="l">TODAY SHIP</div><div class="v">12</div><div class="s">orders</div></div>
      <div class="k" style="--c:#fca5a5"><div class="l">URGENT</div><div class="v">3</div><div class="s">D-0</div></div>
      <div class="k" style="--c:#22c55e"><div class="l">COMPLETE</div><div class="v">5</div><div class="s">shipped</div></div>
    </div>
    <div class="section-h">🚚 Shipment Orders <span class="b" id="cnt">7 ORDERS</span></div>
    <div id="list"></div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← Menu</button>
    <button onclick="picking()">📦 Start Picking</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var SOS=[
 {id:'SO-2605-0312',cust:'SAV',item:'Door Trim LH · 240 EA',due:'09:30',rd:'Run 1',pri:'urgent'},
 {id:'SO-2605-0313',cust:'GEO',item:'Console Upper · 180 EA',due:'10:00',rd:'Run 1',pri:'urgent'},
 {id:'SO-2605-0314',cust:'SAV',item:'Side Molding · 320 EA',due:'11:30',rd:'Run 1',pri:'urgent'},
 {id:'SO-2605-0315',cust:'GEO',item:'Radiator Grille · 150 EA',due:'13:00',rd:'Run 2',pri:'normal'},
 {id:'SO-2605-0316',cust:'SAV',item:'Door Trim RH · 260 EA',due:'14:30',rd:'Run 2',pri:'normal'},
 {id:'SO-2605-0317',cust:'SAV',item:'Front Bumper · 120 EA',due:'15:00',rd:'Run 2',pri:'normal'},
 {id:'SO-2605-0318',cust:'GEO',item:'Console Upper · 170 EA',due:'16:00',rd:'Run 3',pri:'normal'}
];
var f='all';
function pickF(e){[].slice.call(document.querySelectorAll('.tb')).forEach(function(x){x.classList.remove('on');});e.classList.add('on');f=e.dataset.f;render();}
function render(){
  var rows=SOS.filter(function(s){
    if(f==='all')return true;
    if(f==='urgent')return s.pri==='urgent';
    if(f==='sav')return s.cust==='SAV';
    if(f==='geo')return s.cust==='GEO';
    return true;
  });
  document.getElementById('cnt').textContent=rows.length+' ORDERS';
  document.getElementById('list').innerHTML=rows.map(function(s){
    var col=s.pri==='urgent'?'#dc2626':'#22d3ee';
    return '<div class="so" style="--st:'+col+'" onclick="pick(\''+s.id+'\')">'+
      '<div class="h"><span class="id">'+s.id+'</span><span class="pri '+(s.pri==='urgent'?'pri-u':'pri-n')+'">'+(s.pri==='urgent'?'URGENT D-0':s.rd)+'</span></div>'+
      '<div class="cust">'+s.cust+' · '+s.rd+'</div>'+
      '<div class="item">'+s.item+'</div>'+
      '<div class="meta"><span>📅 Due '+s.due+'</span><span>▶ Pick Pending</span></div></div>';
  }).join('');
}
function pick(id){toast('',id+' Selected','Opening FIFO Picking screen (FG-04).');}
function picking(){toast('','📦 Start Picking','Starting picking for next order SO-2605-0312.');}
function back(){toast('','PDA Menu','Returning to PDA menu.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">• '+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
render();
</script>
</body>
</html>
