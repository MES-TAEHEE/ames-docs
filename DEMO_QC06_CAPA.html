<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QC-06 CAPA · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--qc:#8b5cf6;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at 50% 30%,#1a1208,#0a0805);color:#e8e2d8;font-size:13px;display:flex;flex-direction:column;overflow:hidden;}
.head{flex-shrink:0;padding:13px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--qc);background:rgba(0,0,0,.3);}
.head .id{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#c4b5fd;}
.head .tt{flex:1;}
.head .en{font-size:17px;font-weight:800;color:#fff;}
.head .ko{font-size:11px;color:#a8997f;}
.back{background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:13px;font-weight:700;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:inherit;}
.live{font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:5px 10px;border-radius:5px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.live .d{width:7px;height:7px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.body{flex:1;display:grid;grid-template-columns:1fr 1.2fr;gap:14px;padding:18px 24px;min-height:0;overflow:hidden;}
.col{display:flex;flex-direction:column;gap:13px;min-height:0;overflow-y:auto;}
.col::-webkit-scrollbar{width:8px;}.col::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.kpi{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-top:4px solid var(--c);border-radius:10px;padding:11px 14px;}
.kpi .lbl{font-size:9px;color:#c4b5fd;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;}
.kpi .val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:900;color:var(--c);line-height:1;margin-top:3px;}
.kpi .sub{font-size:9px;color:#a8997f;}
.list{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-radius:11px;padding:14px 18px;flex:1;display:flex;flex-direction:column;min-height:0;}
.list h3{font-size:11px;color:#c4b5fd;text-transform:uppercase;letter-spacing:2px;margin-bottom:11px;font-weight:800;}
.l-body{flex:1;overflow-y:auto;}
.capa-row{background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-left:4px solid var(--c);border-radius:8px;padding:10px 13px;margin-bottom:9px;cursor:pointer;}
.capa-row:hover{background:rgba(139,92,246,.07);}
.capa-row.sel{background:rgba(139,92,246,.15);border-color:var(--qc);}
.capa-row .ch{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.capa-row .cid{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;color:#fff;}
.capa-row .st{margin-left:auto;font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:5px;}
.st-pl{background:rgba(245,158,11,.18);color:#fbbf24;}
.st-pr{background:rgba(56,189,248,.18);color:#7dd3fc;}
.st-vr{background:rgba(168,85,247,.2);color:#c4b5fd;}
.st-cl{background:rgba(34,197,94,.18);color:#86efac;}
.capa-row .ti{font-size:12px;color:#fff;}
.capa-row .meta{font-size:9.5px;color:#a8997f;margin-top:3px;}
.detail{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-radius:11px;padding:18px 22px;}
.detail h2{font-size:18px;color:#fff;margin-bottom:9px;}
.detail .meta-r{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
.detail .m{background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-radius:7px;padding:8px 11px;}
.detail .m .ml{font-size:9px;color:#a8997f;font-family:'JetBrains Mono',monospace;}
.detail .m .mv{font-size:12px;font-weight:800;color:#fff;margin-top:2px;}
.steps{display:flex;gap:5px;margin-bottom:16px;}
.step{flex:1;padding:8px 6px;background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-radius:7px;text-align:center;}
.step.done{background:rgba(34,197,94,.15);border-color:#16a34a;}
.step.cur{background:rgba(139,92,246,.18);border-color:var(--qc);border-width:2px;}
.step .sn{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#c4b5fd;line-height:.9;}
.step.done .sn{color:#86efac;}
.step .sl{font-size:9px;font-weight:800;color:#a8997f;margin-top:3px;}
.step.cur .sl{color:#fff;}
.sec{margin-bottom:14px;}
.sec h4{font-size:10px;color:#c4b5fd;text-transform:uppercase;letter-spacing:2px;font-weight:800;margin-bottom:7px;}
.sec .content{background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-radius:7px;padding:11px 14px;font-size:12px;color:#fff;line-height:1.6;}
.sec .content b{color:#fbbf24;}
.actions{display:flex;gap:9px;margin-top:16px;}
.actions button{flex:1;padding:13px;background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:13px;font-weight:800;border-radius:8px;cursor:pointer;font-family:inherit;}
.actions button.pri{background:linear-gradient(180deg,#8b5cf6,#6d28d9);color:#fff;border-color:#8b5cf6;}
.actions button:active{transform:translateY(1px);}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1a1208;border-radius:10px;padding:13px 17px;border-left:5px solid var(--qc);font-size:13px;min-width:280px;max-width:400px;animation:ti .25s ease;color:#fff;box-shadow:0 8px 26px rgba(0,0,0,.5);}
.toast.ok{border-left-color:#16a34a;}
.toast .tt{font-weight:800;margin-bottom:3px;}
.toast .tb{color:#a8997f;font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="head">
  <button class="back" onclick="back()">‹ Dashboard</button>
  <div class="id">QC-06</div>
  <div class="tt"><div class="en">CAPA Management</div><div class="ko">Corrective and Preventive Action</div></div>
  <span class="live"><span class="d"></span>LIVE</span>
</div>
<div class="body">
  <div class="col">
    <div class="kpis">
      <div class="kpi" style="--c:#fbbf24"><div class="lbl">IN PROGRESS</div><div class="val">7</div><div class="sub">CAPAs</div></div>
      <div class="kpi" style="--c:#22c55e"><div class="lbl">VERIFIED CLOSED</div><div class="val">18</div><div class="sub">This Month</div></div>
      <div class="kpi" style="--c:#dc2626"><div class="lbl">OVERDUE</div><div class="val">2</div><div class="sub">Urgent</div></div>
      <div class="kpi" style="--c:#c4b5fd"><div class="lbl">AVG CLOSURE</div><div class="val">8.4</div><div class="sub">days</div></div>
    </div>
    <div class="list">
      <h3>📋 CAPA List</h3>
      <div class="l-body" id="capaList"></div>
    </div>
  </div>
  <div class="col">
    <div class="detail" id="detail"></div>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var CAPAS=[
 {id:'CAPA-2605-007',ti:'PP Resin MI Out-of-Spec — Vendor Quality Improvement',ncr:'NCR-2605-008',sev:'Critical',pic:'Linda Garcia',due:'05/30/2026',st:'In Progress',stC:'st-pr',rootCause:'Vendor raw material LOT variability — incoming inspection must be strengthened',immAct:'Affected LOT (RC-2605-0418) returned to vendor; alternative material rush ordered',corrAct:'Dow Chemical quality meeting — require 100% MI measurement submission',prevAct:'Add MI test for every incoming LOT; re-assess vendor rating',vrf:'Close after 5 consecutive incoming LOTs pass within 30 days',step:2},
 {id:'CAPA-2605-006',ti:'Clip Retention Force Below Spec — Torque Calibration',ncr:'NCR-2605-009',sev:'Major',pic:'Karen Lee',due:'05/25/2026',st:'In Progress',stC:'st-pr',rootCause:'Torque tool #1 calibration drift (12 days since last cal)',immAct:'LOT held; maintenance call placed for torque tool',corrAct:'Immediate calibration of torque tool #1',prevAct:'Shorten torque calibration cycle quarterly → monthly',vrf:'Re-measure clip force after 1 week; mean ≥ 45N',step:2},
 {id:'CAPA-2605-005',ti:'Paint Color dE Defects — Booth Cleaning Cycle',ncr:'NCR-2605-010',sev:'Major',pic:'Sarah Williams',due:'05/26/2026',st:'Planning',stC:'st-pl',rootCause:'',immAct:'',corrAct:'',prevAct:'',vrf:'',step:1},
 {id:'CAPA-2605-004',ti:'Injection Gate Residue Defects',ncr:'NCR-2605-007',sev:'Minor',pic:'Karen Lee',due:'05/24/2026',st:'Verification',stC:'st-vr',rootCause:'Gate-cutter jig worn',immAct:'Replace jig immediately',corrAct:'Shorten jig inspection cycle (month → week)',prevAct:'Add auto-alarm based on jig usage count',vrf:'Confirm gate residue rate < 0.5% over 2 weeks',step:3},
 {id:'CAPA-2605-003',ti:'Chrome Delamination (Grille)',ncr:'NCR-2605-006',sev:'Major',pic:'Linda Garcia',due:'05/22/2026',st:'Closed',stC:'st-cl',rootCause:'Primer thickness insufficient (8㎛, spec ≥12㎛)',immAct:'Affected LOT scrapped',corrAct:'Primer application time +2 sec standard update',prevAct:'Introduce auto-thickness measurement system for primer',vrf:'Closed — delamination rate 0% for 5/19~5/21 LOTs',step:4}
];
var sel=0;
function renderList(){
  document.getElementById('capaList').innerHTML=CAPAS.map(function(c,i){
    return '<div class="capa-row'+(i===sel?' sel':'')+'" style="--c:'+(c.sev==='Critical'?'#dc2626':(c.sev==='Major'?'#fbbf24':'#22c55e'))+'" onclick="pick('+i+')">'+
      '<div class="ch"><span class="cid">'+c.id+'</span><span class="st '+c.stC+'">'+c.st+'</span></div>'+
      '<div class="ti">'+c.ti+'</div>'+
      '<div class="meta">'+c.ncr+' · Owner '+c.pic+' · Due '+c.due+'</div></div>';
  }).join('');
}
function pick(i){sel=i;renderList();renderDetail();}
function renderDetail(){
  var c=CAPAS[sel];
  var stepNames=['Planning','Action','Verification','Closed'];
  var html='<h2>'+c.id+' — '+c.ti+'</h2>'+
    '<div class="meta-r">'+
    '<div class="m"><div class="ml">RELATED NCR</div><div class="mv">'+c.ncr+'</div></div>'+
    '<div class="m"><div class="ml">SEVERITY</div><div class="mv" style="color:'+(c.sev==='Critical'?'#fca5a5':(c.sev==='Major'?'#fbbf24':'#86efac'))+'">'+c.sev+'</div></div>'+
    '<div class="m"><div class="ml">OWNER</div><div class="mv">'+c.pic+'</div></div>'+
    '<div class="m"><div class="ml">DUE DATE</div><div class="mv">'+c.due+'</div></div></div>'+
    '<div class="steps">';
  for(var i=0;i<4;i++){
    var cls=i+1<c.step?'done':(i+1===c.step?'cur':'');
    html+='<div class="step '+cls+'"><div class="sn">'+(i+1)+'</div><div class="sl">'+stepNames[i]+'</div></div>';
  }
  html+='</div>';
  html+=
    (c.rootCause?'<div class="sec"><h4>🔍 Root Cause (RCA)</h4><div class="content">'+c.rootCause+'</div></div>':'')+
    (c.immAct?'<div class="sec"><h4>⚡ Immediate Action</h4><div class="content">'+c.immAct+'</div></div>':'')+
    (c.corrAct?'<div class="sec"><h4>🛠 Corrective Action</h4><div class="content">'+c.corrAct+'</div></div>':'')+
    (c.prevAct?'<div class="sec"><h4>🛡 Preventive Action</h4><div class="content">'+c.prevAct+'</div></div>':'')+
    (c.vrf?'<div class="sec"><h4>✓ Verification</h4><div class="content">'+c.vrf+'</div></div>':'');
  if(c.step<4){
    html+='<div class="actions">'+
      '<button onclick="addNote()">📝 Add Note</button>'+
      '<button class="pri" onclick="advance()">▶ Advance Step</button></div>';
  }
  document.getElementById('detail').innerHTML=html;
}
function advance(){
  var c=CAPAS[sel];if(c.step<4){c.step++;
    var stMap=['st-pl','st-pr','st-vr','st-cl'];
    var stNames=['Planning','In Progress','Verification','Closed'];
    c.st=stNames[c.step-1];c.stC=stMap[c.step-1];
    renderList();renderDetail();
    toast('ok','Step Advanced ✓',c.id+' — moved to '+c.st+' stage.');
  }
}
function addNote(){toast('','Add Note','Opening CAPA note entry. (Demo)');}
function back(){toast('','Back','Returning to Dashboard.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='ok'?'✓ ':'• ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3500);
}
renderList();renderDetail();
</script>
</body>
</html>
