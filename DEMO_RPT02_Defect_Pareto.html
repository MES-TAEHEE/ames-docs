<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RPT-02 Defect Pareto · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:14px 16px;margin-bottom:14px;}
.card-t{font-size:12px;font-weight:800;color:var(--pp);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.grid2{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-bottom:14px;}
/* pareto */
.pchart{position:relative;height:210px;padding:10px 4px 0;}
.pbars{display:flex;align-items:flex-end;gap:8px;height:170px;border-bottom:2px solid var(--bd);position:relative;}
.p80{position:absolute;left:0;right:0;border-top:1px dashed #dc2626;}
.p80-l{position:absolute;right:0;font-size:8px;color:#dc2626;background:#fff;padding:0 3px;font-family:'JetBrains Mono',monospace;}
.pbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;cursor:pointer;height:100%;position:relative;}
.pbar .bb{width:74%;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#34d399,#059669);transition:opacity .12s;}
.pbar:hover .bb{opacity:.78;}
.pbar.sel .bb{background:linear-gradient(180deg,#f59e0b,#d97706);}
.pbar .bv{font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--sub);margin-bottom:2px;}
.plabels{display:flex;gap:8px;margin-top:5px;}
.plabels div{flex:1;text-align:center;font-size:8.5px;color:var(--sub);}
.psvg{position:absolute;top:10px;left:4px;right:4px;height:170px;pointer-events:none;}
.cumdot{position:absolute;width:7px;height:7px;border-radius:50%;background:#2563eb;border:1.5px solid #fff;transform:translate(-50%,-50%);}
.cumlbl{position:absolute;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#2563eb;transform:translate(-50%,-150%);}
.proc-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px;}
.proc-row .pn{width:78px;flex-shrink:0;}
.proc-row .pt{flex:1;height:14px;background:#eef1f5;border-radius:3px;overflow:hidden;}
.proc-row .pt i{display:block;height:100%;}
.proc-row .pv{width:62px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;font-size:11px;}
.panel-h .clr{margin-left:auto;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
thead th.c{text-align:center;}
tbody td{padding:8px 9px;border-bottom:1px solid #eef1f5;}
tbody tr:hover td{background:#f0fdf4;}
.mono{font-family:'JetBrains Mono',monospace;}
.rank{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;border-radius:50%;font-size:9px;font-weight:800;background:#eef1f5;color:#4b5563;}
.rank.r1{background:#fee2e2;color:#991b1b;}.rank.r2{background:#ffedd5;color:#9a3412;}.rank.r3{background:#fef3c7;color:#92400e;}
.vital{font-size:8px;font-weight:700;padding:1px 6px;border-radius:7px;background:#fee2e2;color:#991b1b;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">RPT-02</div>
  <div class="sh-tt"><div class="sh-en">Defect Pareto Analysis</div><div class="sh-ko">불량 파레토 — 불량 유형별 집중 분석</div></div>
  <span class="sh-tag">/rpt/defect-pareto</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>기간 Period</label>
    <select id="fPeriod" onchange="apply()"><option>2026-05 (당월)</option><option>최근 7일</option><option>2026-04</option></select></div>
  <div class="fld"><label>라인 Line</label>
    <select id="fLine" onchange="apply()"><option value="">전체 All</option><option>SAV-INJ-01</option><option>SAV-INJ-02</option><option>SAV-ASSY-01</option><option>SAV-PNT-01</option></select></div>
  <div class="fld"><label>공정 Process</label>
    <select id="fProc" onchange="apply()"><option value="">전체</option><option>사출</option><option>조립</option><option>도장</option><option>검사</option></select></div>
  <button class="btn btn-p btn-sm" onclick="apply()">🔍 적용</button>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div style="margin-left:auto;"><button class="btn btn-s" onclick="exportCsv()">📥 Export</button></div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kDef">0</div><div class="kl">총 불량 수 · Defects</div></div>
    <div class="kpi" style="--c:#f59e0b"><div class="kv" id="kRate">0%</div><div class="kl">불량률 · Defect Rate</div></div>
    <div class="kpi" style="--c:#8b5cf6"><div class="kv" id="kTop">-</div><div class="kl">최다 불량 유형 · Worst</div></div>
    <div class="kpi" style="--c:#2563eb"><div class="kv" id="kVital">0</div><div class="kl">누적 80% 핵심 유형 수</div></div>
    <div class="kpi" style="--c:#0891b2"><div class="kv" id="kInsp">0</div><div class="kl">검사 수량 · Inspected</div></div>
  </div>
  <div class="card">
    <div class="card-t">📊 불량 유형별 파레토 차트
      <span style="margin-left:auto;font-size:9px;color:#9ca3af;font-weight:400;">녹색 막대=불량건수 · 파란 점=누적% · 막대 클릭=필터</span></div>
    <div class="pchart">
      <div class="pbars" id="pbars"></div>
      <div class="psvg" id="psvg"></div>
      <div class="plabels" id="plabels"></div>
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-t">🏭 공정별 불량 분포</div>
      <div id="procDist"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><span>📋 불량 유형 상세 — <span id="sub" style="font-weight:800;color:#dc2626;">0건</span></span>
        <button class="btn btn-s btn-sm clr" id="clrBtn" onclick="clearType()" style="display:none;">✕ 필터 해제</button></div>
      <table>
        <thead><tr><th class="c">순위</th><th>불량 유형</th><th class="c">건수</th><th class="c">비율</th><th class="c">누적%</th><th>주 공정</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
/* defect types: count split by process */
var DEFECTS=[
 {t:'미성형 (Short Shot)',proc:'사출',byLine:{'SAV-INJ-01':28,'SAV-INJ-02':34}},
 {t:'버 (Burr)',proc:'사출',byLine:{'SAV-INJ-01':22,'SAV-INJ-02':19}},
 {t:'스크래치',proc:'조립',byLine:{'SAV-ASSY-01':17,'SAV-PNT-01':9}},
 {t:'변형 (Warpage)',proc:'사출',byLine:{'SAV-INJ-01':9,'SAV-INJ-02':16}},
 {t:'색상 불량',proc:'도장',byLine:{'SAV-PNT-01':21}},
 {t:'치수 불량',proc:'검사',byLine:{'SAV-ASSY-01':12,'SAV-INJ-02':6}},
 {t:'이물질 혼입',proc:'도장',byLine:{'SAV-PNT-01':11}},
 {t:'기포 (Bubble)',proc:'사출',byLine:{'SAV-INJ-02':7}},
 {t:'조립 불량',proc:'조립',byLine:{'SAV-ASSY-01':8}}
];
var INSPBASE=8400;
var selType=null;
function lineMatch(){return document.getElementById('fLine').value;}
function procMatch(){return document.getElementById('fProc').value;}
function cnt(d){
  var fl=lineMatch();var s=0;
  for(var k in d.byLine){if(!fl||k===fl)s+=d.byLine[k];}
  return s;
}
function visDefs(){
  var fp=procMatch();
  return DEFECTS.map(function(d){return{d:d,n:cnt(d)};})
    .filter(function(x){return x.n>0&&(!fp||x.d.proc===fp);})
    .sort(function(a,b){return b.n-a.n;});
}
function apply(){
  var v=visDefs();
  var tot=v.reduce(function(s,x){return s+x.n;},0);
  var insp=lineMatch()?Math.round(INSPBASE/4):INSPBASE;
  document.getElementById('kDef').textContent=tot.toLocaleString();
  document.getElementById('kRate').textContent=(insp?Math.round(tot/insp*10000)/100:0)+'%';
  document.getElementById('kInsp').textContent=insp.toLocaleString();
  document.getElementById('kTop').textContent=v.length?v[0].d.t.split(' ')[0]:'-';
  document.getElementById('kTop').style.fontSize='15px';
  /* vital few (cumulative 80%) */
  var acc=0,vital=0;
  v.forEach(function(x){if(acc<80){vital++;}acc+=x.n/tot*100;});
  document.getElementById('kVital').textContent=vital+'종';
  renderPareto(v,tot);renderProc();renderTable(v,tot);
}
function renderPareto(v,tot){
  var max=v.length?v[0].n:1;
  var bars='',acc=0,pts=[];
  v.forEach(function(x,i){
    acc+=x.n;
    var cum=acc/tot*100;
    pts.push(cum);
    bars+='<div class="pbar'+(selType===x.d.t?' sel':'')+'" onclick="pickType(\''+x.d.t+'\')">'+
      '<div class="bv">'+x.n+'</div>'+
      '<div class="bb" style="height:'+(x.n/max*135)+'px;"></div></div>';
  });
  document.getElementById('pbars').innerHTML=
    '<div class="p80" style="bottom:'+(80/100*135+0)+'px;"></div><span class="p80-l" style="bottom:'+(80/100*135)+'px;">80%</span>'+bars;
  /* cumulative dots + line */
  var n=v.length,H=170;
  var coords=pts.map(function(c,i){
    var x=(i+0.5)/n*100;
    var y=H-(c/100*135);
    return {x:x,y:y};
  });
  var dots='';
  coords.forEach(function(p,i){
    dots+='<div class="cumdot" style="left:'+p.x+'%;top:'+p.y+'px;"></div>'+
      '<div class="cumlbl" style="left:'+p.x+'%;top:'+p.y+'px;">'+Math.round(pts[i])+'%</div>';
  });
  document.getElementById('psvg').innerHTML=svgLine(coords)+dots;
  document.getElementById('plabels').innerHTML=v.map(function(x){
    return '<div>'+x.d.t.split(' ')[0]+'</div>';}).join('');
}
function svgLine(coords){
  if(coords.length<2)return '';
  return '<svg viewBox="0 0 100 170" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;">'+
    '<polyline points="'+coords.map(function(p){return p.x+','+p.y;}).join(' ')+
    '" fill="none" stroke="#2563eb" stroke-width="0.8"/></svg>';
}
function pickType(t){selType=(selType===t)?null:t;apply();
  if(selType)toast('info','「'+t+'」 선택','해당 불량 유형이 상세 테이블에서 강조됩니다.');}
function clearType(){selType=null;apply();}
function renderProc(){
  var v=visDefs();
  var byP={};v.forEach(function(x){byP[x.d.proc]=(byP[x.d.proc]||0)+x.n;});
  var arr=Object.keys(byP).map(function(p){return{p:p,n:byP[p]};}).sort(function(a,b){return b.n-a.n;});
  var max=arr.length?arr[0].n:1;
  var cols={'사출':'#dc2626','조립':'#f59e0b','도장':'#8b5cf6','검사':'#0891b2'};
  document.getElementById('procDist').innerHTML=arr.map(function(x){
    return '<div class="proc-row"><span class="pn">'+x.p+'</span>'+
      '<span class="pt"><i style="width:'+(x.n/max*100)+'%;background:'+(cols[x.p]||'#059669')+'"></i></span>'+
      '<span class="pv">'+x.n+'건</span></div>';}).join('');
}
function renderTable(v,tot){
  var acc=0,h='';
  v.forEach(function(x,i){
    acc+=x.n;var cum=Math.round(acc/tot*1000)/10;
    var vital=acc/tot*100<=80.5||(acc-x.n)/tot*100<80;
    h+='<tr style="'+(selType===x.d.t?'background:#fffbeb;':'')+'">'+
      '<td class="c" style="text-align:center;"><span class="rank '+(i<3?'r'+(i+1):'')+'">'+(i+1)+'</span></td>'+
      '<td><b>'+x.d.t+'</b>'+(vital&&cum<=80?' <span class="vital">핵심</span>':'')+'</td>'+
      '<td class="c mono" style="text-align:center;font-weight:700;color:#dc2626;">'+x.n+'</td>'+
      '<td class="c mono" style="text-align:center;">'+(Math.round(x.n/tot*1000)/10)+'%</td>'+
      '<td class="c mono" style="text-align:center;font-weight:700;color:'+(cum<=80?'#2563eb':'#9ca3af')+'">'+cum+'%</td>'+
      '<td>'+x.d.proc+'</td></tr>';
  });
  document.getElementById('tbody').innerHTML=h;
  document.getElementById('sub').textContent=tot.toLocaleString()+'건';
  document.getElementById('clrBtn').style.display=selType?'inline-flex':'none';
}
function exportCsv(){
  var v=visDefs(),tot=v.reduce(function(s,x){return s+x.n;},0),acc=0;
  var csv='Rank,DefectType,Count,Ratio%,Cumulative%,Process\n';
  v.forEach(function(x,i){acc+=x.n;
    csv+=[i+1,x.d.t,x.n,Math.round(x.n/tot*1000)/10,Math.round(acc/tot*1000)/10,x.d.proc].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='RPT_DefectPareto_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','불량 파레토 분석을 CSV로 내보냈습니다.');
}
function resetAll(){
  document.getElementById('fLine').value='';document.getElementById('fProc').value='';
  document.getElementById('fPeriod').selectedIndex=0;selType=null;apply();
  toast('info','초기화','불량 분석 조건을 초기화했습니다.');
}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
apply();
</script>
</body>
</html>
