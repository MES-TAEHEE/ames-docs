<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WH-07 PDA Release · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid var(--pda);}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#22d3ee;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.req-card{background:linear-gradient(160deg,rgba(6,182,212,.12),rgba(0,0,0,.3));border:1px solid #1a3540;border-top:3px solid var(--pda);border-radius:10px;padding:13px 15px;}
.req-card .h{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.req-card .id{font-family:'JetBrains Mono',monospace;font-size:11px;color:#22d3ee;font-weight:800;}
.req-card .nm{font-size:13px;font-weight:800;color:#fff;}
.req-card .req-q{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:900;color:#fbbf24;text-align:center;margin:7px 0;}
.req-card .req-l{text-align:center;font-size:10px;color:#7a9aa3;}
.section-h{font-size:10px;color:#67e8f9;text-transform:uppercase;letter-spacing:2px;font-weight:800;display:flex;align-items:center;gap:7px;}
.section-h .stp{background:var(--pda);color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;}
.scan-box{background:rgba(34,197,94,.13);border:2px solid #22c55e;border-radius:10px;padding:12px;text-align:center;}
.scan-box.pending{background:rgba(6,182,212,.08);border-color:var(--pda);border-style:dashed;}
.scan-box .ic{font-size:28px;}
.scan-box .t{font-size:13px;font-weight:800;color:#86efac;margin-top:4px;}
.scan-box.pending .t{color:#22d3ee;}
.scan-box .s{font-size:10px;color:#7a9aa3;margin-top:2px;font-family:'JetBrains Mono',monospace;}
.qbox{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-radius:10px;padding:12px 14px;text-align:center;}
.qbox .l{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.qbox .v{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:900;color:#fff;line-height:1;margin:5px 0;}
.qbox .u{font-size:9px;color:#7a9aa3;}
.qty-row{display:flex;gap:6px;}
.qty-row button{flex:1;padding:11px;background:#1a3540;border:1px solid #2c5564;color:#fff;font-size:13px;font-weight:800;border-radius:7px;cursor:pointer;font-family:inherit;}
.qty-row button:active{background:var(--pda);}
.prog-bar{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-radius:9px;padding:11px 13px;}
.prog-bar .ph{display:flex;justify-content:space-between;font-size:10px;color:#7a9aa3;margin-bottom:5px;}
.prog-bar .ph b{color:#22c55e;font-family:'JetBrains Mono',monospace;font-size:13px;}
.prog-bar .pt{height:9px;background:#1a3540;border-radius:5px;overflow:hidden;}
.prog-bar .pt i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,var(--pda),var(--pda-dk));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #155e75;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #155e75;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid var(--pda);font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast.ok{border-left-color:#16a34a;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">WH-07</div>
    <div class="pda-t">Picking</div>
    <span class="live"><span class="d"></span>LIVE</span>
    <span class="pda-bat">🔋 72%</span>
  </div>
  <div class="pda-body">
    <div class="req-card">
      <div class="h"><span class="id">RL-2605-0612</span><span style="margin-left:auto;font-size:9px;color:#7a9aa3;font-family:'JetBrains Mono',monospace;">Injection L1 Request</span></div>
      <div class="nm">PP Resin (Black)</div>
      <div class="req-q">800 LB</div>
      <div class="req-l">REQUESTED QTY</div>
    </div>
    <div class="section-h"><span class="stp">1</span>Scan Bin (FIFO)</div>
    <div class="scan-box"><div class="ic">📍✅</div>
      <div class="t">A-03-2 Detected</div>
      <div class="s">PP Resin Black · 8,200 LB on hand</div>
    </div>
    <div class="section-h"><span class="stp">2</span>Pick Qty</div>
    <div class="qbox">
      <div class="l">PICK QTY</div>
      <div class="v" id="qV">800</div>
      <div class="u">LB</div>
    </div>
    <div class="qty-row">
      <button onclick="adj(-50)">−50</button>
      <button onclick="adj(-10)">−10</button>
      <button onclick="adj(10)">+10</button>
      <button onclick="adj(50)">+50</button>
    </div>
    <div class="section-h"><span class="stp">3</span>Picking Progress</div>
    <div class="prog-bar">
      <div class="ph"><span>Pick Progress</span><span><b id="pT">800 / 800 LB</b></span></div>
      <div class="pt"><i id="pi" style="width:100%"></i></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← Cancel</button>
    <button onclick="complete()">✓ Pick Complete</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var q=800;
function adj(d){q=Math.max(0,q+d);update();}
function update(){
  document.getElementById('qV').textContent=q.toLocaleString();
  document.getElementById('pT').textContent=q+' / 800 LB';
  document.getElementById('pi').style.width=Math.min(100,q/800*100)+'%';
}
function complete(){
  if(q<800){toast('','Short Pick',q+' / 800 LB. Verify shortage.');return;}
  toast('ok','Pick Complete ✓','RL-2605-0612 — PP Resin 800 LB picked. Transferring to Injection L1.');
}
function back(){toast('','Back','Returning to release schedule list.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='ok'?'✓ ':'• ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
update();
</script>
</body>
</html>
