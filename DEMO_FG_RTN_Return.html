<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FG-RTN Customer Return · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid #dc2626;}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fca5a5;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#dc2626;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.section-h{font-size:10px;color:#fca5a5;text-transform:uppercase;letter-spacing:2px;font-weight:800;display:flex;align-items:center;gap:7px;}
.section-h .stp{background:#dc2626;color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:800;}
.scan-box{background:rgba(220,38,38,.13);border:2px solid #dc2626;border-radius:11px;padding:14px;text-align:center;}
.scan-box .ic{font-size:32px;}
.scan-box .t{font-size:14px;font-weight:800;color:#fca5a5;margin-top:5px;}
.scan-box .s{font-size:10px;color:#7a9aa3;margin-top:3px;font-family:'JetBrains Mono',monospace;}
.info-card{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-top:3px solid #dc2626;border-radius:10px;padding:13px 15px;}
.info-card .nm{font-size:14px;font-weight:800;color:#fff;}
.info-card .id{font-family:'JetBrains Mono',monospace;font-size:11px;color:#22d3ee;margin-top:2px;}
.info-card .meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px;font-size:11px;}
.info-card .meta .l{color:#7a9aa3;}
.info-card .meta b{color:#fff;font-family:'JetBrains Mono',monospace;}
.reasons{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.rsn{padding:10px 8px;background:rgba(255,255,255,.04);border:1.5px solid #1a3540;color:#cddde2;font-size:11.5px;font-weight:700;border-radius:7px;cursor:pointer;font-family:inherit;text-align:center;}
.rsn:active{transform:scale(.97);}
.rsn.on{background:rgba(220,38,38,.18);border-color:#dc2626;color:#fca5a5;}
.qbox{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-radius:10px;padding:12px 14px;text-align:center;}
.qbox .l{font-size:9px;color:#fca5a5;font-family:'JetBrains Mono',monospace;}
.qbox .v{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:900;color:#fca5a5;line-height:1;margin:4px 0;}
.qbox .u{font-size:9px;color:#7a9aa3;}
.qty-row{display:flex;gap:6px;}
.qty-row button{flex:1;padding:11px;background:#1a3540;border:1px solid #2c5564;color:#fff;font-size:13px;font-weight:800;border-radius:7px;cursor:pointer;font-family:inherit;}
.qty-row button:active{background:#dc2626;}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.act{padding:10px 7px;background:rgba(255,255,255,.04);border:1.5px solid #1a3540;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;}
.act.on{background:rgba(6,182,212,.18);border-color:var(--pda);color:#22d3ee;}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,#dc2626,#991b1b);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #7f1d1d;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #7f1d1d;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid #dc2626;font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast.ok{border-left-color:#16a34a;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">FG-RTN</div>
    <div class="pda-t">고객 반품</div>
    <span class="live"><span class="d"></span>RETURN</span>
    <span class="pda-bat">🔋 61%</span>
  </div>
  <div class="pda-body">
    <div class="section-h"><span class="stp">1</span>반품 LOT 스캔</div>
    <div class="scan-box">
      <div class="ic">↩️✅</div>
      <div class="t">LOT-2605-1958 인식</div>
      <div class="s">5/19 출하 · 라디에이터 그릴</div>
    </div>
    <div class="info-card">
      <div class="nm">라디에이터 그릴 (그레이)</div>
      <div class="id">GRILLE-02 · LOT-2605-1958</div>
      <div class="meta">
        <span class="l">출하일</span><b>2026-05-19</b>
        <span class="l">고객사</span><b>GEO</b>
        <span class="l">원 출하 수량</span><b>24 EA</b>
        <span class="l">반품 사유</span><b style="color:#fca5a5;">크롬 박리</b>
      </div>
    </div>
    <div class="section-h"><span class="stp">2</span>반품 수량</div>
    <div class="qbox">
      <div class="l">반품 수량 · RETURN QTY</div>
      <div class="v" id="qV">6</div>
      <div class="u">EA · 출하 24 중</div>
    </div>
    <div class="qty-row">
      <button onclick="adj(-1)">−1</button>
      <button onclick="adj(1)">+1</button>
    </div>
    <div class="section-h"><span class="stp">3</span>반품 사유</div>
    <div class="reasons">
      <div class="rsn on" data-r="품질 불량" onclick="pickR(this)">⛔ 품질 불량</div>
      <div class="rsn" data-r="배송 손상" onclick="pickR(this)">📦 배송 손상</div>
      <div class="rsn" data-r="오발주" onclick="pickR(this)">❓ 오발주</div>
      <div class="rsn" data-r="기타" onclick="pickR(this)">📝 기타</div>
    </div>
    <div class="section-h"><span class="stp">4</span>처리 방식</div>
    <div class="actions">
      <div class="act on" data-a="재작업" onclick="pickA(this)">♻ 재작업</div>
      <div class="act" data-a="폐기" onclick="pickA(this)">🗑 폐기</div>
      <div class="act" data-a="특채" onclick="pickA(this)">⚖ 특채</div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← 취소</button>
    <button onclick="submit()">↩ 반품 접수</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var q=6,rsn='품질 불량',act='재작업';
function adj(d){q=Math.max(1,q+d);document.getElementById('qV').textContent=q;}
function pickR(e){[].slice.call(document.querySelectorAll('.rsn')).forEach(function(x){x.classList.remove('on');});e.classList.add('on');rsn=e.dataset.r;}
function pickA(e){[].slice.call(document.querySelectorAll('.act')).forEach(function(x){x.classList.remove('on');});e.classList.add('on');act=e.dataset.a;}
function submit(){toast('ok','반품 접수 완료 ✓','RTN-2605-0008 — '+q+' EA · '+rsn+' · '+act+' 처리 등록됨. QC팀에 자동 통보.');}
function back(){toast('','뒤로','PDA 메뉴로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='ok'?'✓ ':'• ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
</script>
</body>
</html>
