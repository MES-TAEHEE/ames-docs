<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PNT-02 LOT Pre-Issue · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--sc:#ea580c;--sc-dk:#c2410c;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:radial-gradient(ellipse at 50% 30%,#1a1208,#0a0805);color:#e8e2d8;font-size:14px;display:flex;flex-direction:column;overflow:hidden;}
.head{flex-shrink:0;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--sc);background:rgba(0,0,0,.3);}
.head .id{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fb923c;}
.head .tt{flex:1;}
.head .en{font-size:17px;font-weight:800;color:#fff;}
.head .ko{font-size:11px;color:#a8997f;}
.back{background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:13px;font-weight:700;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:inherit;}
.live{font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:5px 10px;border-radius:5px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.live .d{width:7px;height:7px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.body{flex:1;display:grid;grid-template-columns:1fr 1.2fr;gap:14px;padding:18px 24px;min-height:0;overflow:hidden;}
.col{display:flex;flex-direction:column;gap:14px;min-height:0;}
.col:last-child{overflow-y:auto;}
.col:last-child::-webkit-scrollbar{width:8px;}.col:last-child::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
.card{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-radius:11px;padding:14px 18px;}
.card h3{font-size:11px;color:#fdba74;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;font-weight:800;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:10px;font-weight:700;color:#a8997f;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.fld select,.fld input{width:100%;padding:11px 14px;background:#1a1208;border:1px solid #3a2a14;border-radius:7px;color:#fff;font-size:14px;font-family:inherit;}
.fld input[type=number]{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;}
.fld select{background:#1a1208 url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 20 20%22 fill=%22%23fdba74%22><polygon points=%225,7 10,12 15,7%22/></svg>') right 12px center/14px no-repeat;appearance:none;}
.color-row{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
.cb{background:rgba(0,0,0,.3);border:2px solid #3a2a14;border-radius:7px;padding:6px;cursor:pointer;text-align:center;}
.cb:active{transform:scale(.96);}
.cb.on{border-color:var(--sc);background:rgba(234,88,12,.18);}
.cb .sw{width:100%;height:24px;border-radius:4px;}
.cb .n{font-size:10px;font-weight:800;color:#fff;margin-top:4px;}
.preview-lot{background:linear-gradient(160deg,rgba(234,88,12,.12),rgba(234,88,12,.03));border:2px dashed var(--sc);border-radius:11px;padding:18px;text-align:center;}
.preview-lot .lbl{font-size:10px;color:#fdba74;letter-spacing:2px;font-family:'JetBrains Mono',monospace;}
.preview-lot .lot{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:900;color:#fff;margin-top:6px;letter-spacing:2px;}
.preview-lot .meta{font-size:11px;color:#a8997f;margin-top:5px;}
.actions{display:flex;gap:11px;}
.btn-issue{flex:2;padding:18px;background:linear-gradient(180deg,var(--sc),var(--sc-dk));border:none;border-radius:11px;color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 0 #7c2d12;}
.btn-issue:active{transform:translateY(2px);box-shadow:0 2px 0 #7c2d12;}
.btn-print{flex:1;padding:18px;background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:14px;font-weight:700;border-radius:11px;cursor:pointer;font-family:inherit;}
.lot-list{flex:1;display:flex;flex-direction:column;min-height:0;}
.lot-list h3{font-size:12px;color:#fdba74;text-transform:uppercase;letter-spacing:2px;margin-bottom:11px;font-weight:800;display:flex;align-items:center;gap:8px;}
.lot-list h3 .b{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(234,88,12,.18);color:#fb923c;padding:3px 8px;border-radius:5px;}
.list-body{flex:1;overflow-y:auto;}
.list-body::-webkit-scrollbar{width:8px;}.list-body::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
.lit{background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-left:4px solid var(--c);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.lit .sw{width:36px;height:36px;border-radius:7px;border:1px solid rgba(255,255,255,.1);flex-shrink:0;}
.lit .info{flex:1;}
.lit .lid{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:800;color:#fff;}
.lit .item{font-size:12px;color:#fdba74;margin-top:1px;}
.lit .meta{font-size:10px;color:#a8997f;margin-top:3px;font-family:'JetBrains Mono',monospace;}
.lit .stg{font-size:9px;font-weight:800;padding:3px 8px;border-radius:5px;background:rgba(34,197,94,.18);color:#86efac;}
.lit .act{display:flex;gap:6px;margin-top:7px;}
.lit .act button{padding:5px 10px;background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:10px;font-weight:700;border-radius:5px;cursor:pointer;font-family:inherit;}
.lit .act button:active{background:rgba(234,88,12,.18);}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1a1208;border-radius:10px;padding:13px 17px;border-left:5px solid var(--sc);font-size:13px;min-width:280px;max-width:400px;animation:ti .25s ease;color:#fff;box-shadow:0 8px 26px rgba(0,0,0,.5);}
.toast.ok{border-left-color:#16a34a;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:3px;}
.toast .tb{color:#a8997f;font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="head">
  <button class="back" onclick="back()">‹ 대시보드</button>
  <div class="id">PNT-02</div>
  <div class="tt"><div class="en">LOT Pre-Issue</div><div class="ko">가상 LOT 사전발행 — 도장 추적용 LOT 코드 사전 채번</div></div>
  <span class="live"><span class="d"></span>LIVE</span>
</div>
<div class="body">
  <div class="col">
    <div class="card">
      <h3>🆕 신규 LOT 발행 · NEW LOT</h3>
      <div class="fld"><label>작업지시 · Work Order</label>
        <select id="wo" onchange="refresh()">
          <option value="WO-2605-125|GRILLE-02|라디에이터 그릴|320">WO-2605-125 · 그릴 도장 · 320 EA</option>
          <option value="WO-2605-132|BUMPER-01|프론트 범퍼|280">WO-2605-132 · 프론트 범퍼 · 280 EA</option>
          <option value="WO-2605-140|MOLDING-05|사이드 몰딩|420">WO-2605-140 · 사이드 몰딩 · 420 EA</option>
        </select></div>
      <div class="fld"><label>색상 · Color</label>
        <div class="color-row" id="colorRow">
          <div class="cb on" data-c="블랙" data-hex="#0A0A0A" onclick="pickC(this)"><div class="sw" style="background:#0A0A0A"></div><div class="n">블랙</div></div>
          <div class="cb" data-c="그레이" data-hex="#8D948D" onclick="pickC(this)"><div class="sw" style="background:#8D948D"></div><div class="n">그레이</div></div>
          <div class="cb" data-c="화이트" data-hex="#F4F4F4" onclick="pickC(this)"><div class="sw" style="background:#F4F4F4;border:1px solid #555;"></div><div class="n">화이트</div></div>
          <div class="cb" data-c="레드" data-hex="#CC0605" onclick="pickC(this)"><div class="sw" style="background:#CC0605"></div><div class="n">레드</div></div>
          <div class="cb" data-c="블루" data-hex="#0E294B" onclick="pickC(this)"><div class="sw" style="background:#0E294B"></div><div class="n">블루</div></div>
          <div class="cb" data-c="실버" data-hex="#A5A5A5" onclick="pickC(this)"><div class="sw" style="background:#A5A5A5"></div><div class="n">실버</div></div>
        </div></div>
      <div class="fld" style="display:flex;gap:11px;">
        <div style="flex:1;"><label>수량 · QTY (EA)</label><input type="number" id="qty" value="48" min="1" oninput="refresh()"></div>
        <div style="flex:1;"><label>행거 수 · Hangers</label><input type="number" id="hg" value="8" min="1" oninput="refresh()"></div>
      </div>
    </div>
    <div class="preview-lot">
      <div class="lbl">▼ 발행 예정 LOT 번호</div>
      <div class="lot" id="prevLot">--</div>
      <div class="meta" id="prevMeta">색상 선택 후 자동 채번</div>
    </div>
    <div class="actions">
      <button class="btn-print" onclick="printL()">🖨 미리보기</button>
      <button class="btn-issue" onclick="issue()">▶ LOT 발행</button>
    </div>
  </div>
  <div class="col">
    <div class="lot-list">
      <h3>📋 발행된 LOT 목록 (대기) <span class="b" id="cnt">0개</span></h3>
      <div class="list-body" id="lotList"></div>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var COLORMAP={'블랙':'#0A0A0A','그레이':'#8D948D','화이트':'#F4F4F4','레드':'#CC0605','블루':'#0E294B','실버':'#A5A5A5'};
var COLORSEL='블랙',HEX='#0A0A0A',seq=2107;
var LOTS=[
 {id:'LOT-2605-2105',wo:'WO-2605-125',item:'라디에이터 그릴',color:'그레이',qty:32,hg:8,stage:'발행됨',t:'09:08'},
 {id:'LOT-2605-2106',wo:'WO-2605-140',item:'사이드 몰딩',color:'블랙',qty:60,hg:12,stage:'발행됨',t:'09:12'}
];
function pickC(el){
  [].slice.call(document.querySelectorAll('.cb')).forEach(function(x){x.classList.remove('on');});
  el.classList.add('on');COLORSEL=el.dataset.c;HEX=el.dataset.hex;
  refresh();
}
function woData(){
  var v=document.getElementById('wo').value.split('|');
  return {wo:v[0],code:v[1],nm:v[2],plan:v[3]};
}
function refresh(){
  var w=woData(),q=parseInt(document.getElementById('qty').value||'0',10),h=parseInt(document.getElementById('hg').value||'0',10);
  var lot='LOT-2605-'+String(seq).padStart(4,'0');
  document.getElementById('prevLot').textContent=lot;
  document.getElementById('prevMeta').innerHTML='<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+HEX+';vertical-align:middle;border:1px solid #666;"></span> '+COLORSEL+' · '+q+' EA · 행거 '+h+'개 · '+w.nm;
}
function issue(){
  var w=woData(),q=parseInt(document.getElementById('qty').value||'0',10),h=parseInt(document.getElementById('hg').value||'0',10);
  if(!q){toast('','입력 오류','수량을 확인하세요.');return;}
  var lot='LOT-2605-'+String(seq).padStart(4,'0');
  LOTS.unshift({id:lot,wo:w.wo,item:w.nm,color:COLORSEL,qty:q,hg:h,stage:'발행됨',t:new Date().toTimeString().slice(0,5)});
  seq++;refresh();renderLots();
  toast('ok','LOT 발행 완료 ✓',lot+' 「'+w.nm+' · '+COLORSEL+' · '+q+' EA」 사전 발행됨. PNT-03 로딩 화면에서 사용 가능.');
}
function printL(){toast('info','LOT 라벨 미리보기','발행 예정 LOT의 라벨을 미리 표시합니다. (데모)');}
function renderLots(){
  document.getElementById('cnt').textContent=LOTS.length+'개';
  document.getElementById('lotList').innerHTML=LOTS.map(function(l,i){
    return '<div class="lit" style="--c:'+(COLORMAP[l.color]||'#888')+'">'+
      '<div class="sw" style="background:'+(COLORMAP[l.color]||'#888')+'"></div>'+
      '<div class="info"><div class="lid">'+l.id+'</div>'+
      '<div class="item">'+l.item+' · '+l.color+'</div>'+
      '<div class="meta">'+l.wo+' · '+l.qty+' EA · 행거 '+l.hg+'개 · 발행 '+l.t+'</div>'+
      '<div class="act"><button onclick="reprint('+i+')">🖨 라벨 재인쇄</button>'+
      '<button onclick="cancel('+i+')">✕ 취소</button></div></div>'+
      '<span class="stg">'+l.stage+'</span></div>';
  }).join('')||'<div style="text-align:center;color:#a8997f;padding:24px;font-size:12px;">발행된 LOT가 없습니다.</div>';
}
function reprint(i){toast('','라벨 재인쇄',LOTS[i].id+' 라벨을 재인쇄합니다. (데모)');}
function cancel(i){var lot=LOTS[i].id;LOTS.splice(i,1);renderLots();toast('','LOT 취소',lot+' 발행 취소됨.');}
function back(){toast('','뒤로 이동','POP 대시보드로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':type==='ok'?'✓ ':'• ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3500);
}
refresh();renderLots();
</script>
</body>
</html>
