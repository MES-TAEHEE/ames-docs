<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SYS-04 Interface Monitor · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.swt{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:var(--sub);}
.swt .tk{width:34px;height:18px;border-radius:9px;background:#cbd5e1;position:relative;cursor:pointer;transition:background .15s;}
.swt .tk.on{background:var(--pp);}
.swt .tk i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s;}
.swt .tk.on i{left:18px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:23px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.ifc{background:#fff;border:1px solid var(--bd);border-radius:9px;overflow:hidden;border-top:4px solid var(--st);}
.ifc-h{padding:11px 13px;display:flex;align-items:flex-start;gap:9px;border-bottom:1px solid #eef1f5;}
.ifc-ic{width:34px;height:34px;border-radius:8px;background:#03251a;color:#34d399;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ifc-nm{font-size:12px;font-weight:800;line-height:1.25;}
.ifc-sys{font-size:9px;color:var(--sub);font-family:'JetBrains Mono',monospace;}
.ifc-st{margin-left:auto;font-size:9px;font-weight:800;padding:3px 9px;border-radius:10px;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ifc-st .dot{width:6px;height:6px;border-radius:50%;}
.st-ok{background:#d1fae5;color:#065f46;}.st-ok .dot{background:#10b981;animation:bl 1.3s infinite;}
.st-err{background:#fee2e2;color:#991b1b;}.st-err .dot{background:#dc2626;animation:bl .7s infinite;}
.st-idle{background:#f3f4f6;color:#4b5563;}.st-idle .dot{background:#9ca3af;}
.ifc-b{padding:11px 13px;}
.dirbar{font-size:9px;font-weight:700;padding:2px 8px;border-radius:7px;display:inline-block;margin-bottom:8px;}
.dir-in{background:#dbeafe;color:#1e40af;}.dir-out{background:#fef3c7;color:#92400e;}.dir-bi{background:#ede9fe;color:#5b21b6;}
.ifc-stats{display:flex;gap:10px;margin-bottom:8px;}
.ifc-stats .s{flex:1;}
.ifc-stats .sv{font-size:15px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.ifc-stats .sl{font-size:8px;color:var(--sub);}
.succbar{height:6px;background:#eef1f5;border-radius:3px;overflow:hidden;margin-bottom:4px;}
.succbar i{display:block;height:100%;border-radius:3px;}
.ifc-last{font-size:8.5px;color:var(--sub);font-family:'JetBrains Mono',monospace;}
.ifc-f{padding:8px 13px;background:#fafbfc;border-top:1px solid #eef1f5;display:flex;gap:6px;}
.ifc-f .btn{flex:1;justify-content:center;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
tbody td{padding:8px 9px;border-bottom:1px solid #eef1f5;}
tbody tr:hover td{background:#f0fdf4;}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.rs{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.rs-ok{background:#d1fae5;color:#065f46;}.rs-err{background:#fee2e2;color:#991b1b;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.err{border-left-color:#dc2626;}.toast.warn{border-left-color:#f59e0b;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">SYS-04</div>
  <div class="sh-tt"><div class="sh-en">Interface Monitor</div><div class="sh-ko">인터페이스 모니터 — 외부 시스템 연동 상태 감시</div></div>
  <span class="sh-tag">/sys/interface</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>연동 시스템 System</label>
    <select id="fSys" onchange="render()"><option value="">전체 All</option><option>SAP Business One</option><option>설비 (OPC-UA)</option><option>물류 (Barcode)</option><option>그룹웨어</option></select></div>
  <div class="fld"><label>상태 Status</label>
    <select id="fStat" onchange="render()"><option value="">전체</option><option value="ok">정상</option><option value="err">오류</option><option value="idle">대기</option></select></div>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div class="swt" style="margin-left:auto;"><span>실시간 갱신</span>
    <div class="tk on" id="autoTk" onclick="toggleAuto()"><i></i></div></div>
  <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#0891b2"><div class="kv" id="kTot">0</div><div class="kl">총 인터페이스 · Interfaces</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kOk">0</div><div class="kl">정상 가동 · Normal</div></div>
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kErr">0</div><div class="kl">오류 · Error</div></div>
    <div class="kpi" style="--c:#6366f1"><div class="kv" id="kCnt">0</div><div class="kl">금일 송수신 · Messages</div></div>
    <div class="kpi" style="--c:#f59e0b"><div class="kv" id="kRt">0</div><div class="kl">평균 응답시간 · ms</div></div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="panel">
    <div class="panel-h">📋 최근 연동 실행 로그</div>
    <table>
      <thead><tr><th>실행 시각</th><th>인터페이스</th><th>방향</th><th>건수</th><th>응답(ms)</th><th>결과</th></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var DIR={in:{ko:'수신',cls:'dir-in'},out:{ko:'송신',cls:'dir-out'},bi:{ko:'양방향',cls:'dir-bi'}};
var ST={ok:{ko:'정상',cls:'st-ok',col:'#10b981'},err:{ko:'오류',cls:'st-err',col:'#dc2626'},idle:{ko:'대기',cls:'st-idle',col:'#9ca3af'}};
var IFS=[
 {id:'IF01',nm:'SAP 공급계획 수신',sys:'SAP Business One',ic:'📥',dir:'in',cycle:'1시간',
  st:'ok',succ:99.6,cnt:142,rt:320,last:'08:00:12'},
 {id:'IF02',nm:'SAP 생산실적 송신',sys:'SAP Business One',ic:'📤',dir:'out',cycle:'30분',
  st:'ok',succ:99.9,cnt:288,rt:280,last:'08:30:05'},
 {id:'IF03',nm:'설비 데이터 수집',sys:'설비 (OPC-UA)',ic:'⚙️',dir:'in',cycle:'실시간',
  st:'ok',succ:98.4,cnt:8642,rt:45,last:'08:32:51'},
 {id:'IF04',nm:'바코드 출하 연동',sys:'물류 (Barcode)',ic:'🏷️',dir:'bi',cycle:'실시간',
  st:'err',succ:91.2,cnt:64,rt:1240,last:'08:28:33'},
 {id:'IF05',nm:'품질 SPC 데이터 연동',sys:'설비 (OPC-UA)',ic:'📊',dir:'in',cycle:'5분',
  st:'ok',succ:99.1,cnt:412,rt:88,last:'08:30:00'},
 {id:'IF06',nm:'그룹웨어 알림 송신',sys:'그룹웨어',ic:'✉️',dir:'out',cycle:'이벤트',
  st:'idle',succ:100,cnt:18,rt:210,last:'07:45:20'}
];
var LOG=[
 {t:'08:32:51',ifn:'설비 데이터 수집',dir:'in',cnt:120,rt:45,ok:true},
 {t:'08:30:05',ifn:'SAP 생산실적 송신',dir:'out',cnt:24,rt:280,ok:true},
 {t:'08:30:00',ifn:'품질 SPC 데이터 연동',dir:'in',cnt:35,rt:88,ok:true},
 {t:'08:28:33',ifn:'바코드 출하 연동',dir:'bi',cnt:0,rt:1240,ok:false},
 {t:'08:00:12',ifn:'SAP 공급계획 수신',dir:'in',cnt:142,rt:320,ok:true}
];
var auto=true,timer=null;
function nowStr(){return new Date().toTimeString().slice(0,8);}
function vis(){
  var fs=document.getElementById('fSys').value,ft=document.getElementById('fStat').value;
  return IFS.filter(function(f){return (!fs||f.sys===fs)&&(!ft||f.st===ft);});
}
function render(){
  document.getElementById('kTot').textContent=IFS.length;
  document.getElementById('kOk').textContent=IFS.filter(function(f){return f.st==='ok';}).length;
  document.getElementById('kErr').textContent=IFS.filter(function(f){return f.st==='err';}).length;
  document.getElementById('kCnt').textContent=IFS.reduce(function(s,f){return s+f.cnt;},0).toLocaleString();
  document.getElementById('kRt').textContent=Math.round(IFS.reduce(function(s,f){return s+f.rt;},0)/IFS.length);
  var v=vis(),h='';
  v.forEach(function(f){
    var s=ST[f.st];
    h+='<div class="ifc" style="--st:'+s.col+'">'+
      '<div class="ifc-h"><div class="ifc-ic">'+f.ic+'</div>'+
        '<div style="flex:1;"><div class="ifc-nm">'+f.nm+'</div><div class="ifc-sys">'+f.sys+'</div></div>'+
        '<span class="ifc-st '+s.cls+'"><span class="dot"></span>'+s.ko+'</span></div>'+
      '<div class="ifc-b">'+
        '<span class="dirbar '+DIR[f.dir].cls+'">'+DIR[f.dir].ko+' · 주기 '+f.cycle+'</span>'+
        '<div class="ifc-stats"><div class="s"><div class="sv">'+f.cnt.toLocaleString()+'</div><div class="sl">금일 건수</div></div>'+
          '<div class="s"><div class="sv">'+f.rt+'</div><div class="sl">응답 ms</div></div>'+
          '<div class="s"><div class="sv" style="color:'+(f.succ>=98?'#059669':'#dc2626')+'">'+f.succ+'%</div><div class="sl">성공률</div></div></div>'+
        '<div class="succbar"><i style="width:'+f.succ+'%;background:'+(f.succ>=98?'#10b981':'#dc2626')+'"></i></div>'+
        '<div class="ifc-last">최근 실행 '+f.last+'</div></div>'+
      '<div class="ifc-f">'+
        (f.st==='err'
          ?'<button class="btn btn-p btn-sm" onclick="retryIf(\''+f.id+'\')">↻ 재연동</button>'
          :'<button class="btn btn-s btn-sm" onclick="runIf(\''+f.id+'\')">▶ 수동 실행</button>')+
        '<button class="btn btn-s btn-sm" onclick="viewLog(\''+f.id+'\')">📄 로그</button></div></div>';
  });
  document.getElementById('cards').innerHTML=h||'<div style="grid-column:1/-1;text-align:center;color:#9ca3af;padding:30px;">조건에 맞는 인터페이스가 없습니다.</div>';
  renderLog();
}
function renderLog(){
  document.getElementById('logBody').innerHTML=LOG.slice(0,12).map(function(e){
    return '<tr><td class="mono">'+e.t+'</td><td>'+e.ifn+'</td>'+
      '<td><span class="dirbar '+DIR[e.dir].cls+'" style="margin:0;">'+DIR[e.dir].ko+'</span></td>'+
      '<td class="mono">'+e.cnt+'</td><td class="mono">'+e.rt+'</td>'+
      '<td>'+(e.ok?'<span class="rs rs-ok">성공</span>':'<span class="rs rs-err">실패</span>')+'</td></tr>';
  }).join('');
}
function byId(id){return IFS.filter(function(f){return f.id===id;})[0];}
function runIf(id){
  var f=byId(id);
  var cnt=Math.floor(Math.random()*40)+10,rt=Math.floor(Math.random()*200)+f.rt-100;
  f.cnt+=cnt;f.last=nowStr();
  LOG.unshift({t:nowStr(),ifn:f.nm,dir:f.dir,cnt:cnt,rt:Math.max(rt,30),ok:true});
  render();
  toast('',f.nm+' 실행 완료',cnt+'건 송수신 성공 (응답 '+Math.max(rt,30)+'ms).');
}
function retryIf(id){
  var f=byId(id);
  toast('info',f.nm+' 재연동 시도','오류 인터페이스 재연동을 시도합니다...');
  setTimeout(function(){
    f.st='ok';f.succ=Math.round((f.succ+8)*10)/10;if(f.succ>100)f.succ=99.5;
    var cnt=Math.floor(Math.random()*30)+15;f.cnt+=cnt;f.rt=Math.floor(Math.random()*150)+260;f.last=nowStr();
    LOG.unshift({t:nowStr(),ifn:f.nm,dir:f.dir,cnt:cnt,rt:f.rt,ok:true});
    render();
    toast('',f.nm+' 재연동 성공','연결이 복구되어 정상 상태로 전환되었습니다.');
  },1100);
}
function viewLog(id){var f=byId(id);
  toast('info',f.nm+' 연동 로그','최근 실행 '+f.last+' · 금일 '+f.cnt+'건 · 성공률 '+f.succ+'% (데모 — 상세 로그 생략)');}
function toggleAuto(){
  auto=!auto;document.getElementById('autoTk').classList.toggle('on',auto);
  if(auto){timer=setInterval(tick,4000);toast('info','실시간 갱신 ON','4초 간격으로 인터페이스 상태가 갱신됩니다.');}
  else{clearInterval(timer);toast('info','실시간 갱신 OFF','자동 갱신을 중지했습니다.');}
}
function tick(){
  IFS.forEach(function(f){
    if(f.st==='ok'&&f.cycle==='실시간'){
      var cnt=Math.floor(Math.random()*60)+20;f.cnt+=cnt;f.last=nowStr();
      f.rt=Math.max(30,f.rt+Math.floor((Math.random()-0.5)*20));
    }
  });
  render();
}
function exportCsv(){
  var v=vis();
  var csv='ID,Interface,System,Direction,Cycle,Status,TodayCount,ResponseMs,Success%,LastRun\n';
  v.forEach(function(f){
    csv+=[f.id,f.nm,f.sys,DIR[f.dir].ko,f.cycle,ST[f.st].ko,f.cnt,f.rt,f.succ,f.last].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='SYS_Interface_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','인터페이스 상태를 CSV로 내보냈습니다.');
}
function resetAll(){
  document.getElementById('fSys').value='';document.getElementById('fStat').value='';
  render();toast('info','초기화','인터페이스 필터를 초기화했습니다.');
}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='warn'?'⚠ ':type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4200);
}
render();
timer=setInterval(tick,4000);
</script>
</body>
</html>
