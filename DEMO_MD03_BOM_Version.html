<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MD-03 BOM Version · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#d97706;--pp-dk:#b45309;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#2b1a02,#3d2606);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fbbf24;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(251,191,36,.16);color:#fcd34d;border:1px solid rgba(251,191,36,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#d97706;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select,input{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.card-t{font-size:12px;font-weight:800;color:var(--pp);padding:11px 14px;border-bottom:1px solid var(--bd);background:#fffbeb;display:flex;align-items:center;gap:6px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
tbody td{padding:9px 9px;border-bottom:1px solid #eef1f5;}
tbody tr{cursor:pointer;}
tbody tr:hover td{background:#fffbeb;}
tbody tr.sel td{background:#fef3c7;}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.bdg{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.b0{background:#d1fae5;color:#065f46;}.b1{background:#fef3c7;color:#92400e;}
.b2{background:#f3f4f6;color:#4b5563;}.b3{background:#dbeafe;color:#1e40af;}.b4{background:#ede9fe;color:#5b21b6;}
.empty{padding:34px;text-align:center;color:#9ca3af;}
.dt-head{padding:14px 16px;border-bottom:1px solid #eef1f5;}
.dt-nm{font-size:15px;font-weight:800;}
.dt-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);}
.specs{padding:6px 16px;}
.srow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #eef1f5;font-size:12px;gap:12px;}
.srow .sk{color:var(--sub);white-space:nowrap;}.srow .sv{font-weight:700;text-align:right;}
.acts{display:flex;gap:7px;padding:12px 16px;}
.ov{position:fixed;inset:0;background:rgba(40,25,2,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:10px;width:460px;max-width:94vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);max-height:92vh;display:flex;flex-direction:column;}
.modal-h{background:linear-gradient(135deg,#2b1a02,#3d2606);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-h .mt{font-size:14px;font-weight:800;flex:1;}
.modal-h .mx{cursor:pointer;font-size:18px;color:rgba(255,255,255,.6);}
.modal-b{padding:18px;overflow-y:auto;}
.ff{margin-bottom:11px;}
.ff label{display:block;font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
.ff label .req{color:#dc2626;}
.ff select,.ff input,.ff textarea{width:100%;padding:6px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;}
.ff textarea{resize:vertical;min-height:52px;}
.modal-f{padding:12px 18px;background:#f6f8fa;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.err{border-left-color:#dc2626;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id" id="shId">MD-03</div>
  <div class="sh-tt"><div class="sh-en" id="shEn">BOM Version</div><div class="sh-ko" id="shKo"></div></div>
  <span class="sh-tag" id="shTag"></span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar" id="toolbar"></div>
<div class="body">
  <div class="kpis" id="kpis"></div>
  <div class="grid2">
    <div class="card">
      <div class="card-t" id="listT">List</div>
      <table><thead><tr id="thr"></tr></thead><tbody id="tbody"></tbody></table>
      <div class="empty" id="empty" style="display:none;">No matching data found.</div>
    </div>
    <div class="card" id="detail"><div class="empty">← Select an item from the list on the left.</div></div>
  </div>
</div>
<div class="ov" id="ovEd">
  <div class="modal">
    <div class="modal-h"><span class="mt" id="emTitle">Add</span><span class="mx" onclick="closeOv('ovEd')">✕</span></div>
    <div class="modal-b" id="emBody"></div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovEd')">Cancel</button>
      <button class="btn btn-p" id="emSave" onclick="saveRec()">＋ Add</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
/* ===== ENTITY CONFIG ===== */
var CFG={
  id:'MD-03',en:'BOM Version',ko:'BOM Version — Design Change History & Effective Period',tag:'/md/bom-version',
  idKey:'code',entity:'BOM Version',
  filters:[{k:'status',label:'Status'}],
  search:['code','product'],
  cols:[
    {k:'code',label:'Version Code',mono:true,bold:true},
    {k:'product',label:'Target Product'},
    {k:'ver',label:'Version',mono:true},
    {k:'effFrom',label:'Effective From',mono:true},
    {k:'status',label:'Status',badge:{'Active':'b0','Pending':'b3','Obsolete':'b2'}}
  ],
  fields:[
    {k:'code',label:'Version Code',type:'text',req:true,uniq:true,ph:'BV-TRIM-LH-003'},
    {k:'product',label:'Target Product',type:'text',req:true,ph:'Door Trim LH'},
    {k:'ver',label:'Version',type:'text',req:true,ph:'V3.0'},
    {k:'effFrom',label:'Effective From',type:'date',req:true},
    {k:'effTo',label:'Effective To',type:'date'},
    {k:'status',label:'Status',type:'select',opts:['Active','Pending','Obsolete']},
    {k:'reason',label:'Change Reason',type:'textarea',ph:'Design change details'},
    {k:'by',label:'Author',type:'select',opts:['Jennifer Park','Mike Johnson','Sarah Williams']}
  ],
  kpis:[
    {label:'Total BOM Versions',c:'#d97706',calc:function(d){return d.length;}},
    {label:'Active',c:'#16a34a',calc:function(d){return d.filter(function(r){return r.status==='Active';}).length;}},
    {label:'Pending',c:'#2563eb',calc:function(d){return d.filter(function(r){return r.status==='Pending';}).length;}},
    {label:'Obsolete',c:'#6b7280',calc:function(d){return d.filter(function(r){return r.status==='Obsolete';}).length;}}
  ],
  data:[
    {code:'BV-TRIM-LH-002',product:'Door Trim LH',ver:'V2.0',effFrom:'01/02/2026',effTo:'',status:'Active',reason:'Clip count changed 6→8',by:'Jennifer Park'},
    {code:'BV-TRIM-LH-001',product:'Door Trim LH',ver:'V1.0',effFrom:'03/10/2024',effTo:'01/01/2026',status:'Obsolete',reason:'Initial production BOM',by:'Jennifer Park'},
    {code:'BV-TRIM-RH-002',product:'Door Trim RH',ver:'V2.0',effFrom:'01/02/2026',effTo:'',status:'Active',reason:'Synced with LH change',by:'Jennifer Park'},
    {code:'CONS-UP-001',product:'Console Upper',ver:'V1.0',effFrom:'06/01/2024',effTo:'',status:'Active',reason:'Initial production BOM',by:'Mike Johnson'},
    {code:'BV-GRILLE-003',product:'Radiator Grille',ver:'V3.0',effFrom:'06/01/2026',effTo:'',status:'Pending',reason:'Chrome plating material change planned',by:'Sarah Williams'},
    {code:'BV-BUMPER-001',product:'Front Bumper',ver:'V1.0',effFrom:'08/12/2024',effTo:'',status:'Active',reason:'Initial production BOM',by:'Mike Johnson'}
  ]
};
/* ===== GENERIC MASTER ENGINE ===== */
var DATA=CFG.data,selKey=null,editKey=null;
function $(id){return document.getElementById(id);}
function init(){
  $('shId').textContent=CFG.id;$('shEn').textContent=CFG.en;
  $('shKo').textContent=CFG.ko.indexOf('—')>=0?CFG.ko.split('—')[1].trim():CFG.ko;
  $('shKo').textContent=CFG.ko;$('shTag').textContent=CFG.tag;
  document.title=CFG.id+' '+CFG.en+' · A-MES Demo';
  /* toolbar */
  var tb='';
  CFG.filters.forEach(function(f){
    var opts=[];DATA.forEach(function(r){if(opts.indexOf(r[f.k])<0)opts.push(r[f.k]);});
    tb+='<div class="fld"><label>'+f.label+'</label><select data-fk="'+f.k+'" onchange="render()">'+
      '<option value="">All</option>'+opts.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select></div>';
  });
  tb+='<div class="fld"><label>Search</label><input id="fKw" placeholder="Code / name" oninput="render()" style="width:150px;"></div>';
  tb+='<button class="btn btn-s btn-sm" onclick="resetAll()">↺ Reset</button>';
  tb+='<div style="margin-left:auto;display:flex;gap:8px;">'+
    '<button class="btn btn-p" onclick="openNew()">＋ Add '+CFG.entity+'</button>'+
    '<button class="btn btn-s" onclick="exportCsv()">📥 Export</button></div>';
  $('toolbar').innerHTML=tb;
  $('listT').textContent='📋 '+CFG.entity+' List';
  $('thr').innerHTML=CFG.cols.map(function(c){return '<th>'+c.label+'</th>';}).join('');
  render();
}
function fval(){var o={};[].slice.call(document.querySelectorAll('#toolbar select')).forEach(function(s){o[s.dataset.fk]=s.value;});return o;}
function vis(){
  var f=fval(),kw=($('fKw').value||'').trim().toLowerCase();
  return DATA.filter(function(r){
    for(var k in f){if(f[k]&&r[k]!==f[k])return false;}
    if(kw){var hit=CFG.search.some(function(sk){return (''+(r[sk]||'')).toLowerCase().indexOf(kw)>=0;});if(!hit)return false;}
    return true;});
}
function cellHtml(r,c){
  var v=r[c.k];
  if(c.badge){var cls=c.badge[v]||'b2';return '<span class="bdg '+cls+'">'+v+'</span>';}
  var s=(v===''||v==null)?'—':v;
  if(c.mono)return '<span class="mono"'+(c.bold?' style="font-weight:700;"':'')+'>'+s+'</span>';
  return s;
}
function render(){
  $('kpis').innerHTML=CFG.kpis.map(function(k){
    return '<div class="kpi" style="--c:'+k.c+'"><div class="kv">'+k.calc(DATA)+'</div><div class="kl">'+k.label+'</div></div>';
  }).join('');
  var v=vis(),h='';
  v.forEach(function(r){
    h+='<tr class="'+(selKey===r[CFG.idKey]?'sel':'')+'" onclick="pick(\''+r[CFG.idKey]+'\')">'+
      CFG.cols.map(function(c){return '<td>'+cellHtml(r,c)+'</td>';}).join('')+'</tr>';
  });
  $('tbody').innerHTML=h;
  $('empty').style.display=v.length?'none':'block';
  $('listT').textContent='📋 '+CFG.entity+' List — '+v.length+' items';
  if(selKey&&!byKey(selKey))selKey=null;
  renderDetail();
}
function byKey(k){return DATA.filter(function(r){return r[CFG.idKey]===k;})[0];}
function pick(k){selKey=k;render();}
function renderDetail(){
  var r=byKey(selKey);
  if(!r){$('detail').innerHTML='<div class="empty">← Select an item from the list on the left.</div>';return;}
  var nmField=CFG.fields[1]?CFG.fields[1].k:CFG.idKey;
  var h='<div class="card-t">📑 '+CFG.entity+' Detail</div>'+
    '<div class="dt-head"><div class="dt-nm">'+(r[nmField]||r[CFG.idKey])+'</div><div class="dt-id">'+r[CFG.idKey]+'</div></div>'+
    '<div class="specs">';
  CFG.fields.forEach(function(f){
    if(f.k===CFG.idKey)return;
    var v=r[f.k];if(v===''||v==null)v='—';
    h+='<div class="srow"><span class="sk">'+f.label+'</span><span class="sv">'+v+'</span></div>';
  });
  h+='</div><div class="acts"><button class="btn btn-s btn-sm" onclick="editRec()">✎ Edit</button>'+
    '<button class="btn btn-s btn-sm" onclick="delRec()">🗑 Delete</button></div>';
  $('detail').innerHTML=h;
}
function formHtml(r){
  return CFG.fields.map(function(f){
    var v=r?(r[f.k]==null?'':r[f.k]):'';
    var ctl;
    if(f.type==='select')ctl='<select data-fk="'+f.k+'">'+f.opts.map(function(o){return '<option'+(o===v?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
    else if(f.type==='textarea')ctl='<textarea data-fk="'+f.k+'" placeholder="'+(f.ph||'')+'">'+v+'</textarea>';
    else if(f.type==='number')ctl='<input type="number" data-fk="'+f.k+'" value="'+v+'">';
    else if(f.type==='date')ctl='<input type="date" data-fk="'+f.k+'" value="'+v+'">';
    else ctl='<input type="text" data-fk="'+f.k+'" value="'+v+'" placeholder="'+(f.ph||'')+'"'+(f.uniq&&r?' disabled':'')+'>';
    return '<div class="ff"><label>'+f.label+(f.req?' <span class="req">*</span>':'')+'</label>'+ctl+'</div>';
  }).join('');
}
function openNew(){
  editKey=null;$('emTitle').textContent='Add '+CFG.entity;$('emSave').textContent='＋ Add';
  $('emBody').innerHTML=formHtml(null);openOv('ovEd');
}
function editRec(){
  editKey=selKey;$('emTitle').textContent='Edit '+CFG.entity;$('emSave').textContent='💾 Save';
  $('emBody').innerHTML=formHtml(byKey(selKey));openOv('ovEd');
}
function saveRec(){
  var o={};
  [].slice.call(document.querySelectorAll('#emBody [data-fk]')).forEach(function(el){o[el.dataset.fk]=el.value.trim?el.value.trim():el.value;});
  for(var i=0;i<CFG.fields.length;i++){var f=CFG.fields[i];
    if(f.req&&!o[f.k]&&!(editKey&&f.uniq)){toast('err','Input Error',f.label+' is a required field.');return;}}
  if(editKey){var r=byKey(editKey);for(var k in o){if(k!==CFG.idKey)r[k]=o[k];}
    toast('','Updated',CFG.entity+' information has been updated.');
  }else{
    if(byKey(o[CFG.idKey])){toast('err','Duplicate Error','Code already exists.');return;}
    DATA.push(o);selKey=o[CFG.idKey];
    toast('','Added',o[CFG.idKey]+' '+CFG.entity+' has been added.');
  }
  closeOv('ovEd');render();
}
function delRec(){
  var r=byKey(selKey);var i=DATA.indexOf(r);
  if(i>=0)DATA.splice(i,1);selKey=null;render();
  toast('info','Deleted',CFG.entity+' item has been deleted.');
}
function exportCsv(){
  var v=vis();
  var csv=CFG.fields.map(function(f){return f.label;}).join(',')+'\n';
  v.forEach(function(r){csv+=CFG.fields.map(function(f){return '"'+(r[f.k]==null?'':r[f.k])+'"';}).join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=CFG.id+'_'+CFG.en.replace(/ /g,'')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export Complete','Exported '+v.length+' '+CFG.entity+' items to CSV.');
}
function resetAll(){
  [].slice.call(document.querySelectorAll('#toolbar select')).forEach(function(s){s.value='';});
  $('fKw').value='';render();toast('info','Reset','List filters have been reset.');
}
function openOv(id){$(id).classList.add('on');}
function closeOv(id){$(id).classList.remove('on');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  $('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
init();
</script>
</body>
</html>
