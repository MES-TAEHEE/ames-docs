<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INJ-06 Mold Change · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--sc:#ea580c;--sc-dk:#c2410c;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at 50% 30%,#1a1208,#0a0805);color:#e8e2d8;font-size:14px;display:flex;flex-direction:column;overflow:hidden;}
.head{flex-shrink:0;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--sc);background:rgba(0,0,0,.3);}
.head .id{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fb923c;}
.head .tt{flex:1;}
.head .en{font-size:17px;font-weight:800;color:#fff;}
.head .ko{font-size:11px;color:#a8997f;}
.back{background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:13px;font-weight:700;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:inherit;}
.back:active{background:rgba(234,88,12,.18);}
.timer{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:#fbbf24;background:rgba(0,0,0,.4);padding:6px 14px;border-radius:7px;border:1px solid #3a2a14;}
.live{font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:5px 10px;border-radius:5px;background:#f59e0b;color:#fff;display:flex;align-items:center;gap:5px;}
.live .d{width:7px;height:7px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.body{flex:1;display:flex;flex-direction:column;padding:18px 30px;gap:18px;min-height:0;overflow-y:auto;}
.body::-webkit-scrollbar{width:8px;}.body::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
/* mold swap visual */
.swap{display:grid;grid-template-columns:1fr 60px 1fr;gap:14px;align-items:center;}
.mold{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-top:4px solid var(--c);border-radius:12px;padding:16px 18px;}
.mold .lbl{font-size:10px;color:#a8997f;letter-spacing:2px;font-family:'JetBrains Mono',monospace;}
.mold .nm{font-size:17px;font-weight:800;color:#fff;margin-top:4px;}
.mold .cd{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c);margin-top:2px;}
.mold .meta{margin-top:9px;display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:11px;}
.mold .meta div{color:#a8997f;}
.mold .meta b{color:#fff;font-family:'JetBrains Mono',monospace;}
.swap-arr{font-size:46px;color:var(--sc);text-align:center;animation:slide 1.6s ease-in-out infinite;}
@keyframes slide{50%{transform:translateX(8px);}}
/* steps */
.steps{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;background:rgba(0,0,0,.3);padding:14px;border-radius:10px;border:1px solid #3a2a14;}
.st{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;padding:8px 4px;border-radius:8px;border:1px solid transparent;}
.st .nm{font-size:10px;font-weight:700;color:#a8997f;line-height:1.3;}
.st .cir{width:38px;height:38px;border-radius:50%;background:#1a1208;border:2px solid #3a2a14;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#a8997f;}
.st.done .cir{background:#16a34a;border-color:#16a34a;color:#fff;}
.st.done .nm{color:#86efac;}
.st.cur{background:rgba(234,88,12,.12);border-color:var(--sc);}
.st.cur .cir{background:var(--sc);border-color:var(--sc);color:#fff;animation:pulse 1.4s infinite;}
.st.cur .nm{color:#fff;font-weight:800;}
@keyframes pulse{50%{box-shadow:0 0 0 8px rgba(234,88,12,.3);}}
/* current step panel */
.curp{flex:1;background:linear-gradient(160deg,rgba(234,88,12,.1),rgba(234,88,12,.02));border:1px solid #3a2a14;border-top:4px solid var(--sc);border-radius:14px;padding:24px 30px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;}
.curp .num{font-family:'Bebas Neue',sans-serif;font-size:78px;color:#fdba74;line-height:.9;letter-spacing:3px;}
.curp .ti{font-size:24px;font-weight:800;color:#fff;}
.curp .ds{font-size:13px;color:#fdba74;max-width:580px;line-height:1.7;}
.curp .icon{font-size:60px;}
.checks{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:580px;margin-top:6px;}
.ck-r{background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:9px;font-size:12px;color:#cdc4b4;cursor:pointer;text-align:left;}
.ck-r .ck{width:24px;height:24px;border-radius:7px;background:#1a1208;border:2px solid #3a2a14;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#22c55e;}
.ck-r.on .ck{background:#16a34a;border-color:#16a34a;color:#fff;}
.ck-r.on{color:#fff;}
.scan-area{background:rgba(56,189,248,.08);border:2px dashed #38bdf8;border-radius:11px;padding:18px 26px;width:100%;max-width:520px;text-align:center;cursor:pointer;}
.scan-area:active{background:rgba(56,189,248,.18);}
.scan-area.scanned{background:rgba(34,197,94,.12);border-color:#22c55e;}
.scan-area .ic{font-size:34px;}
.scan-area .t{font-size:14px;font-weight:800;color:#7dd3fc;margin-top:5px;}
.scan-area.scanned .t{color:#86efac;}
.actions{display:flex;gap:11px;align-self:stretch;}
.btn-prev{padding:18px 28px;background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:14px;font-weight:700;border-radius:11px;cursor:pointer;font-family:inherit;}
.btn-next{flex:1;padding:18px;background:linear-gradient(180deg,var(--sc),var(--sc-dk));border:none;border-radius:11px;color:#fff;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 0 #7c2d12;}
.btn-next:disabled{background:#3a2a14;color:#6b5a3a;box-shadow:0 4px 0 #1a1208;cursor:not-allowed;}
.btn-next:not(:disabled):active{transform:translateY(2px);box-shadow:0 2px 0 #7c2d12;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1a1208;border-radius:10px;padding:13px 17px;border-left:5px solid var(--sc);font-size:13px;min-width:280px;max-width:400px;animation:ti .25s ease;color:#fff;box-shadow:0 8px 26px rgba(0,0,0,.5);}
.toast.err{border-left-color:#dc2626;}.toast.ok{border-left-color:#16a34a;}.toast.warn{border-left-color:#f59e0b;}
.toast .tt{font-weight:800;margin-bottom:3px;}
.toast .tb{color:#a8997f;font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="head">
  <button class="back" onclick="back()">‹ Dashboard</button>
  <div class="id">INJ-06</div>
  <div class="tt"><div class="en">Mold Change</div><div class="ko">Step-by-Step Changeover Workflow</div></div>
  <span class="timer" id="timer">00:00</span>
  <span class="live"><span class="d"></span>CHANGEOVER</span>
</div>
<div class="body">
  <div class="swap">
    <div class="mold" style="--c:#9ca3af">
      <div class="lbl">FROM · Removing Mold</div>
      <div class="nm">Door Trim RH Mold</div>
      <div class="cd">MD-INJ-102</div>
      <div class="meta">
        <div>Item <b>TRIM-RH-001</b></div>
        <div>Shots <b>472K / 500K</b></div>
        <div>Cavity <b>2 cav</b></div>
        <div>WO End <b>WO-2605-115</b></div>
      </div>
    </div>
    <div class="swap-arr">▶</div>
    <div class="mold" style="--c:#22c55e">
      <div class="lbl">TO · New Mold</div>
      <div class="nm">Console Upper Mold</div>
      <div class="cd">MD-INJ-105</div>
      <div class="meta">
        <div>Item <b>CONS-UP-001</b></div>
        <div>Shots <b>62K / 550K</b></div>
        <div>Cavity <b>1 cav</b></div>
        <div>Next WO <b>WO-2605-130</b></div>
      </div>
    </div>
  </div>
  <div class="steps" id="steps"></div>
  <div class="curp" id="curp"></div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var STEPS=[
 {n:'01',ti:'Pause Production',ds:'Safely stop current work and register downtime reason as "Mold Change".',icon:'⏸',type:'check',items:[
   'Finish remaining cycle then stop','Heater OFF / Safety Mode','Register downtime reason: Mold Change']},
 {n:'02',ti:'Remove Current Mold',ds:'Remove the currently mounted mold and move it to storage.',icon:'🔧',type:'check',items:[
   'Shut off coolant lines','Release clamp / Open mold','Lift mold and move to storage','Record mold condition']},
 {n:'03',ti:'Scan New Mold',ds:'Scan the barcode of the new mold to be mounted for verification.',icon:'📷',type:'scan'},
 {n:'04',ti:'Mount & Secure Mold',ds:'Mount the new mold to the injection machine and connect clamps / coolant lines.',icon:'🔩',type:'check',items:[
   'Lift & align mold','Engage clamp / Verify mold close','Connect coolant lines','Connect electrical/signal cables','Safety fence / light curtain OK']},
 {n:'05',ti:'Initial Sample Check',ds:'Produce 2~3 initial sample shots and verify they meet inspection spec.',icon:'🔍',type:'check',items:[
   'Wait for temp/pressure stabilization','Produce 2 initial shots','Dimensional & visual inspection','QC team approval recorded']},
 {n:'06',ti:'Resume Production',ds:'Mold change complete. Start next Work Order (WO-2605-130).',icon:'▶',type:'final'}
];
var idx=0,startT=Date.now(),secs=0,scanned=false,checks={};
function renderSteps(){
  document.getElementById('steps').innerHTML=STEPS.map(function(s,i){
    var cls=i<idx?'done':(i===idx?'cur':'');
    return '<div class="st '+cls+'"><div class="cir">'+(i<idx?'✓':s.n)+'</div><div class="nm">'+s.ti+'</div></div>';
  }).join('');
}
function renderCur(){
  var s=STEPS[idx];
  var h='<div class="icon">'+s.icon+'</div><div class="num">STEP '+s.n+'</div><div class="ti">'+s.ti+'</div><div class="ds">'+s.ds+'</div>';
  if(s.type==='check'){
    h+='<div class="checks">'+s.items.map(function(it,i){
      var on=(checks[idx]||{})[i];
      return '<div class="ck-r'+(on?' on':'')+'" data-i="'+i+'" onclick="chk('+idx+','+i+')"><span class="ck">'+(on?'✓':'')+'</span>'+it+'</div>';}).join('')+'</div>';
  }
  if(s.type==='scan'){
    h+='<div class="scan-area'+(scanned?' scanned':'')+'" onclick="scan()"><div class="ic">'+(scanned?'✅':'📷')+'</div>'+
      '<div class="t">'+(scanned?'Mold Verified — MD-INJ-105 Recognized':'Scan New Mold Barcode')+'</div></div>';
  }
  if(s.type==='final'){
    h+='<div style="font-size:14px;color:#86efac;font-weight:800;">Changeover Time <span id="finT">--</span></div>';
  }
  h+='<div class="actions">'+
    (idx>0?'<button class="btn-prev" onclick="prev()">‹ Previous</button>':'')+
    '<button class="btn-next" id="bn" '+(canNext()?'':'disabled')+' onclick="next()">'+(idx===STEPS.length-1?'✓ Complete Changeover':'Next Step ▶')+'</button></div>';
  document.getElementById('curp').innerHTML=h;
  if(s.type==='final'){
    var m=Math.floor(secs/60),sc=secs%60;
    document.getElementById('finT').textContent=String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  }
}
function canNext(){
  var s=STEPS[idx];
  if(s.type==='check'){
    var c=checks[idx]||{};
    return s.items.every(function(_,i){return c[i];});
  }
  if(s.type==='scan')return scanned;
  return true;
}
function chk(si,i){
  checks[si]=checks[si]||{};
  checks[si][i]=!checks[si][i];
  renderCur();
}
function scan(){
  if(scanned)return;
  scanned=true;
  toast('ok','Mold Barcode Recognized ✓','MD-INJ-105 (Console Upper Mold) verified. Matches Work Order mold.');
  renderCur();
}
function next(){
  if(!canNext())return;
  if(idx===STEPS.length-1){
    toast('ok','Mold Change Complete ✓','MD-INJ-102 → MD-INJ-105 changeover complete ('+document.getElementById('timer').textContent+' elapsed). Navigating to Resume Production... (Demo)');
    return;
  }
  idx++;renderSteps();renderCur();
  toast('','STEP '+STEPS[idx].n+' In Progress','Moved to '+STEPS[idx].ti+' step.');
}
function prev(){if(idx>0){idx--;renderSteps();renderCur();}}
function back(){toast('','Back','Returning to POP Dashboard. Changeover will be temporarily on hold.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='warn'?'⚠ ':type==='ok'?'✓ ':'ℹ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3500);
}
setInterval(function(){
  secs=Math.floor((Date.now()-startT)/1000);
  var m=Math.floor(secs/60),s=secs%60;
  document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
},1000);
renderSteps();renderCur();
</script>
</body>
</html>
