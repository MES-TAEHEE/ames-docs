<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FG-08 Shipment History · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid var(--pda);}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#22d3ee;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.tabs{display:flex;gap:6px;}
.tb{flex:1;padding:9px 0;background:#1a3540;border:1px solid #2c5564;border-radius:7px;text-align:center;font-size:11px;font-weight:800;color:#67e8f9;cursor:pointer;font-family:inherit;}
.tb.on{background:var(--pda);color:#fff;border-color:var(--pda);}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.k{background:rgba(6,182,212,.08);border:1px solid #1a3540;border-top:3px solid var(--c);border-radius:9px;padding:9px 12px;}
.k .l{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.k .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;color:var(--c);margin-top:2px;line-height:1;}
.k .s{font-size:9px;color:#7a9aa3;}
.section-h{font-size:10px;color:#67e8f9;text-transform:uppercase;letter-spacing:2px;font-weight:800;}
.day-grp{margin-top:5px;}
.day-h{font-size:10px;color:#fbbf24;font-weight:800;letter-spacing:1px;padding:7px 0 5px;border-bottom:1px solid #1a3540;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.sh{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer;border-left:3px solid var(--st);}
.sh:active{transform:scale(.98);}
.sh .info{flex:1;min-width:0;}
.sh .h{display:flex;align-items:center;gap:6px;}
.sh .id{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:800;color:#fff;}
.sh .t{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:#7a9aa3;}
.sh .cust{font-size:11px;color:#fff;margin-top:2px;font-weight:700;}
.sh .item{font-size:9.5px;color:#7a9aa3;margin-top:1px;}
.sh .qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:900;color:var(--st);flex-shrink:0;align-self:center;}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,var(--pda),var(--pda-dk));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #155e75;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #155e75;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid var(--pda);font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">FG-08</div>
    <div class="pda-t">출하 이력</div>
    <span class="live"><span class="d"></span>LIVE</span>
    <span class="pda-bat">🔋 63%</span>
  </div>
  <div class="pda-body">
    <div class="tabs">
      <button class="tb on" data-f="all" onclick="pickF(this)">전체</button>
      <button class="tb" data-f="sav" onclick="pickF(this)">SAV</button>
      <button class="tb" data-f="geo" onclick="pickF(this)">GEO</button>
    </div>
    <div class="kpis">
      <div class="k" style="--c:#22d3ee"><div class="l">최근 7일</div><div class="v">68</div><div class="s">출하 건</div></div>
      <div class="k" style="--c:#22c55e"><div class="l">총 수량</div><div class="v">14,580</div><div class="s">EA</div></div>
      <div class="k" style="--c:#fbbf24"><div class="l">정시율</div><div class="v">98.5%</div><div class="s">OTD</div></div>
      <div class="k" style="--c:#a78bfa"><div class="l">평균 LOT/건</div><div class="v">3.2</div><div class="s">LOT</div></div>
    </div>
    <div class="section-h">📚 출하 이력</div>
    <div id="list"></div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← 메뉴</button>
    <button onclick="exp()">📥 Export</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var HIST=[
 {dt:'05-21 09:24',id:'SO-2605-0313',cust:'GEO',item:'콘솔어퍼·그릴 외 3종',qty:'542 EA',st:'ok'},
 {dt:'05-21 08:24',id:'SO-2605-0312',cust:'SAV',item:'도어트림 LH·RH',qty:'480 EA',st:'ok'},
 {dt:'05-21 07:15',id:'SO-2605-0311',cust:'SAV',item:'사이드 몰딩',qty:'320 EA',st:'ok'},
 {dt:'05-20 17:10',id:'SO-2605-0310',cust:'GEO',item:'프론트 범퍼',qty:'120 EA',st:'late'},
 {dt:'05-20 14:30',id:'SO-2605-0309',cust:'SAV',item:'콘솔 조립',qty:'240 EA',st:'ok'},
 {dt:'05-20 11:00',id:'SO-2605-0308',cust:'GEO',item:'라디에이터 그릴',qty:'150 EA',st:'ok'},
 {dt:'05-20 09:15',id:'SO-2605-0307',cust:'GEO',item:'콘솔어퍼',qty:'180 EA',st:'ok'},
 {dt:'05-19 16:42',id:'SO-2605-0306',cust:'SAV',item:'도어트림 RH',qty:'260 EA',st:'ok'},
 {dt:'05-19 13:30',id:'SO-2605-0305',cust:'GEO',item:'프론트 범퍼',qty:'110 EA',st:'ok'},
 {dt:'05-19 09:00',id:'SO-2605-0304',cust:'SAV',item:'사이드 몰딩·도어트림',qty:'420 EA',st:'ok'}
];
var f='all';
function pickF(e){[].slice.call(document.querySelectorAll('.tb')).forEach(function(x){x.classList.remove('on');});e.classList.add('on');f=e.dataset.f;render();}
function render(){
  var rows=HIST.filter(function(r){return f==='all'||(f==='sav'&&r.cust==='SAV')||(f==='geo'&&r.cust==='GEO');});
  /* group by date */
  var groups={};rows.forEach(function(r){var d=r.dt.slice(0,5);(groups[d]=groups[d]||[]).push(r);});
  var h='';
  Object.keys(groups).forEach(function(d){
    h+='<div class="day-grp"><div class="day-h">📅 2026-'+d+' ('+groups[d].length+' 건)</div>';
    groups[d].forEach(function(r){
      var col=r.st==='ok'?'#22c55e':'#fbbf24';
      h+='<div class="sh" style="--st:'+col+'" onclick="view(\''+r.id+'\')">'+
        '<div class="info"><div class="h"><span class="id">'+r.id+'</span><span class="t">'+r.dt.slice(6)+(r.st==='late'?' ⚠':' ✓')+'</span></div>'+
        '<div class="cust">'+r.cust+'</div>'+
        '<div class="item">'+r.item+'</div></div>'+
        '<div class="qty">'+r.qty+'</div></div>';
    });
    h+='</div>';
  });
  document.getElementById('list').innerHTML=h||'<div style="text-align:center;color:#7a9aa3;padding:30px;font-size:12px;">출하 이력이 없습니다.</div>';
}
function view(id){toast('',id+' 상세','출하 상세·거래명세서 조회. (데모)');}
function exp(){toast('','📥 Export','출하 이력을 CSV로 내보냈습니다.');}
function back(){toast('','PDA 메뉴','PDA 메뉴로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">• '+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
render();
</script>
</body>
</html>
