<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WH-05 Inventory Adjust · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid var(--pda);}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#22d3ee;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.section-h{font-size:10px;color:#67e8f9;text-transform:uppercase;letter-spacing:2px;font-weight:800;}
.scan-box{background:rgba(34,197,94,.13);border:2px solid #22c55e;border-radius:11px;padding:14px;text-align:center;}
.scan-box .ic{font-size:30px;}
.scan-box .t{font-size:14px;font-weight:800;color:#86efac;margin-top:5px;}
.scan-box .s{font-size:10px;color:#7a9aa3;margin-top:3px;}
.item-card{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-top:3px solid var(--pda);border-radius:10px;padding:13px 15px;}
.item-card .nm{font-size:14px;font-weight:800;color:#fff;}
.item-card .id{font-family:'JetBrains Mono',monospace;font-size:11px;color:#22d3ee;margin-top:2px;}
.item-card .meta{display:flex;justify-content:space-between;margin-top:9px;font-size:11px;}
.item-card .meta b{color:#fff;font-family:'JetBrains Mono',monospace;}
.qty-cmp{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:center;}
.qbox{background:rgba(255,255,255,.04);border:1px solid #1a3540;border-radius:10px;padding:13px;text-align:center;}
.qbox .l{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.qbox .v{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:900;color:#fff;line-height:1;margin-top:5px;}
.qbox .u{font-size:9px;color:#7a9aa3;}
.qbox.new{border-top:3px solid var(--pda);}.qbox.new .v{color:#22d3ee;}
.arr{font-size:22px;color:#fbbf24;text-align:center;}
.qty-row{display:flex;gap:6px;}
.qty-row button{flex:1;padding:11px;background:#1a3540;border:1px solid #2c5564;color:#fff;font-size:14px;font-weight:800;border-radius:7px;cursor:pointer;font-family:inherit;}
.qty-row button:active{background:var(--pda);}
.diff{background:linear-gradient(160deg,rgba(220,38,38,.1),rgba(220,38,38,.02));border:1px solid #dc2626;border-radius:9px;padding:11px 14px;text-align:center;}
.diff .l{font-size:9px;color:#fca5a5;font-family:'JetBrains Mono',monospace;}
.diff .v{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:900;color:#fca5a5;}
.reasons{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.rsn{padding:10px 8px;background:rgba(255,255,255,.04);border:1.5px solid #1a3540;color:#cddde2;font-size:11.5px;font-weight:700;border-radius:7px;cursor:pointer;font-family:inherit;text-align:center;}
.rsn:active{transform:scale(.97);}
.rsn.on{background:rgba(6,182,212,.18);border-color:var(--pda);color:#22d3ee;}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,var(--pda),var(--pda-dk));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #155e75;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #155e75;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid var(--pda);font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast.ok{border-left-color:#16a34a;}.toast.warn{border-left-color:#f59e0b;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">WH-05</div>
    <div class="pda-t">재고 조정</div>
    <span class="live"><span class="d"></span>LIVE</span>
    <span class="pda-bat">🔋 74%</span>
  </div>
  <div class="pda-body">
    <div class="scan-box">
      <div class="ic">✅</div>
      <div class="t">RM-PP-BLK 인식</div>
      <div class="s">A-03-2 / PP 수지 (블랙)</div>
    </div>
    <div class="item-card">
      <div class="nm">PP 수지 (블랙)</div>
      <div class="id">RM-PP-BLK · 로케이션 A-03-2</div>
      <div class="meta"><span>최근 입고</span><b>2026-05-21 08:42</b></div>
      <div class="meta"><span>최근 출고</span><b>2026-05-21 09:08</b></div>
    </div>
    <div class="section-h">📊 재고 조정</div>
    <div class="qty-cmp">
      <div class="qbox"><div class="l">전산 재고</div><div class="v">8,200</div><div class="u">KG</div></div>
      <div class="arr">▶</div>
      <div class="qbox new"><div class="l">실사 재고</div><div class="v" id="newQ">8,150</div><div class="u">KG</div></div>
    </div>
    <div class="qty-row">
      <button onclick="adj(-100)">−100</button>
      <button onclick="adj(-10)">−10</button>
      <button onclick="adj(10)">+10</button>
      <button onclick="adj(100)">+100</button>
    </div>
    <div class="diff" id="diff">
      <div class="l">조정 차이 · DIFF</div>
      <div class="v" id="dV">−50 KG</div>
    </div>
    <div class="section-h">📋 조정 사유</div>
    <div class="reasons">
      <div class="rsn on" onclick="pickR(this)" data-r="실사 차이">실사 차이</div>
      <div class="rsn" onclick="pickR(this)" data-r="파손·폐기">파손·폐기</div>
      <div class="rsn" onclick="pickR(this)" data-r="누락 입고">누락 입고</div>
      <div class="rsn" onclick="pickR(this)" data-r="기타">기타</div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← 취소</button>
    <button onclick="submit()">✓ 조정 등록</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var q=8150,rsn='실사 차이';
function adj(d){q+=d;update();}
function update(){
  document.getElementById('newQ').textContent=q.toLocaleString();
  var diff=q-8200;
  document.getElementById('dV').textContent=(diff>=0?'+':'')+diff+' KG';
  document.getElementById('diff').style.borderColor=diff===0?'#16a34a':(diff<0?'#dc2626':'#fbbf24');
}
function pickR(e){[].slice.call(document.querySelectorAll('.rsn')).forEach(function(x){x.classList.remove('on');});e.classList.add('on');rsn=e.dataset.r;}
function submit(){
  toast('ok','재고 조정 등록 ✓','RM-PP-BLK A-03-2 — '+q+' KG ('+rsn+') 조정 완료. 팀장 승인 대기.');
}
function back(){toast('','뒤로','PDA 메뉴로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='ok'?'✓ ':'• ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
update();
</script>
</body>
</html>
