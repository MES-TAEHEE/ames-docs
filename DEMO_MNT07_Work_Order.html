<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MNT-07 Maintenance Work Order · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select,input,textarea{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-w{background:#f59e0b;color:#fff;}.btn-w:hover{background:#d97706;}
.btn-b{background:#2563eb;color:#fff;}.btn-b:hover{background:#1d4ed8;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:23px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
tbody td{padding:8px 9px;border-bottom:1px solid #eef1f5;vertical-align:middle;}
tbody tr:hover td{background:#f0fdf4;}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.pri{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.pri1{background:#fee2e2;color:#991b1b;}.pri2{background:#ffedd5;color:#9a3412;}.pri3{background:#e0f2fe;color:#075985;}
.wt{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:#f3f4f6;color:#4b5563;}
.stt{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.stt .dot{width:6px;height:6px;border-radius:50%;}
.s-iss{background:#f3f4f6;color:#4b5563;}.s-iss .dot{background:#9ca3af;}
.s-asn{background:#fef3c7;color:#92400e;}.s-asn .dot{background:#f59e0b;}
.s-prog{background:#dbeafe;color:#1e40af;}.s-prog .dot{background:#3b82f6;}
.s-done{background:#d1fae5;color:#065f46;}.s-done .dot{background:#10b981;}
.empty{padding:26px;text-align:center;color:#9ca3af;}
.ov{position:fixed;inset:0;background:rgba(3,20,14,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:10px;width:450px;max-width:94vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);max-height:92vh;display:flex;flex-direction:column;}
.modal-h{background:linear-gradient(135deg,#03251a,#052e1f);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-h .mt{font-size:14px;font-weight:800;flex:1;}
.modal-h .mx{cursor:pointer;font-size:18px;color:rgba(255,255,255,.6);}
.modal-b{padding:18px;overflow-y:auto;}
.ff{margin-bottom:11px;}
.ff label{display:block;font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
.ff label .req{color:#dc2626;}
.ff select,.ff input,.ff textarea{width:100%;}
.ff textarea{resize:vertical;min-height:52px;}
.ff2{display:flex;gap:9px;}.ff2>div{flex:1;}
.modal-f{padding:12px 18px;background:#f6f8fa;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #eef1f5;font-size:12px;gap:14px;}
.drow .dk{color:var(--sub);white-space:nowrap;}
.drow .dv{font-weight:700;text-align:right;}
.steps{display:flex;gap:4px;margin:12px 0;}
.step{flex:1;text-align:center;font-size:9px;font-weight:700;padding:5px 2px;border-radius:5px;background:#f3f4f6;color:#9ca3af;}
.step.on{background:var(--pp);color:#fff;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:250px;max-width:380px;animation:ti .25s ease;}
.toast.err{border-left-color:#dc2626;}.toast.warn{border-left-color:#f59e0b;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">MNT-07</div>
  <div class="sh-tt"><div class="sh-en">Maintenance Work Order</div><div class="sh-ko">정비 작업지시 — 정비 WO 발행·배정·진행·완료</div></div>
  <span class="sh-tag">/mnt/wo</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>상태 Status</label>
    <select id="fStat" onchange="render()"><option value="">전체</option><option value="iss">발행</option><option value="asn">배정</option><option value="prog">진행 중</option><option value="done">완료</option></select></div>
  <div class="fld"><label>우선순위 Priority</label>
    <select id="fPri" onchange="render()"><option value="">전체</option><option value="1">긴급</option><option value="2">높음</option><option value="3">보통</option></select></div>
  <div class="fld"><label>유형 Type</label>
    <select id="fType" onchange="render()"><option value="">전체</option><option>예방정비</option><option>사후정비</option><option>개선</option></select></div>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-p" onclick="openNew()">＋ 작업지시 발행</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
  </div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#9ca3af"><div class="kv" id="kIss">0</div><div class="kl">미배정 · 발행</div></div>
    <div class="kpi" style="--c:#f59e0b"><div class="kv" id="kAsn">0</div><div class="kl">배정 · Assigned</div></div>
    <div class="kpi" style="--c:#3b82f6"><div class="kv" id="kProg">0</div><div class="kl">진행 중 · In Progress</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kDone">0</div><div class="kl">완료 · Completed</div></div>
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kUrg">0</div><div class="kl">긴급 미완료 · Urgent</div></div>
  </div>
  <div class="panel">
    <div class="panel-h">🧰 정비 작업지시 — <span id="sub" style="font-weight:400;color:#656d76;">0건</span></div>
    <table>
      <thead><tr>
        <th>WO 번호</th><th>설비</th><th>작업 내용</th><th>유형</th>
        <th style="text-align:center;">우선순위</th><th>담당</th><th style="text-align:center;">상태</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">조건에 맞는 작업지시가 없습니다.</div>
  </div>
</div>

<!-- new WO modal -->
<div class="ov" id="ovNew">
  <div class="modal">
    <div class="modal-h"><span class="mt">정비 작업지시 발행</span><span class="mx" onclick="closeOv('ovNew')">✕</span></div>
    <div class="modal-b">
      <div class="ff"><label>대상 설비 <span class="req">*</span></label><select id="nEq"></select></div>
      <div class="ff"><label>작업 내용 <span class="req">*</span></label>
        <textarea id="nTitle" placeholder="예: 사출기 2호기 구동모터 베어링 교체"></textarea></div>
      <div class="ff2">
        <div class="ff"><label>정비 유형 <span class="req">*</span></label>
          <select id="nType"><option>예방정비</option><option>사후정비</option><option>개선</option></select></div>
        <div class="ff"><label>우선순위 <span class="req">*</span></label>
          <select id="nPri"><option value="1">긴급</option><option value="2">높음</option><option value="3" selected>보통</option></select></div>
      </div>
      <div class="ff"><label>완료 희망일</label><input type="date" id="nDue" value="2026-05-23"></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovNew')">취소</button>
      <button class="btn btn-p" onclick="addWO()">＋ 발행</button>
    </div>
  </div>
</div>
<!-- assign modal -->
<div class="ov" id="ovAsn">
  <div class="modal">
    <div class="modal-h"><span class="mt">정비 담당 배정</span><span class="mx" onclick="closeOv('ovAsn')">✕</span></div>
    <div class="modal-b">
      <div id="asnInfo" style="margin-bottom:12px;"></div>
      <div class="ff"><label>정비 담당자 <span class="req">*</span></label>
        <select id="asnBy"><option>이정비 (정비반장)</option><option>박설비 (기계)</option><option>최전기 (전기)</option><option>금형반</option><option>외주 (설비업체)</option></select></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovAsn')">취소</button>
      <button class="btn btn-w" onclick="confirmAssign()">배정</button>
    </div>
  </div>
</div>
<!-- complete modal -->
<div class="ov" id="ovDone">
  <div class="modal">
    <div class="modal-h"><span class="mt">정비 완료 처리</span><span class="mx" onclick="closeOv('ovDone')">✕</span></div>
    <div class="modal-b">
      <div id="dnInfo" style="margin-bottom:12px;"></div>
      <div class="ff"><label>정비 결과 <span class="req">*</span></label>
        <textarea id="dnResult" placeholder="예: 베어링 2개 교체, 윤활 후 시운전 정상 확인"></textarea></div>
      <div class="ff2">
        <div class="ff"><label>소요 시간 (분) <span class="req">*</span></label><input type="number" id="dnMin" value="90" min="1" step="10"></div>
        <div class="ff"><label>사용 자재 건수</label><input type="number" id="dnParts" value="2" min="0"></div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovDone')">취소</button>
      <button class="btn btn-p" onclick="confirmComplete()">✓ 완료 처리</button>
    </div>
  </div>
</div>
<!-- detail modal -->
<div class="ov" id="ovDt">
  <div class="modal">
    <div class="modal-h"><span class="mt">작업지시 상세</span><span class="mx" onclick="closeOv('ovDt')">✕</span></div>
    <div class="modal-b" id="dtBody"></div>
    <div class="modal-f"><button class="btn btn-p" onclick="closeOv('ovDt')">확인</button></div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var EQLIST=[
 {id:'EQ-INJ-001',nm:'사출기 1호기'},{id:'EQ-INJ-002',nm:'사출기 2호기'},
 {id:'EQ-ASY-001',nm:'조립1라인 컨베이어'},{id:'EQ-ASY-002',nm:'토크 체결기 #1'},
 {id:'EQ-PNT-001',nm:'도장 부스 1라인'},{id:'EQ-INS-001',nm:'비전 검사기 #1'},
 {id:'EQ-UTL-001',nm:'공기압축기 #1'}
];
var PRI={'1':{ko:'긴급',cls:'pri1'},'2':{ko:'높음',cls:'pri2'},'3':{ko:'보통',cls:'pri3'}};
var ST={iss:{ko:'발행',cls:'s-iss'},asn:{ko:'배정',cls:'s-asn'},prog:{ko:'진행 중',cls:'s-prog'},done:{ko:'완료',cls:'s-done'}};
var STEPS=[['iss','발행'],['asn','배정'],['prog','진행'],['done','완료']];
var WO=[
 {id:'MWO-2605-031',eq:'EQ-INJ-002',title:'구동모터 과열 — 베어링 교체 및 윤활',type:'사후정비',pri:'1',
  st:'prog',by:'이정비 (정비반장)',created:'2026-05-20',due:'2026-05-21',result:'',min:0,parts:0},
 {id:'MWO-2605-030',eq:'EQ-ASY-002',title:'토크 캘리브레이션 및 센서 점검',type:'예방정비',pri:'3',
  st:'asn',by:'최전기 (전기)',created:'2026-05-20',due:'2026-05-22',result:'',min:0,parts:0},
 {id:'MWO-2605-029',eq:'EQ-INJ-001',title:'형개 가이드 마모 점검 및 윤활 보강',type:'예방정비',pri:'2',
  st:'iss',by:'-',created:'2026-05-20',due:'2026-05-23',result:'',min:0,parts:0},
 {id:'MWO-2605-027',eq:'EQ-PNT-001',title:'분사노즐 3개 교체',type:'사후정비',pri:'2',
  st:'done',by:'박설비 (기계)',created:'2026-05-19',due:'2026-05-19',result:'노즐 3개 교체, 도막 균일도 정상',min:95,parts:3},
 {id:'MWO-2605-024',eq:'EQ-UTL-001',title:'압축기 밸브 플레이트 교체',type:'사후정비',pri:'1',
  st:'done',by:'외주 (설비업체)',created:'2026-05-16',due:'2026-05-16',result:'밸브 플레이트 교체, 토출압력 정상화',min:155,parts:1},
 {id:'MWO-2605-022',eq:'EQ-INS-001',title:'비전 검사기 조명 LED 교체',type:'사후정비',pri:'3',
  st:'done',by:'최전기 (전기)',created:'2026-05-14',due:'2026-05-14',result:'LED 바 교체 완료',min:35,parts:1},
 {id:'MWO-2605-019',eq:'EQ-ASY-001',title:'컨베이어 벨트 장력 조정',type:'예방정비',pri:'3',
  st:'done',by:'이정비 (정비반장)',created:'2026-05-11',due:'2026-05-11',result:'벨트 장력 재조정, 정렬 확인',min:40,parts:0},
 {id:'MWO-2605-016',eq:'EQ-INJ-001',title:'사출기 노후 호퍼 개선 설치',type:'개선',pri:'3',
  st:'asn',by:'박설비 (기계)',created:'2026-05-12',due:'2026-05-26',result:'',min:0,parts:0}
];
var seq=32,curId=null;
function eqNm(id){var e=EQLIST.filter(function(x){return x.id===id;})[0];return e?e.nm:id;}
function byId(id){return WO.filter(function(w){return w.id===id;})[0];}
function initSel(){
  document.getElementById('nEq').innerHTML=EQLIST.map(function(e){return '<option value="'+e.id+'">'+e.id+' '+e.nm+'</option>';}).join('');
}
function vis(){
  var fs=document.getElementById('fStat').value,fp=document.getElementById('fPri').value,ft=document.getElementById('fType').value;
  return WO.filter(function(w){
    if(fs&&w.st!==fs)return false;
    if(fp&&w.pri!==fp)return false;
    if(ft&&w.type!==ft)return false;
    return true;});
}
function render(){
  document.getElementById('kIss').textContent=WO.filter(function(w){return w.st==='iss';}).length;
  document.getElementById('kAsn').textContent=WO.filter(function(w){return w.st==='asn';}).length;
  document.getElementById('kProg').textContent=WO.filter(function(w){return w.st==='prog';}).length;
  document.getElementById('kDone').textContent=WO.filter(function(w){return w.st==='done';}).length;
  document.getElementById('kUrg').textContent=WO.filter(function(w){return w.pri==='1'&&w.st!=='done';}).length;
  var v=vis(),h='';
  v.forEach(function(w){
    h+='<tr><td class="mono" style="font-weight:700;cursor:pointer;" onclick="detail(\''+w.id+'\')">'+w.id+'</td>'+
      '<td><b>'+eqNm(w.eq)+'</b></td>'+
      '<td style="max-width:230px;">'+w.title+'</td>'+
      '<td><span class="wt">'+w.type+'</span></td>'+
      '<td style="text-align:center;"><span class="pri '+PRI[w.pri].cls+'">'+PRI[w.pri].ko+'</span></td>'+
      '<td>'+(w.by==='-'?'<span style="color:#9ca3af;">미배정</span>':w.by)+'</td>'+
      '<td style="text-align:center;"><span class="stt '+ST[w.st].cls+'"><span class="dot"></span>'+ST[w.st].ko+'</span></td>'+
      '<td>'+actionBtn(w)+'</td></tr>';
  });
  document.getElementById('tbody').innerHTML=h;
  document.getElementById('empty').style.display=v.length?'none':'block';
  document.getElementById('sub').textContent=v.length+'건';
}
function actionBtn(w){
  if(w.st==='iss')return '<button class="btn btn-w btn-sm" onclick="openAssign(\''+w.id+'\')">담당 배정</button>';
  if(w.st==='asn')return '<button class="btn btn-b btn-sm" onclick="startWO(\''+w.id+'\')">▶ 작업 시작</button>';
  if(w.st==='prog')return '<button class="btn btn-p btn-sm" onclick="openDone(\''+w.id+'\')">✓ 완료 처리</button>';
  return '<button class="btn btn-s btn-sm" onclick="detail(\''+w.id+'\')">상세</button>';
}
function openNew(){
  document.getElementById('nTitle').value='';document.getElementById('nPri').value='3';
  document.getElementById('nDue').value='2026-05-23';openOv('ovNew');
}
function addWO(){
  var title=document.getElementById('nTitle').value.trim();
  if(!title){toast('err','입력 오류','작업 내용은 필수 항목입니다.');return;}
  var id='MWO-2605-0'+(seq++);
  WO.unshift({id:id,eq:document.getElementById('nEq').value,title:title,
    type:document.getElementById('nType').value,pri:document.getElementById('nPri').value,
    st:'iss',by:'-',created:'2026-05-20',due:document.getElementById('nDue').value,result:'',min:0,parts:0});
  closeOv('ovNew');render();
  toast('','작업지시 발행',id+' — '+eqNm(document.getElementById('nEq').value)+' 정비 WO가 발행되었습니다.');
}
function openAssign(id){
  curId=id;var w=byId(id);
  document.getElementById('asnInfo').innerHTML=
    '<div class="drow"><span class="dk">WO 번호</span><span class="dv">'+w.id+'</span></div>'+
    '<div class="drow"><span class="dk">설비</span><span class="dv">'+eqNm(w.eq)+'</span></div>'+
    '<div class="drow"><span class="dk">작업</span><span class="dv" style="max-width:260px;">'+w.title+'</span></div>';
  openOv('ovAsn');
}
function confirmAssign(){
  var w=byId(curId);w.by=document.getElementById('asnBy').value;w.st='asn';
  closeOv('ovAsn');render();
  toast('',w.id+' 배정','정비 담당 '+w.by+' 배정 완료. 작업 시작 대기 상태입니다.');
}
function startWO(id){
  var w=byId(id);w.st='prog';render();
  toast('info',w.id+' 작업 시작','정비 작업이 진행 중 상태로 전환되었습니다.');
}
function openDone(id){
  curId=id;var w=byId(id);
  document.getElementById('dnInfo').innerHTML=
    '<div class="drow"><span class="dk">WO 번호</span><span class="dv">'+w.id+'</span></div>'+
    '<div class="drow"><span class="dk">설비</span><span class="dv">'+eqNm(w.eq)+'</span></div>'+
    '<div class="drow"><span class="dk">담당</span><span class="dv">'+w.by+'</span></div>';
  document.getElementById('dnResult').value='';
  openOv('ovDone');
}
function confirmComplete(){
  var w=byId(curId);
  var result=document.getElementById('dnResult').value.trim();
  if(!result){toast('err','입력 오류','정비 결과는 필수 항목입니다.');return;}
  var min=parseInt(document.getElementById('dnMin').value,10);
  if(isNaN(min)||min<1){toast('err','입력 오류','소요 시간을 확인하세요.');return;}
  w.st='done';w.result=result;w.min=min;w.parts=parseInt(document.getElementById('dnParts').value,10)||0;
  closeOv('ovDone');render();
  toast('',w.id+' 정비 완료','소요 '+min+'분, 자재 '+w.parts+'건으로 정비가 완료되었습니다.');
}
function detail(id){
  var w=byId(id);
  var si=STEPS.map(function(s){return s[0];}).indexOf(w.st);
  var steps='<div class="steps">'+STEPS.map(function(s,i){
    return '<div class="step'+(i<=si?' on':'')+'">'+s[1]+'</div>';}).join('')+'</div>';
  var rows=[
    ['WO 번호',w.id],['설비',eqNm(w.eq)+' ('+w.eq+')'],['작업 내용',w.title],
    ['정비 유형','<span class="wt">'+w.type+'</span>'],
    ['우선순위','<span class="pri '+PRI[w.pri].cls+'">'+PRI[w.pri].ko+'</span>'],
    ['담당',w.by],['발행일',w.created],['완료 희망일',w.due]
  ];
  if(w.result)rows.push(['정비 결과',w.result]);
  if(w.min)rows.push(['소요 시간',w.min+'분']);
  if(w.parts)rows.push(['사용 자재',w.parts+'건']);
  document.getElementById('dtBody').innerHTML=steps+rows.map(function(r){
    return '<div class="drow"><span class="dk">'+r[0]+'</span><span class="dv" style="max-width:270px;">'+r[1]+'</span></div>';}).join('');
  openOv('ovDt');
}
function exportCsv(){
  var v=vis();
  var csv='WO_ID,Equipment,EquipName,Title,Type,Priority,Status,Assignee,Created,Due,Result,DurationMin,Parts\n';
  v.forEach(function(w){
    csv+=[w.id,w.eq,eqNm(w.eq),'"'+w.title+'"',w.type,PRI[w.pri].ko,ST[w.st].ko,w.by,w.created,w.due,
      '"'+(w.result||'')+'"',w.min,w.parts].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='MNT_WorkOrder_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','정비 작업지시 '+v.length+'건을 CSV로 내보냈습니다.');
}
function resetAll(){
  document.getElementById('fStat').value='';document.getElementById('fPri').value='';
  document.getElementById('fType').value='';render();
  toast('info','초기화','작업지시 필터를 초기화했습니다.');
}
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='warn'?'⚠ ':type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4400);
}
initSel();render();
</script>
</body>
</html>
