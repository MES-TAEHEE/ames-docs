<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SYS-08 System Health · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.upd{font-size:9px;color:#9ca3af;font-family:'JetBrains Mono',monospace;}
.swt{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:var(--sub);}
.swt .tk{width:34px;height:18px;border-radius:9px;background:#cbd5e1;position:relative;cursor:pointer;transition:background .15s;}
.swt .tk.on{background:var(--pp);}
.swt .tk i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s;}
.swt .tk.on i{left:18px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.health-hero{background:linear-gradient(135deg,#03251a,#064e3b);border-radius:10px;padding:16px 22px;display:flex;align-items:center;gap:20px;margin-bottom:16px;color:#fff;}
.hh-dot{width:54px;height:54px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 0 0 6px rgba(16,185,129,.2);}
.hh-info h3{font-size:16px;font-weight:800;}
.hh-info p{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;}
.hh-meta{margin-left:auto;text-align:right;font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.6);line-height:1.7;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:23px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:14px 16px;}
.card-t{font-size:12px;font-weight:800;color:var(--pp);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.svc{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed #eef1f5;}
.svc:last-child{border:none;}
.svc-d{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.svc-nm{flex:1;font-size:11.5px;font-weight:700;}
.svc-nm small{display:block;font-weight:400;color:#9ca3af;font-size:9px;font-family:'JetBrains Mono',monospace;}
.svc-st{font-size:9px;font-weight:700;padding:2px 9px;border-radius:9px;}
.s-up{background:#d1fae5;color:#065f46;}.s-warn{background:#fef3c7;color:#92400e;}.s-down{background:#fee2e2;color:#991b1b;}
.res{margin-bottom:13px;}
.res .rh{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.res .rh b{font-family:'JetBrains Mono',monospace;}
.res .rt{height:16px;background:#eef1f5;border-radius:5px;overflow:hidden;}
.res .rt i{display:block;height:100%;border-radius:5px;transition:width .4s;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);}
tbody td{padding:8px 9px;border-bottom:1px solid #eef1f5;}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.lv{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.lv-i{background:#dbeafe;color:#1e40af;}.lv-w{background:#fef3c7;color:#92400e;}.lv-e{background:#fee2e2;color:#991b1b;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">SYS-08</div>
  <div class="sh-tt"><div class="sh-en">System Health</div><div class="sh-ko">시스템 헬스 — 서버·서비스·리소스 상태 감시</div></div>
  <span class="sh-tag">/sys/health</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <button class="btn btn-p btn-sm" onclick="refresh()">🔄 새로고침</button>
  <span class="upd" id="upd">갱신: --:--:--</span>
  <div class="swt" style="margin-left:auto;"><span>실시간 모니터링</span>
    <div class="tk on" id="autoTk" onclick="toggleAuto()"><i></i></div></div>
  <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
</div>
<div class="body">
  <div class="health-hero">
    <div class="hh-dot" id="hhDot">✓</div>
    <div class="hh-info"><h3 id="hhT">시스템 정상 가동 중</h3><p id="hhP">모든 핵심 서비스가 정상 작동하고 있습니다.</p></div>
    <div class="hh-meta" id="hhMeta"></div>
  </div>
  <div class="kpis">
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kSvc">0/0</div><div class="kl">정상 서비스 · Services Up</div></div>
    <div class="kpi" style="--c:#2563eb"><div class="kv" id="kCpu">0%</div><div class="kl">CPU 사용률 · CPU</div></div>
    <div class="kpi" style="--c:#8b5cf6"><div class="kv" id="kMem">0%</div><div class="kl">메모리 사용률 · Memory</div></div>
    <div class="kpi" style="--c:#f59e0b"><div class="kv" id="kDisk">0%</div><div class="kl">디스크 사용률 · Disk</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-t">🖥 서버 · 서비스 상태</div>
      <div id="svcList"></div>
    </div>
    <div class="card">
      <div class="card-t">📊 리소스 사용률</div>
      <div id="resList"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-h">📋 최근 시스템 이벤트</div>
    <table>
      <thead><tr><th>시각</th><th>레벨</th><th>구성요소</th><th>메시지</th></tr></thead>
      <tbody id="evBody"></tbody>
    </table>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var SVC=[
 {nm:'웹 서버 (Nginx)',host:'amesweb01',st:'up',resp:12},
 {nm:'애플리케이션 서버 (WAS)',host:'amesapp01',st:'up',resp:38},
 {nm:'데이터베이스 (PostgreSQL)',host:'amesdb01',st:'up',resp:8},
 {nm:'MES 코어 서비스',host:'amesapp01',st:'up',resp:45},
 {nm:'OPC-UA 게이트웨이',host:'amesopc01',st:'warn',resp:240},
 {nm:'배치 스케줄러',host:'amesapp01',st:'up',resp:22},
 {nm:'리포트 엔진',host:'amesrpt01',st:'up',resp:64}
];
var RES={cpu:34,mem:58,disk:62,net:18};
var EV=[
 {t:'09:32:10',lv:'i',cmp:'MES 코어',msg:'야간 배치 작업 정상 완료 (소요 4분 12초)'},
 {t:'09:15:44',lv:'w',cmp:'OPC 게이트웨이',msg:'설비 INJ-02 응답 지연 감지 (240ms) — 임계 근접'},
 {t:'08:30:05',lv:'i',cmp:'데이터베이스',msg:'자동 백업 완료 (2.4 GB)'},
 {t:'08:00:00',lv:'i',cmp:'배치 스케줄러',msg:'일일 집계 배치 시작'},
 {t:'07:45:33',lv:'w',cmp:'애플리케이션',msg:'동시 접속 사용자 증가 (28 → 42)'},
 {t:'06:00:12',lv:'i',cmp:'시스템',msg:'정기 헬스 체크 통과 — 전체 서비스 정상'}
];
var ST={up:{ko:'정상',cls:'s-up',col:'#10b981'},warn:{ko:'주의',cls:'s-warn',col:'#f59e0b'},down:{ko:'중단',cls:'s-down',col:'#dc2626'}};
var auto=true,timer=null,uptimeBase=37*24*3600+14*3600+22*60;
function resColor(v){return v>=85?'#dc2626':(v>=70?'#f59e0b':'#10b981');}
function render(){
  var up=SVC.filter(function(s){return s.st==='up';}).length;
  var warn=SVC.filter(function(s){return s.st==='warn';}).length;
  document.getElementById('kSvc').textContent=up+'/'+SVC.length;
  document.getElementById('kCpu').textContent=RES.cpu+'%';
  document.getElementById('kCpu').style.color=resColor(RES.cpu);
  document.getElementById('kMem').textContent=RES.mem+'%';
  document.getElementById('kMem').style.color=resColor(RES.mem);
  document.getElementById('kDisk').textContent=RES.disk+'%';
  document.getElementById('kDisk').style.color=resColor(RES.disk);
  /* hero */
  var dot=document.getElementById('hhDot');
  if(warn||up<SVC.length){
    dot.style.background='#f59e0b';dot.style.boxShadow='0 0 0 6px rgba(245,158,11,.2)';dot.textContent='!';
    document.getElementById('hhT').textContent='시스템 정상 — 일부 주의 항목';
    document.getElementById('hhP').textContent=warn+'개 서비스에서 경미한 지연이 감지되었습니다.';
  }else{
    dot.style.background='#10b981';dot.style.boxShadow='0 0 0 6px rgba(16,185,129,.2)';dot.textContent='✓';
    document.getElementById('hhT').textContent='시스템 정상 가동 중';
    document.getElementById('hhP').textContent='모든 핵심 서비스가 정상 작동하고 있습니다.';
  }
  var up2=uptimeBase;
  document.getElementById('hhMeta').innerHTML=
    'Uptime '+Math.floor(up2/86400)+'일 '+Math.floor(up2%86400/3600)+'시간<br>'+
    'A-MES v3.1 · SAV 서산<br>활성 세션 42';
  /* services */
  document.getElementById('svcList').innerHTML=SVC.map(function(s){
    return '<div class="svc"><span class="svc-d" style="background:'+ST[s.st].col+'"></span>'+
      '<div class="svc-nm">'+s.nm+'<small>'+s.host+' · 응답 '+s.resp+'ms</small></div>'+
      '<span class="svc-st '+ST[s.st].cls+'">'+ST[s.st].ko+'</span></div>';
  }).join('');
  /* resources */
  var rs=[['cpu','CPU','코어 8 · '+RES.cpu+'%'],['mem','메모리','32 GB · '+RES.mem+'%'],
    ['disk','디스크','2 TB · '+RES.disk+'%'],['net','네트워크','1 Gbps · '+RES.net+'%']];
  document.getElementById('resList').innerHTML=rs.map(function(r){
    var v=RES[r[0]];
    return '<div class="res"><div class="rh"><span>'+r[1]+'</span><b>'+r[2]+'</b></div>'+
      '<div class="rt"><i style="width:'+v+'%;background:'+resColor(v)+'"></i></div></div>';
  }).join('');
  /* events */
  document.getElementById('evBody').innerHTML=EV.slice(0,10).map(function(e){
    var lc={i:'lv-i',w:'lv-w',e:'lv-e'}[e.lv],lk={i:'정보',w:'경고',e:'오류'}[e.lv];
    return '<tr><td class="mono">'+e.t+'</td><td><span class="lv '+lc+'">'+lk+'</span></td>'+
      '<td>'+e.cmp+'</td><td>'+e.msg+'</td></tr>';
  }).join('');
  stamp();
}
function stamp(){document.getElementById('upd').textContent='갱신: '+new Date().toTimeString().slice(0,8);}
function jitter(v,amt,min,max){
  v+=Math.round((Math.random()-0.5)*amt);
  return Math.max(min,Math.min(max,v));
}
function refresh(){
  RES.cpu=jitter(RES.cpu,8,15,92);RES.mem=jitter(RES.mem,5,40,90);
  RES.net=jitter(RES.net,12,5,80);
  SVC.forEach(function(s){if(s.st!=='down')s.resp=jitter(s.resp,s.st==='warn'?60:15,5,400);});
  render();
  toast('info','시스템 헬스 갱신','서버·서비스·리소스 상태를 갱신했습니다.');
}
function toggleAuto(){
  auto=!auto;document.getElementById('autoTk').classList.toggle('on',auto);
  if(auto){timer=setInterval(tick,3000);toast('info','실시간 모니터링 ON','3초 간격으로 시스템 상태가 갱신됩니다.');}
  else{clearInterval(timer);toast('info','실시간 모니터링 OFF','자동 갱신을 중지했습니다.');}
}
function tick(){
  RES.cpu=jitter(RES.cpu,6,15,92);RES.mem=jitter(RES.mem,3,40,90);RES.net=jitter(RES.net,10,5,80);
  uptimeBase+=3;
  SVC.forEach(function(s){if(s.st!=='down')s.resp=jitter(s.resp,s.st==='warn'?50:12,5,400);});
  render();
}
function exportCsv(){
  var csv='Service,Host,Status,ResponseMs\n';
  SVC.forEach(function(s){csv+=[s.nm,s.host,ST[s.st].ko,s.resp].join(',')+'\n';});
  csv+='\nResource,Usage%\nCPU,'+RES.cpu+'\nMemory,'+RES.mem+'\nDisk,'+RES.disk+'\nNetwork,'+RES.net+'\n';
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='SYS_Health_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','시스템 헬스 상태를 CSV로 내보냈습니다.');
}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
render();
timer=setInterval(tick,3000);
</script>
</body>
</html>
