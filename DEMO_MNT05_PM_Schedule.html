<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MNT-05 PM Schedule · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select,input{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:23px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.card-t{font-size:12px;font-weight:800;color:var(--pp);padding:11px 14px;border-bottom:1px solid var(--bd);background:#f0fdf4;display:flex;align-items:center;gap:8px;}
.legend{display:flex;gap:12px;margin-left:auto;font-weight:400;}
.legend span{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--sub);}
.legend i{width:10px;height:10px;border-radius:2px;}
.cal{padding:12px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.dow{text-align:center;font-size:9px;font-weight:800;color:var(--sub);padding:4px 0;}
.dow.sun{color:#dc2626;}.dow.sat{color:#2563eb;}
.cell{min-height:88px;border:1px solid #eef1f5;border-radius:6px;padding:4px;background:#fff;}
.cell.empty{background:#fafbfc;border-style:dashed;}
.cell.today{border-color:var(--pp);box-shadow:0 0 0 1px var(--pp);}
.cell .dn{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.cell.today .dn{color:var(--pp);}
.pm{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid;}
.pm:hover{filter:brightness(.96);}
.pm.done{background:#d1fae5;color:#065f46;border-color:#10b981;}
.pm.due{background:#fef3c7;color:#92400e;border-color:#f59e0b;}
.pm.over{background:#fee2e2;color:#991b1b;border-color:#dc2626;}
.pm.plan{background:#e0e7ff;color:#3730a3;border-color:#6366f1;}
.ov{position:fixed;inset:0;background:rgba(3,20,14,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:10px;width:420px;max-width:94vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);}
.modal-h{background:linear-gradient(135deg,#03251a,#052e1f);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px;}
.modal-h .mt{font-size:14px;font-weight:800;flex:1;}
.modal-h .mx{cursor:pointer;font-size:18px;color:rgba(255,255,255,.6);}
.modal-b{padding:18px;}
.drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #eef1f5;font-size:12px;}
.drow .dk{color:var(--sub);}.drow .dv{font-weight:700;}
.ff{margin-bottom:11px;}
.ff label{display:block;font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
.ff label .req{color:#dc2626;}
.ff select,.ff input{width:100%;}
.ff2{display:flex;gap:9px;}.ff2>div{flex:1;}
.modal-f{padding:12px 18px;background:#f6f8fa;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;}
.pmtag{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.tg-done{background:#d1fae5;color:#065f46;}.tg-due{background:#fef3c7;color:#92400e;}
.tg-over{background:#fee2e2;color:#991b1b;}.tg-plan{background:#e0e7ff;color:#3730a3;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:250px;max-width:380px;animation:ti .25s ease;}
.toast.err{border-left-color:#dc2626;}.toast.warn{border-left-color:#f59e0b;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">MNT-05</div>
  <div class="sh-tt"><div class="sh-en">PM Schedule</div><div class="sh-ko">예방정비 일정 — 설비 PM 캘린더·완료 관리</div></div>
  <span class="sh-tag">/mnt/pm</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>월 Month</label>
    <select id="fMonth" onchange="apply()"><option>2026년 5월</option></select></div>
  <div class="fld"><label>설비 Equipment</label>
    <select id="fEq" onchange="apply()"><option value="">전체 All</option></select></div>
  <div class="fld"><label>상태 Status</label>
    <select id="fStat" onchange="apply()"><option value="">전체</option><option value="done">완료</option><option value="due">금일 예정</option><option value="over">지연</option><option value="plan">예정</option></select></div>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-p" onclick="openNew()">＋ PM 등록</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
  </div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#0891b2"><div class="kv" id="kPlan">0</div><div class="kl">금월 PM 계획 · Total</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kDone">0</div><div class="kl">완료 · Completed</div></div>
    <div class="kpi" style="--c:#6366f1"><div class="kv" id="kFut">0</div><div class="kl">예정 · Upcoming</div></div>
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kOver">0</div><div class="kl">지연 · Overdue</div></div>
    <div class="kpi" style="--c:#059669"><div class="kv" id="kRate">0%</div><div class="kl">PM 준수율 · Compliance</div></div>
  </div>
  <div class="card">
    <div class="card-t">📅 2026년 5월 예방정비 캘린더
      <span class="legend">
        <span><i style="background:#10b981"></i>완료</span>
        <span><i style="background:#f59e0b"></i>금일</span>
        <span><i style="background:#dc2626"></i>지연</span>
        <span><i style="background:#6366f1"></i>예정</span>
      </span>
    </div>
    <div class="cal">
      <div class="cal-grid" id="dows"></div>
      <div class="cal-grid" id="cal" style="margin-top:4px;"></div>
    </div>
  </div>
</div>

<!-- task detail modal -->
<div class="ov" id="ovDt">
  <div class="modal">
    <div class="modal-h"><span class="mt">PM 작업 상세</span><span class="mx" onclick="closeOv('ovDt')">✕</span></div>
    <div class="modal-b" id="dtBody"></div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovDt')">닫기</button>
      <button class="btn btn-p" id="dtDone" onclick="completeTask()">✓ PM 완료 처리</button>
    </div>
  </div>
</div>
<!-- new PM modal -->
<div class="ov" id="ovNew">
  <div class="modal">
    <div class="modal-h"><span class="mt">예방정비 일정 등록</span><span class="mx" onclick="closeOv('ovNew')">✕</span></div>
    <div class="modal-b">
      <div class="ff"><label>대상 설비 <span class="req">*</span></label><select id="nEq"></select></div>
      <div class="ff2">
        <div class="ff"><label>PM 유형 <span class="req">*</span></label>
          <select id="nType"><option>일상 점검</option><option>정기 PM</option><option>정밀 진단</option></select></div>
        <div class="ff"><label>예정일 <span class="req">*</span></label><input type="date" id="nDate" value="2026-05-25" min="2026-05-01" max="2026-05-31"></div>
      </div>
      <div class="ff2">
        <div class="ff"><label>주기 Cycle</label>
          <select id="nCycle"><option>주간</option><option>월간</option><option>분기</option><option>반기</option></select></div>
        <div class="ff"><label>담당</label>
          <select id="nBy"><option>정비반</option><option>금형반</option><option>도장반</option><option>외주</option></select></div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovNew')">취소</button>
      <button class="btn btn-p" onclick="addPM()">＋ 등록</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var TODAY=20;
var EQLIST=[
 {id:'EQ-INJ-001',nm:'사출기 1호기'},{id:'EQ-INJ-002',nm:'사출기 2호기'},
 {id:'EQ-ASY-001',nm:'조립1라인 컨베이어'},{id:'EQ-ASY-002',nm:'토크 체결기 #1'},
 {id:'EQ-PNT-001',nm:'도장 부스 1라인'},{id:'EQ-INS-001',nm:'비전 검사기 #1'},
 {id:'EQ-UTL-001',nm:'공기압축기 #1'}
];
/* st base: done/over/plan ; due computed when date==TODAY */
var PM=[
 {id:'PM-001',eq:'EQ-PNT-001',type:'정기 PM',day:3,cycle:'월간',by:'도장반',st:'done'},
 {id:'PM-002',eq:'EQ-ASY-001',type:'일상 점검',day:5,cycle:'주간',by:'정비반',st:'done'},
 {id:'PM-003',eq:'EQ-INJ-001',type:'일상 점검',day:7,cycle:'주간',by:'정비반',st:'done'},
 {id:'PM-004',eq:'EQ-INS-001',type:'정밀 진단',day:8,cycle:'분기',by:'외주',st:'done'},
 {id:'PM-005',eq:'EQ-UTL-001',type:'정기 PM',day:11,cycle:'월간',by:'정비반',st:'done'},
 {id:'PM-006',eq:'EQ-ASY-001',type:'일상 점검',day:12,cycle:'주간',by:'정비반',st:'done'},
 {id:'PM-007',eq:'EQ-INJ-002',type:'정기 PM',day:14,cycle:'월간',by:'정비반',st:'over'},
 {id:'PM-008',eq:'EQ-ASY-002',type:'일상 점검',day:18,cycle:'주간',by:'정비반',st:'over'},
 {id:'PM-009',eq:'EQ-INJ-001',type:'일상 점검',day:19,cycle:'주간',by:'정비반',st:'done'},
 {id:'PM-010',eq:'EQ-PNT-001',type:'일상 점검',day:20,cycle:'주간',by:'도장반',st:'plan'},
 {id:'PM-011',eq:'EQ-ASY-001',type:'일상 점검',day:20,cycle:'주간',by:'정비반',st:'plan'},
 {id:'PM-012',eq:'EQ-INJ-002',type:'정밀 진단',day:22,cycle:'분기',by:'외주',st:'plan'},
 {id:'PM-013',eq:'EQ-UTL-001',type:'일상 점검',day:25,cycle:'주간',by:'정비반',st:'plan'},
 {id:'PM-014',eq:'EQ-INS-001',type:'정기 PM',day:27,cycle:'월간',by:'정비반',st:'plan'},
 {id:'PM-015',eq:'EQ-INJ-001',type:'정기 PM',day:29,cycle:'월간',by:'정비반',st:'plan'}
];
var seq=16,curId=null;
var STT={done:'tg-done',due:'tg-due',over:'tg-over',plan:'tg-plan'};
var STK={done:'완료',due:'금일 예정',over:'지연',plan:'예정'};
function effSt(p){
  if(p.st==='done')return 'done';
  if(p.day<TODAY)return 'over';
  if(p.day===TODAY)return 'due';
  return 'plan';
}
function eqNm(id){var e=EQLIST.filter(function(x){return x.id===id;})[0];return e?e.nm:id;}
function initSel(){
  var o='<option value="">전체 All</option>';
  EQLIST.forEach(function(e){o+='<option value="'+e.id+'">'+e.nm+'</option>';});
  document.getElementById('fEq').innerHTML=o;
  document.getElementById('nEq').innerHTML=EQLIST.map(function(e){return '<option value="'+e.id+'">'+e.id+' '+e.nm+'</option>';}).join('');
  var dn=['일','월','화','수','목','금','토'];
  document.getElementById('dows').innerHTML=dn.map(function(d,i){
    return '<div class="dow'+(i===0?' sun':i===6?' sat':'')+'">'+d+'</div>';}).join('');
}
function visTasks(){
  var fe=document.getElementById('fEq').value,fs=document.getElementById('fStat').value;
  return PM.filter(function(p){
    if(fe&&p.eq!==fe)return false;
    if(fs&&effSt(p)!==fs)return false;
    return true;});
}
function apply(){
  var v=visTasks();
  var done=v.filter(function(p){return effSt(p)==='done';}).length;
  var over=v.filter(function(p){return effSt(p)==='over';}).length;
  var fut=v.filter(function(p){var s=effSt(p);return s==='plan'||s==='due';}).length;
  document.getElementById('kPlan').textContent=v.length;
  document.getElementById('kDone').textContent=done;
  document.getElementById('kFut').textContent=fut;
  document.getElementById('kOver').textContent=over;
  var base=done+over;
  document.getElementById('kRate').textContent=(base?Math.round(done/base*100):100)+'%';
  document.getElementById('kRate').style.color=(base&&done/base<0.9)?'#dc2626':'#059669';
  renderCal();
}
function renderCal(){
  /* May 2026: build with Date */
  var first=new Date(2026,4,1).getDay();/* 0=Sun */
  var days=31;
  var v=visTasks();
  var byDay={};v.forEach(function(p){(byDay[p.day]=byDay[p.day]||[]).push(p);});
  var h='';
  for(var i=0;i<first;i++)h+='<div class="cell empty"></div>';
  for(var d=1;d<=days;d++){
    var tasks=(byDay[d]||[]);
    h+='<div class="cell'+(d===TODAY?' today':'')+'"><div class="dn">'+d+'</div>';
    tasks.forEach(function(p){
      var s=effSt(p);
      h+='<div class="pm '+s+'" onclick="taskClick(\''+p.id+'\')" title="'+eqNm(p.eq)+' · '+p.type+'">'+
        eqNm(p.eq).replace(/(호기|라인|컨베이어|체결기|검사기|압축기|부스).*/,'')+' '+p.type.slice(0,2)+'</div>';
    });
    h+='</div>';
  }
  document.getElementById('cal').innerHTML=h;
}
function byId(id){return PM.filter(function(p){return p.id===id;})[0];}
function taskClick(id){
  curId=id;var p=byId(id),s=effSt(p);
  document.getElementById('dtBody').innerHTML=
    '<div class="drow"><span class="dk">PM 번호</span><span class="dv">'+p.id+'</span></div>'+
    '<div class="drow"><span class="dk">대상 설비</span><span class="dv">'+eqNm(p.eq)+'</span></div>'+
    '<div class="drow"><span class="dk">PM 유형</span><span class="dv">'+p.type+'</span></div>'+
    '<div class="drow"><span class="dk">예정일</span><span class="dv">2026-05-'+('0'+p.day).slice(-2)+'</span></div>'+
    '<div class="drow"><span class="dk">주기</span><span class="dv">'+p.cycle+'</span></div>'+
    '<div class="drow"><span class="dk">담당</span><span class="dv">'+p.by+'</span></div>'+
    '<div class="drow"><span class="dk">상태</span><span class="dv"><span class="pmtag '+STT[s]+'">'+STK[s]+'</span></span></div>';
  document.getElementById('dtDone').style.display=(s==='done')?'none':'inline-flex';
  openOv('ovDt');
}
function completeTask(){
  var p=byId(curId);p.st='done';
  closeOv('ovDt');apply();
  toast('',p.id+' PM 완료',eqNm(p.eq)+' 「'+p.type+'」 예방정비가 완료 처리되었습니다.');
}
function openNew(){document.getElementById('nDate').value='2026-05-25';openOv('ovNew');}
function addPM(){
  var date=document.getElementById('nDate').value;
  if(!date){toast('err','입력 오류','예정일을 입력하세요.');return;}
  var day=+date.slice(8,10);
  if(date.slice(0,7)!=='2026-05'){toast('err','입력 오류','2026년 5월 내 날짜를 선택하세요.');return;}
  var id='PM-'+('00'+seq++).slice(-3);
  PM.push({id:id,eq:document.getElementById('nEq').value,type:document.getElementById('nType').value,
    day:day,cycle:document.getElementById('nCycle').value,by:document.getElementById('nBy').value,
    st:(day<TODAY?'over':'plan')});
  closeOv('ovNew');apply();
  toast('','PM 일정 등록',id+' — '+eqNm(document.getElementById('nEq').value)+' 5/'+day+' 예방정비 일정이 등록되었습니다.');
}
function exportCsv(){
  var v=visTasks();
  var csv='PM_ID,Equipment,EquipName,Type,Date,Cycle,Assignee,Status\n';
  v.forEach(function(p){
    csv+=[p.id,p.eq,eqNm(p.eq),p.type,'2026-05-'+('0'+p.day).slice(-2),p.cycle,p.by,STK[effSt(p)]].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='MNT_PM_Schedule_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','PM 일정 '+v.length+'건을 CSV로 내보냈습니다.');
}
function resetAll(){
  document.getElementById('fEq').value='';document.getElementById('fStat').value='';
  apply();toast('info','초기화','PM 캘린더 필터를 초기화했습니다.');
}
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='warn'?'⚠ ':type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
