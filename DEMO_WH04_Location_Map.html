<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WH-04 Location Map · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid var(--pda);}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#22d3ee;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.zones{display:flex;gap:6px;}
.zb{flex:1;padding:9px 0;background:#1a3540;border:1px solid #2c5564;border-radius:7px;text-align:center;font-size:11px;font-weight:800;color:#67e8f9;cursor:pointer;font-family:inherit;}
.zb.on{background:var(--pda);color:#fff;border-color:var(--pda);}
.legend{display:flex;gap:9px;font-size:9px;color:#7a9aa3;}
.legend span{display:flex;align-items:center;gap:3px;}
.legend i{width:11px;height:11px;border-radius:2px;}
.map{background:#0a1419;border:1px solid #1a3540;border-radius:9px;padding:13px;}
.map .row-h{display:grid;grid-template-columns:30px repeat(6,1fr);gap:5px;margin-bottom:5px;}
.map .row-h .cn{text-align:center;font-size:9px;color:#7a9aa3;font-family:'JetBrains Mono',monospace;font-weight:800;}
.map .row{display:grid;grid-template-columns:30px repeat(6,1fr);gap:5px;margin-bottom:5px;}
.map .row .rn{font-size:10px;color:#67e8f9;font-family:'JetBrains Mono',monospace;font-weight:800;display:flex;align-items:center;justify-content:center;}
.cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:800;cursor:pointer;border:1px solid #1a3540;}
.cell.empty{background:#1a3540;color:#7a9aa3;}
.cell.ok{background:rgba(34,197,94,.3);color:#86efac;border-color:#16a34a;}
.cell.low{background:rgba(245,158,11,.3);color:#fbbf24;border-color:#f59e0b;}
.cell.full{background:rgba(6,182,212,.25);color:#22d3ee;border-color:var(--pda);}
.cell.sel{outline:2px solid #22d3ee;outline-offset:2px;}
.cell:active{transform:scale(.93);}
.detail{background:linear-gradient(160deg,rgba(6,182,212,.1),rgba(0,0,0,.3));border:1px solid var(--pda);border-radius:10px;padding:13px 15px;}
.detail .l{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.detail .loc{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;color:#fff;margin-top:3px;}
.detail .item{font-size:13px;color:#fdba74;margin-top:7px;font-weight:800;}
.detail .meta{display:flex;justify-content:space-between;font-size:11px;color:#7a9aa3;margin-top:6px;}
.detail .meta b{color:#fff;font-family:'JetBrains Mono',monospace;}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,var(--pda),var(--pda-dk));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #155e75;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #155e75;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid var(--pda);font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">WH-04</div>
    <div class="pda-t">로케이션 맵</div>
    <span class="live"><span class="d"></span>LIVE</span>
    <span class="pda-bat">🔋 75%</span>
  </div>
  <div class="pda-body">
    <div class="zones">
      <button class="zb on" data-z="A" onclick="pickZ(this)">Block A</button>
      <button class="zb" data-z="B" onclick="pickZ(this)">Block B</button>
      <button class="zb" data-z="C" onclick="pickZ(this)">Block C</button>
      <button class="zb" data-z="D" onclick="pickZ(this)">Block D</button>
    </div>
    <div class="legend">
      <span><i style="background:#1a3540"></i>빈 칸</span>
      <span><i style="background:rgba(34,197,94,.3);border:1px solid #16a34a"></i>정상</span>
      <span><i style="background:rgba(245,158,11,.3);border:1px solid #f59e0b"></i>부족</span>
      <span><i style="background:rgba(6,182,212,.25);border:1px solid var(--pda)"></i>만재</span>
    </div>
    <div class="map" id="map"></div>
    <div class="detail" id="detail">
      <div class="l">선택된 로케이션</div>
      <div class="loc" id="loc">A-03-2</div>
      <div class="item" id="item">PP 수지 (블랙)</div>
      <div class="meta"><span>현재고</span><b id="qty">8,200 KG</b></div>
      <div class="meta"><span>안전재고</span><b id="safe">5,000 KG</b></div>
      <div class="meta"><span>적재율</span><b id="util">65%</b></div>
      <div class="meta"><span>마지막 작업</span><b id="last">입고 08:42</b></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← 메뉴</button>
    <button onclick="navi()">🧭 길찾기</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var ROWS=['01','02','03','04','05'];var COLS=[1,2,3,4,5,6];
var SAMPLE={
 'A-03-2':{item:'PP 수지 (블랙)',qty:'8,200 KG',safe:'5,000 KG',util:'65%',last:'입고 08:42'},
 'A-04-1':{item:'ABS 수지',qty:'5,400 KG',safe:'3,000 KG',util:'78%',last:'입고 07:18'},
 'A-01-3':{item:'PP 수지 (그레이)',qty:'3,100 KG',safe:'4,000 KG',util:'25%',last:'출고 06:30'}
};
var sel='A-03-2';
function renderMap(){
  var h='<div class="row-h"><div></div>';
  COLS.forEach(function(c){h+='<div class="cn">'+c+'</div>';});
  h+='</div>';
  ROWS.forEach(function(r){
    h+='<div class="row"><div class="rn">'+r+'</div>';
    COLS.forEach(function(c){
      var lcd='A-'+r+'-'+c;
      var st='empty';
      var rn=Math.random();
      if(rn>.7)st='ok';else if(rn>.55)st='full';else if(rn>.45)st='low';else if(rn>.3)st='ok';
      if(lcd==='A-03-2'){st='ok';}if(lcd==='A-04-1'){st='ok';}if(lcd==='A-01-3'){st='low';}
      h+='<div class="cell '+st+(lcd===sel?' sel':'')+'" onclick="pick(\''+lcd+'\')">'+c+'</div>';
    });
    h+='</div>';
  });
  document.getElementById('map').innerHTML=h;
}
function pick(l){sel=l;renderMap();
  var d=SAMPLE[l]||{item:'(비어 있음)',qty:'-',safe:'-',util:'-',last:'-'};
  document.getElementById('loc').textContent=l;
  document.getElementById('item').textContent=d.item;
  document.getElementById('qty').textContent=d.qty;
  document.getElementById('safe').textContent=d.safe;
  document.getElementById('util').textContent=d.util;
  document.getElementById('last').textContent=d.last;
}
function pickZ(b){[].slice.call(document.querySelectorAll('.zb')).forEach(function(e){e.classList.remove('on');});b.classList.add('on');toast('','Block '+b.dataset.z+' 선택','로케이션 맵을 갱신합니다.');}
function navi(){toast('','🧭 길찾기',sel+' 로케이션까지 최단 경로를 안내합니다. (데모)');}
function back(){toast('','PDA 메뉴','PDA 메뉴로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">• '+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
renderMap();
</script>
</body>
</html>
