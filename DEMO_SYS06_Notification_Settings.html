<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SYS-06 Notification Settings · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:23px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);}
.rule{padding:12px 16px;border-bottom:1px solid #eef1f5;display:flex;align-items:center;gap:14px;}
.rule:last-child{border:none;}
.rule.off{opacity:.55;}
.r-ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff;}
.r-main{flex:1;min-width:0;}
.r-nm{font-size:12.5px;font-weight:800;}
.r-ds{font-size:10px;color:var(--sub);margin-top:2px;}
.r-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
.ch{font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:6px;}
.ch-mail{background:#dbeafe;color:#1e40af;}.ch-sms{background:#d1fae5;color:#065f46;}
.ch-pop{background:#fef3c7;color:#92400e;}.ch-slack{background:#ede9fe;color:#5b21b6;}
.r-to{font-size:9px;color:#9ca3af;}
.r-thr{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#d97706;background:#fffbeb;padding:1px 7px;border-radius:6px;}
.r-act{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sevtag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:7px;}
.sv-c{background:#fee2e2;color:#991b1b;}.sv-w{background:#fef3c7;color:#92400e;}.sv-i{background:#dbeafe;color:#1e40af;}
.tk{width:38px;height:21px;border-radius:11px;background:#cbd5e1;position:relative;cursor:pointer;transition:background .15s;flex-shrink:0;}
.tk.on{background:var(--pp);}
.tk i{position:absolute;top:2.5px;left:2.5px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;}
.tk.on i{left:19.5px;}
.ov{position:fixed;inset:0;background:rgba(3,20,14,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:10px;width:420px;max-width:94vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);}
.modal-h{background:linear-gradient(135deg,#03251a,#052e1f);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px;}
.modal-h .mt{font-size:14px;font-weight:800;flex:1;}
.modal-h .mx{cursor:pointer;font-size:18px;color:rgba(255,255,255,.6);}
.modal-b{padding:18px;}
.ff{margin-bottom:13px;}
.ff label{display:block;font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:5px;}
.ff select,.ff input{width:100%;padding:6px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;}
.chkrow{display:flex;gap:7px;flex-wrap:wrap;}
.chkc{border:1.5px solid var(--bd);border-radius:6px;padding:6px 11px;cursor:pointer;font-size:11px;font-weight:700;}
.chkc.on{background:#ecfdf5;border-color:var(--pp);color:var(--pp);}
.modal-f{padding:12px 18px;background:#f6f8fa;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">SYS-06</div>
  <div class="sh-tt"><div class="sh-en">Notification Settings</div><div class="sh-ko">Event notification rules &amp; channel management</div></div>
  <span class="sh-tag">/sys/notification</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>Category</label>
    <select id="fCat" onchange="render()"><option value="">All</option><option>Production</option><option>Quality</option><option>Maintenance</option><option>Logistics</option><option>System</option></select></div>
  <div class="fld"><label>Status</label>
    <select id="fStat" onchange="render()"><option value="">All</option><option value="on">Active</option><option value="off">Inactive</option></select></div>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ Reset</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-s" onclick="testNoti()">🔔 Send Test</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
  </div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#0891b2"><div class="kv" id="kTot">0</div><div class="kl">Notification Rules</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kOn">0</div><div class="kl">Active Rules</div></div>
    <div class="kpi" style="--c:#9ca3af"><div class="kv" id="kOff">0</div><div class="kl">Inactive</div></div>
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kCrit">0</div><div class="kl">Critical Alerts</div></div>
    <div class="kpi" style="--c:#2563eb"><div class="kv" id="kMail">0</div><div class="kl">Email Channel</div></div>
  </div>
  <div class="panel">
    <div class="panel-h">🔔 Event Notification Rules — <span id="sub" style="font-weight:400;color:#656d76;">0 rules</span></div>
    <div id="ruleList"></div>
  </div>
</div>

<!-- edit modal -->
<div class="ov" id="ovEdit">
  <div class="modal">
    <div class="modal-h"><span class="mt" id="emTitle">Edit Notification Rule</span><span class="mx" onclick="closeOv('ovEdit')">✕</span></div>
    <div class="modal-b">
      <div class="ff"><label>Delivery Channels (multi-select)</label>
        <div class="chkrow" id="emChannels">
          <div class="chkc" data-c="mail" onclick="tgC(this)">✉️ Email</div>
          <div class="chkc" data-c="sms" onclick="tgC(this)">📱 SMS</div>
          <div class="chkc" data-c="pop" onclick="tgC(this)">🖥 System Popup</div>
          <div class="chkc" data-c="slack" onclick="tgC(this)">💬 Slack</div>
        </div>
      </div>
      <div class="ff"><label>Recipient</label>
        <select id="emTo"><option>Production (All)</option><option>Quality Assurance</option><option>Maintenance</option><option>Logistics</option><option>Administrators</option><option>Assigned Owner</option></select></div>
      <div class="ff" id="emThrFf"><label>Trigger Threshold</label>
        <input id="emThr" placeholder="e.g., 80"></div>
      <div class="ff"><label>Severity</label>
        <select id="emSev"><option value="c">Critical</option><option value="w">Warning</option><option value="i">Info</option></select></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovEdit')">Cancel</button>
      <button class="btn btn-p" onclick="saveRule()">💾 Save</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var CH={mail:{ko:'Email',cls:'ch-mail'},sms:{ko:'SMS',cls:'ch-sms'},pop:{ko:'Popup',cls:'ch-pop'},slack:{ko:'Slack',cls:'ch-slack'}};
var SEV={c:{ko:'Critical',cls:'sv-c'},w:{ko:'Warning',cls:'sv-w'},i:{ko:'Info',cls:'sv-i'}};
var RULES=[
 {id:'N01',cat:'Maintenance',nm:'Equipment Breakdown',ds:'Immediate alert when equipment experiences unplanned downtime',ic:'🛠',col:'#dc2626',
  on:true,sev:'c',ch:['mail','sms','pop'],to:'Maintenance',thr:''},
 {id:'N02',cat:'Maintenance',nm:'Downtime Threshold Exceeded',ds:'Alert when cumulative line downtime crosses threshold',ic:'⏱',col:'#f59e0b',
  on:true,sev:'w',ch:['mail','pop'],to:'Maintenance',thr:'120 min'},
 {id:'N03',cat:'Maintenance',nm:'OEE Below Target',ds:'Alert when line OEE falls below target threshold',ic:'⚙️',col:'#f59e0b',
  on:true,sev:'w',ch:['mail'],to:'Administrators',thr:'82%'},
 {id:'N04',cat:'Logistics',nm:'Low Stock Warning',ds:'Alert when material inventory drops below safety stock',ic:'📦',col:'#0891b2',
  on:true,sev:'w',ch:['mail','pop'],to:'Logistics',thr:'Safety Stock'},
 {id:'N05',cat:'Quality',nm:'Defect Rate Exceeded',ds:'Alert when process defect rate crosses control limit',ic:'🔬',col:'#8b5cf6',
  on:true,sev:'c',ch:['mail','sms','pop'],to:'Quality Assurance',thr:'2.0%'},
 {id:'N06',cat:'Logistics',nm:'Delivery Risk Alert',ds:'Early alert when production progress is insufficient vs. ship schedule',ic:'🚚',col:'#dc2626',
  on:true,sev:'c',ch:['mail','slack'],to:'Administrators',thr:'D-1'},
 {id:'N07',cat:'Production',nm:'Work Order Released',ds:'Shop-floor alert when a new work order is issued',ic:'📋',col:'#059669',
  on:true,sev:'i',ch:['pop'],to:'Production (All)',thr:''},
 {id:'N08',cat:'Maintenance',nm:'Preventive Maintenance Due',ds:'Alert technician one day before scheduled PM',ic:'📅',col:'#2563eb',
  on:false,sev:'i',ch:['mail'],to:'Maintenance',thr:'D-1'},
 {id:'N09',cat:'System',nm:'Interface Integration Error',ds:'Notify administrators when external system integration fails',ic:'🔌',col:'#dc2626',
  on:true,sev:'c',ch:['mail','sms'],to:'Administrators',thr:''},
 {id:'N10',cat:'System',nm:'Login Failure / Account Lock',ds:'Security alert when account is locked after 5 failed login attempts',ic:'🔐',col:'#9d174d',
  on:true,sev:'w',ch:['mail'],to:'Administrators',thr:'5 attempts'}
];
var editId=null,emCh=[];
function vis(){
  var fc=document.getElementById('fCat').value,fs=document.getElementById('fStat').value;
  return RULES.filter(function(r){
    if(fc&&r.cat!==fc)return false;
    if(fs==='on'&&!r.on)return false;
    if(fs==='off'&&r.on)return false;
    return true;});
}
function render(){
  document.getElementById('kTot').textContent=RULES.length;
  document.getElementById('kOn').textContent=RULES.filter(function(r){return r.on;}).length;
  document.getElementById('kOff').textContent=RULES.filter(function(r){return !r.on;}).length;
  document.getElementById('kCrit').textContent=RULES.filter(function(r){return r.sev==='c'&&r.on;}).length;
  document.getElementById('kMail').textContent=RULES.filter(function(r){return r.ch.indexOf('mail')>=0&&r.on;}).length;
  var v=vis(),h='';
  v.forEach(function(r){
    h+='<div class="rule'+(r.on?'':' off')+'">'+
      '<div class="r-ic" style="background:'+r.col+'">'+r.ic+'</div>'+
      '<div class="r-main"><div class="r-nm">'+r.nm+' <span class="sevtag '+SEV[r.sev].cls+'">'+SEV[r.sev].ko+'</span></div>'+
        '<div class="r-ds">'+r.ds+'</div>'+
        '<div class="r-meta">'+
          r.ch.map(function(c){return '<span class="ch '+CH[c].cls+'">'+CH[c].ko+'</span>';}).join('')+
          '<span class="r-to">→ '+r.to+'</span>'+
          (r.thr?'<span class="r-thr">Threshold '+r.thr+'</span>':'')+'</div></div>'+
      '<div class="r-act">'+
        '<button class="btn btn-s btn-sm" onclick="openEdit(\''+r.id+'\')">⚙ Configure</button>'+
        '<div class="tk'+(r.on?' on':'')+'" onclick="toggleRule(\''+r.id+'\')"><i></i></div></div></div>';
  });
  document.getElementById('ruleList').innerHTML=h||'<div style="padding:30px;text-align:center;color:#9ca3af;">No notification rules match the current filter.</div>';
  document.getElementById('sub').textContent=v.length+' rules';
}
function byId(id){return RULES.filter(function(r){return r.id===id;})[0];}
function toggleRule(id){
  var r=byId(id);r.on=!r.on;render();
  toast('info',r.nm,'Notification rule '+(r.on?'enabled':'disabled')+'.');
}
function openEdit(id){
  editId=id;var r=byId(id);
  document.getElementById('emTitle').textContent=r.nm+' — Configure';
  emCh=r.ch.slice();
  [].slice.call(document.querySelectorAll('#emChannels .chkc')).forEach(function(el){
    el.classList.toggle('on',emCh.indexOf(el.dataset.c)>=0);});
  document.getElementById('emTo').value=r.to;
  document.getElementById('emThr').value=r.thr;
  document.getElementById('emSev').value=r.sev;
  document.getElementById('emThrFf').style.display=r.thr?'block':'block';
  openOv('ovEdit');
}
function tgC(el){
  var c=el.dataset.c,i=emCh.indexOf(c);
  if(i>=0)emCh.splice(i,1);else emCh.push(c);
  el.classList.toggle('on');
}
function saveRule(){
  if(!emCh.length){toast('info','Channel Required','Please select at least one delivery channel.');return;}
  var r=byId(editId);
  r.ch=['mail','sms','pop','slack'].filter(function(c){return emCh.indexOf(c)>=0;});
  r.to=document.getElementById('emTo').value;
  r.thr=document.getElementById('emThr').value.trim();
  r.sev=document.getElementById('emSev').value;
  closeOv('ovEdit');render();
  toast('','Rule Saved','"'+r.nm+'" settings have been saved.');
}
function testNoti(){
  var on=RULES.filter(function(r){return r.on;}).length;
  toast('','Test Notification Sent','Test notifications dispatched on '+on+' active channels. (demo)');
}
function exportCsv(){
  var v=vis();
  var csv='ID,Category,Rule,Severity,Channels,Recipient,Threshold,Status\n';
  v.forEach(function(r){
    csv+=[r.id,r.cat,r.nm,SEV[r.sev].ko,'"'+r.ch.map(function(c){return CH[c].ko;}).join(';')+'"',
      r.to,r.thr||'-',r.on?'Active':'Inactive'].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='SYS_Notification_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export Complete','Notification rules exported to CSV.');
}
function resetAll(){
  document.getElementById('fCat').value='';document.getElementById('fStat').value='';
  render();toast('info','Reset','Notification filters reset.');
}
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
render();
</script>
</body>
</html>
