<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MNT-08 Spare Parts · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select,input{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-b{background:#2563eb;color:#fff;}.btn-b:hover{background:#1d4ed8;}
.btn-o{background:#ea580c;color:#fff;}.btn-o:hover{background:#c2410c;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.grid2{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.card-t{font-size:12px;font-weight:800;color:var(--pp);padding:11px 14px;border-bottom:1px solid var(--bd);background:#f0fdf4;display:flex;align-items:center;gap:6px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
tbody td{padding:9px 9px;border-bottom:1px solid #eef1f5;}
tbody tr{cursor:pointer;}
tbody tr:hover td{background:#f0fdf4;}
tbody tr.sel td{background:#ecfdf5;}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.st{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.st .dot{width:6px;height:6px;border-radius:50%;}
.st-ok{background:#d1fae5;color:#065f46;}.st-ok .dot{background:#10b981;}
.st-low{background:#fef3c7;color:#92400e;}.st-low .dot{background:#f59e0b;}
.st-out{background:#fee2e2;color:#991b1b;}.st-out .dot{background:#dc2626;animation:bl .8s infinite;}
.qbar{height:8px;background:#eef1f5;border-radius:4px;overflow:hidden;min-width:54px;}
.qbar i{display:block;height:100%;border-radius:4px;}
.pd-head{padding:14px;border-bottom:1px solid #eef1f5;display:flex;align-items:flex-start;gap:12px;}
.pd-ph{width:50px;height:50px;border-radius:10px;background:linear-gradient(160deg,#6366f1,#4338ca);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.pd-nm{font-size:14px;font-weight:800;}
.pd-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub);}
.stockbig{margin:14px;text-align:center;background:#f8fafc;border:1px solid #eef1f5;border-radius:8px;padding:12px;}
.stockbig .sv{font-size:34px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;}
.stockbig .sl{font-size:9px;color:var(--sub);margin-top:3px;}
.specs{padding:4px 14px;}
.srow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #eef1f5;font-size:12px;}
.srow .sk{color:var(--sub);}.srow .sv{font-weight:700;}
.acts{display:flex;gap:8px;padding:10px 14px;}
.txns{padding:2px 14px 14px;}
.txns-t{font-size:10px;font-weight:800;color:var(--sub);margin:8px 0 4px;text-transform:uppercase;}
.tx{display:flex;gap:8px;font-size:11px;padding:5px 0;border-bottom:1px dashed #eef1f5;align-items:center;}
.tx .td{font-family:'JetBrains Mono',monospace;color:var(--sub);font-size:10px;width:50px;flex-shrink:0;}
.tx .tb{font-size:9px;font-weight:700;padding:1px 6px;border-radius:7px;}
.tx-in{background:#dbeafe;color:#1e40af;}.tx-out{background:#ffedd5;color:#9a3412;}
.empty{padding:40px;text-align:center;color:#9ca3af;}
.ov{position:fixed;inset:0;background:rgba(3,20,14,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:10px;width:400px;max-width:94vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);}
.modal-h{background:linear-gradient(135deg,#03251a,#052e1f);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px;}
.modal-h .mt{font-size:14px;font-weight:800;flex:1;}
.modal-h .mx{cursor:pointer;font-size:18px;color:rgba(255,255,255,.6);}
.modal-b{padding:18px;}
.ff{margin-bottom:11px;}
.ff label{display:block;font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
.ff label .req{color:#dc2626;}
.ff select,.ff input{width:100%;}
.ff2{display:flex;gap:9px;}.ff2>div{flex:1;}
.modal-f{padding:12px 18px;background:#f6f8fa;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:250px;max-width:380px;animation:ti .25s ease;}
.toast.err{border-left-color:#dc2626;}.toast.warn{border-left-color:#f59e0b;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">MNT-08</div>
  <div class="sh-tt"><div class="sh-en">Spare Parts</div><div class="sh-ko">정비 자재 — 예비품 재고·입출고 관리</div></div>
  <span class="sh-tag">/mnt/spare</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>분류 Category</label>
    <select id="fCat" onchange="apply()"><option value="">전체 All</option><option>베어링</option><option>모터부품</option><option>전기부품</option><option>유압부품</option><option>금형부품</option><option>소모품</option></select></div>
  <div class="fld"><label>재고 상태 Stock</label>
    <select id="fStat" onchange="apply()"><option value="">전체</option><option value="ok">정상</option><option value="low">부족</option><option value="out">품절</option></select></div>
  <div class="fld"><label>검색 Search</label>
    <input id="fKw" placeholder="자재명·코드" oninput="apply()" style="width:150px;"></div>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-p" onclick="openNew()">＋ 자재 등록</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
  </div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#0891b2"><div class="kv" id="kTot">0</div><div class="kl">총 품목 · Items</div></div>
    <div class="kpi" style="--c:#f59e0b"><div class="kv" id="kLow">0</div><div class="kl">재고 부족 · Low Stock</div></div>
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kOut">0</div><div class="kl">품절 · Out of Stock</div></div>
    <div class="kpi" style="--c:#6366f1"><div class="kv" id="kVal">0</div><div class="kl">재고 금액 · 천원</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kTx">0</div><div class="kl">금일 입출고 · Txns</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-t">📦 정비 자재 목록 — <span id="listSub" style="font-weight:400;color:#656d76;">0품목</span></div>
      <table>
        <thead><tr><th>자재 코드</th><th>자재명</th><th>분류</th><th>현재고</th><th style="width:90px;">재고율</th><th>상태</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">조건에 맞는 자재가 없습니다.</div>
    </div>
    <div class="card" id="detail"><div class="empty">← 좌측 목록에서 자재를 선택하세요.</div></div>
  </div>
</div>

<!-- in/out modal -->
<div class="ov" id="ovTxn">
  <div class="modal">
    <div class="modal-h"><span class="mt" id="txTitle">입고 처리</span><span class="mx" onclick="closeOv('ovTxn')">✕</span></div>
    <div class="modal-b">
      <div id="txInfo" style="margin-bottom:12px;"></div>
      <div class="ff2">
        <div class="ff"><label id="txQL">입고 수량 <span class="req">*</span></label><input type="number" id="txQty" value="10" min="1"></div>
        <div class="ff"><label>구분</label><select id="txRef"></select></div>
      </div>
      <div id="txWarn" style="font-size:10px;display:none;background:#fff7ed;border:1px solid #fed7aa;border-radius:5px;padding:8px;color:#9a3412;"></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovTxn')">취소</button>
      <button class="btn btn-p" id="txBtn" onclick="doTxn()">처리</button>
    </div>
  </div>
</div>
<!-- new part modal -->
<div class="ov" id="ovNew">
  <div class="modal">
    <div class="modal-h"><span class="mt">신규 자재 등록</span><span class="mx" onclick="closeOv('ovNew')">✕</span></div>
    <div class="modal-b">
      <div class="ff"><label>자재명 <span class="req">*</span></label><input id="nNm" placeholder="예: 깊은홈 볼베어링 6204"></div>
      <div class="ff2">
        <div class="ff"><label>분류 <span class="req">*</span></label>
          <select id="nCat"><option>베어링</option><option>모터부품</option><option>전기부품</option><option>유압부품</option><option>금형부품</option><option>소모품</option></select></div>
        <div class="ff"><label>보관 위치</label><input id="nLoc" placeholder="예: A-03-2"></div>
      </div>
      <div class="ff2">
        <div class="ff"><label>초기 재고 <span class="req">*</span></label><input type="number" id="nQty" value="20" min="0"></div>
        <div class="ff"><label>안전 재고 <span class="req">*</span></label><input type="number" id="nSafe" value="10" min="0"></div>
      </div>
      <div class="ff"><label>단가 (원)</label><input type="number" id="nPrice" value="8000" min="0" step="100"></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovNew')">취소</button>
      <button class="btn btn-p" onclick="addPart()">＋ 등록</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var PART=[
 {id:'SP-BRG-001',nm:'깊은홈 볼베어링 6206',cat:'베어링',qty:24,safe:12,price:9500,loc:'A-01-1',
  txn:[['05-18','out',2,'MWO-2605-031'],['05-10','in',20,'발주입고']]},
 {id:'SP-BRG-002',nm:'테이퍼 롤러베어링 30205',cat:'베어링',qty:6,safe:8,price:14000,loc:'A-01-2',
  txn:[['05-16','out',4,'MWO-2605-024']]},
 {id:'SP-MOT-001',nm:'서보모터 1.5kW',cat:'모터부품',qty:2,safe:1,price:480000,loc:'B-02-1',
  txn:[['04-22','in',2,'발주입고']]},
 {id:'SP-MOT-002',nm:'모터 커플링 D-32',cat:'모터부품',qty:0,safe:4,price:32000,loc:'B-02-2',
  txn:[['05-12','out',3,'MWO-2605-016'],['05-02','out',2,'정비반 청구']]},
 {id:'SP-ELE-001',nm:'근접 센서 PNP NO',cat:'전기부품',qty:15,safe:10,price:18000,loc:'C-01-1',
  txn:[['05-14','out',1,'MWO-2605-022']]},
 {id:'SP-ELE-002',nm:'LED 조명바 24V',cat:'전기부품',qty:8,safe:6,price:42000,loc:'C-01-2',
  txn:[['05-14','out',1,'MWO-2605-022'],['04-30','in',10,'발주입고']]},
 {id:'SP-HYD-001',nm:'유압 솔레노이드 밸브',cat:'유압부품',qty:5,safe:6,price:88000,loc:'D-01-1',
  txn:[['05-16','out',1,'MWO-2605-024']]},
 {id:'SP-HYD-002',nm:'유압유 ISO VG46 (20L)',cat:'소모품',qty:11,safe:8,price:65000,loc:'D-02-1',
  txn:[['04-22','out',2,'정기 PM']]},
 {id:'SP-MLD-001',nm:'금형 이젝터 핀 세트',cat:'금형부품',qty:3,safe:5,price:120000,loc:'E-01-1',
  txn:[['05-08','out',2,'금형 정비']]}
];
var ICON={'베어링':'⚙️','모터부품':'🔌','전기부품':'💡','유압부품':'🛢️','금형부품':'🔩','소모품':'🧴'};
var seq=10,selId=null,txMode='in';
function statOf(p){return p.qty===0?'out':(p.qty<=p.safe?'low':'ok');}
var ST={ok:{ko:'정상',cls:'st-ok'},low:{ko:'부족',cls:'st-low'},out:{ko:'품절',cls:'st-out'}};
function vis(){
  var fc=document.getElementById('fCat').value,fs=document.getElementById('fStat').value;
  var kw=document.getElementById('fKw').value.trim().toLowerCase();
  return PART.filter(function(p){
    if(fc&&p.cat!==fc)return false;
    if(fs&&statOf(p)!==fs)return false;
    if(kw&&p.nm.toLowerCase().indexOf(kw)<0&&p.id.toLowerCase().indexOf(kw)<0)return false;
    return true;});
}
function apply(){
  document.getElementById('kTot').textContent=PART.length;
  document.getElementById('kLow').textContent=PART.filter(function(p){return statOf(p)==='low';}).length;
  document.getElementById('kOut').textContent=PART.filter(function(p){return statOf(p)==='out';}).length;
  var val=PART.reduce(function(s,p){return s+p.qty*p.price;},0);
  document.getElementById('kVal').textContent=Math.round(val/1000).toLocaleString();
  var tx=PART.reduce(function(s,p){return s+p.txn.filter(function(t){return t[0]==='05-20';}).length;},0);
  document.getElementById('kTx').textContent=tx;
  renderList();
}
function renderList(){
  var v=vis(),h='';
  v.forEach(function(p){
    var s=statOf(p),pct=Math.min(100,Math.round(p.qty/(p.safe*2||1)*100));
    var c=s==='out'?'#dc2626':(s==='low'?'#f59e0b':'#10b981');
    h+='<tr class="'+(selId===p.id?'sel':'')+'" onclick="pickPart(\''+p.id+'\')">'+
      '<td class="mono" style="font-weight:700;">'+p.id+'</td>'+
      '<td>'+p.nm+'</td><td>'+p.cat+'</td>'+
      '<td class="mono" style="font-weight:700;">'+p.qty+' <span style="color:#9ca3af;">/ '+p.safe+'</span></td>'+
      '<td><div class="qbar"><i style="width:'+pct+'%;background:'+c+';"></i></div></td>'+
      '<td><span class="st '+ST[s].cls+'"><span class="dot"></span>'+ST[s].ko+'</span></td></tr>';
  });
  document.getElementById('tbody').innerHTML=h;
  document.getElementById('empty').style.display=v.length?'none':'block';
  document.getElementById('listSub').textContent=v.length+'품목';
}
function byId(id){return PART.filter(function(p){return p.id===id;})[0];}
function pickPart(id){selId=id;renderList();renderDetail();}
function renderDetail(){
  var p=byId(selId);
  if(!p){document.getElementById('detail').innerHTML='<div class="empty">← 좌측 목록에서 자재를 선택하세요.</div>';return;}
  var s=statOf(p);
  var c=s==='out'?'#dc2626':(s==='low'?'#f59e0b':'#059669');
  var specs=[['분류',p.cat],['보관 위치',p.loc],['안전 재고',p.safe+' EA'],
    ['단가',p.price.toLocaleString()+' 원'],['재고 금액',(p.qty*p.price).toLocaleString()+' 원']];
  var h='<div class="card-t">📦 자재 상세</div>'+
    '<div class="pd-head"><div class="pd-ph">'+(ICON[p.cat]||'📦')+'</div>'+
      '<div style="flex:1;"><div class="pd-nm">'+p.nm+'</div><div class="pd-id">'+p.id+'</div>'+
      '<div style="margin-top:6px;"><span class="st '+ST[s].cls+'"><span class="dot"></span>'+ST[s].ko+'</span></div></div></div>'+
    '<div class="stockbig"><div class="sv" style="color:'+c+'">'+p.qty+'</div>'+
      '<div class="sl">현재고 EA · 안전재고 '+p.safe+' EA'+(s==='low'?' · ⚠ 발주 필요':s==='out'?' · ⛔ 즉시 발주':'')+'</div></div>'+
    '<div class="specs">'+specs.map(function(x){
      return '<div class="srow"><span class="sk">'+x[0]+'</span><span class="sv">'+x[1]+'</span></div>';}).join('')+'</div>'+
    '<div class="acts">'+
      '<button class="btn btn-b btn-sm" style="flex:1;" onclick="openTxn(\'in\')">▼ 입고</button>'+
      '<button class="btn btn-o btn-sm" style="flex:1;" onclick="openTxn(\'out\')">▲ 출고</button></div>'+
    '<div class="txns"><div class="txns-t">입출고 이력 ('+p.txn.length+'건)</div>'+
      p.txn.map(function(t){
        return '<div class="tx"><span class="td">'+t[0]+'</span>'+
          '<span class="tb '+(t[1]==='in'?'tx-in':'tx-out')+'">'+(t[1]==='in'?'입고':'출고')+' '+t[2]+'</span>'+
          '<span style="color:#656d76;flex:1;">'+t[3]+'</span></div>';
      }).join('')+'</div>';
  document.getElementById('detail').innerHTML=h;
}
function openTxn(mode){
  txMode=mode;var p=byId(selId);
  document.getElementById('txTitle').textContent=(mode==='in'?'입고 처리':'출고 처리');
  document.getElementById('txQL').innerHTML=(mode==='in'?'입고':'출고')+' 수량 <span class="req">*</span>';
  document.getElementById('txInfo').innerHTML=
    '<div class="srow"><span class="sk">자재</span><span class="sv">'+p.nm+'</span></div>'+
    '<div class="srow"><span class="sk">현재고</span><span class="sv">'+p.qty+' EA</span></div>';
  document.getElementById('txRef').innerHTML=(mode==='in'
    ?['발주입고','반품입고','재고조정'].map(function(r){return '<option>'+r+'</option>';}).join('')
    :['정비 청구','MWO 작업지시','폐기','재고조정'].map(function(r){return '<option>'+r+'</option>';}).join(''));
  document.getElementById('txQty').value=mode==='in'?20:1;
  document.getElementById('txWarn').style.display='none';
  document.getElementById('txBtn').className='btn '+(mode==='in'?'btn-b':'btn-o');
  openOv('ovTxn');
}
function doTxn(){
  var p=byId(selId),q=parseInt(document.getElementById('txQty').value,10);
  if(isNaN(q)||q<1){toast('err','입력 오류','수량은 1 이상이어야 합니다.');return;}
  if(txMode==='out'&&q>p.qty){
    document.getElementById('txWarn').style.display='block';
    document.getElementById('txWarn').textContent='⚠ 출고 수량('+q+')이 현재고('+p.qty+')를 초과합니다.';
    return;
  }
  var ref=document.getElementById('txRef').value;
  if(txMode==='in')p.qty+=q;else p.qty-=q;
  p.txn.unshift(['05-20',txMode,q,ref]);
  closeOv('ovTxn');apply();renderDetail();
  var s=statOf(p);
  toast(s==='out'?'err':s==='low'?'warn':'',
    p.id+(txMode==='in'?' 입고':' 출고')+' 완료',
    q+' EA '+(txMode==='in'?'입고':'출고')+' → 현재고 '+p.qty+' EA'+
    (s==='out'?' · 품절 상태':s==='low'?' · 재고 부족, 발주 권장':''));
}
function openNew(){
  ['nNm','nLoc'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('nQty').value=20;document.getElementById('nSafe').value=10;
  document.getElementById('nPrice').value=8000;openOv('ovNew');
}
function addPart(){
  var nm=document.getElementById('nNm').value.trim();
  if(!nm){toast('err','입력 오류','자재명은 필수 항목입니다.');return;}
  var qty=parseInt(document.getElementById('nQty').value,10);
  var safe=parseInt(document.getElementById('nSafe').value,10);
  if(isNaN(qty)||isNaN(safe)||qty<0||safe<0){toast('err','입력 오류','재고 수량을 확인하세요.');return;}
  var cat=document.getElementById('nCat').value;
  var pfx={'베어링':'BRG','모터부품':'MOT','전기부품':'ELE','유압부품':'HYD','금형부품':'MLD','소모품':'CSM'}[cat];
  var id='SP-'+pfx+'-'+('00'+seq++).slice(-3);
  PART.push({id:id,nm:nm,cat:cat,qty:qty,safe:safe,price:parseInt(document.getElementById('nPrice').value,10)||0,
    loc:document.getElementById('nLoc').value||'-',txn:[['05-20','in',qty,'신규 등록']]});
  closeOv('ovNew');selId=id;apply();renderDetail();
  toast('','자재 등록 완료',id+' 「'+nm+'」 자재가 등록되었습니다.');
}
function exportCsv(){
  var v=vis();
  var csv='PartID,Name,Category,Qty,SafetyStock,Status,UnitPrice,StockValue,Location\n';
  v.forEach(function(p){
    csv+=[p.id,p.nm,p.cat,p.qty,p.safe,ST[statOf(p)].ko,p.price,p.qty*p.price,p.loc].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='MNT_SpareParts_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','정비 자재 '+v.length+'품목을 CSV로 내보냈습니다.');
}
function resetAll(){
  document.getElementById('fCat').value='';document.getElementById('fStat').value='';
  document.getElementById('fKw').value='';apply();
  toast('info','초기화','자재 목록 필터를 초기화했습니다.');
}
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='warn'?'⚠ ':type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4400);
}
apply();
</script>
</body>
</html>
