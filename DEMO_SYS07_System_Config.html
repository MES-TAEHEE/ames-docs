<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SYS-07 System Config · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select,input{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.dirty{display:none;font-size:10px;font-weight:700;color:#d97706;background:#fffbeb;border:1px solid #fde68a;border-radius:5px;padding:3px 9px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.grp{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.grp-h{padding:10px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);display:flex;align-items:center;gap:6px;}
.cfg-r{padding:11px 16px;border-bottom:1px solid #eef1f5;display:flex;align-items:center;gap:14px;}
.cfg-r:last-child{border:none;}
.cfg-r.chg{background:#fffbeb;}
.cfg-info{flex:1;min-width:0;}
.cfg-nm{font-size:12px;font-weight:700;}
.cfg-nm .key{font-family:'JetBrains Mono',monospace;font-size:9px;color:#9ca3af;font-weight:400;margin-left:6px;}
.cfg-ds{font-size:10px;color:var(--sub);margin-top:2px;}
.cfg-ctl{flex-shrink:0;width:200px;display:flex;justify-content:flex-end;}
.cfg-ctl input,.cfg-ctl select{width:100%;}
.cfg-ctl input[type=number]{text-align:right;font-family:'JetBrains Mono',monospace;}
.tk{width:42px;height:23px;border-radius:12px;background:#cbd5e1;position:relative;cursor:pointer;transition:background .15s;}
.tk.on{background:var(--pp);}
.tk i{position:absolute;top:2.5px;left:2.5px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;}
.tk.on i{left:21.5px;}
.unit{font-size:10px;color:var(--sub);margin-left:6px;align-self:center;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">SYS-07</div>
  <div class="sh-tt"><div class="sh-en">System Configuration</div><div class="sh-ko">시스템 설정 — 전역 운영 파라미터 관리</div></div>
  <span class="sh-tag">/sys/config</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>분류 Category</label>
    <select id="fCat" onchange="render()"><option value="">전체 All</option><option>일반</option><option>생산</option><option>품질</option><option>보안</option><option>인터페이스</option></select></div>
  <div class="fld"><label>검색 Search</label>
    <input id="fKw" placeholder="설정 항목" oninput="render()" style="width:160px;"></div>
  <span class="dirty" id="dirty">● 저장되지 않은 변경 사항</span>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-s" onclick="resetDefaults()">↺ 기본값 복원</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
    <button class="btn btn-p" onclick="save()">💾 설정 저장</button>
  </div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#0891b2"><div class="kv" id="kTot">0</div><div class="kl">설정 항목 · Parameters</div></div>
    <div class="kpi" style="--c:#8b5cf6"><div class="kv" id="kCat">0</div><div class="kl">설정 분류 · Categories</div></div>
    <div class="kpi" style="--c:#d97706"><div class="kv" id="kChg">0</div><div class="kl">변경된 항목 · Modified</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kVer">v3.1</div><div class="kl">시스템 버전 · A-MES</div></div>
  </div>
  <div id="groups"></div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var CFG=[
 {cat:'일반',key:'SYS.COMPANY',nm:'사업장명',ds:'시스템 상단에 표시되는 사업장 명칭',type:'text',def:'SEOYON E-HWA 서산공장'},
 {cat:'일반',key:'SYS.TIMEZONE',nm:'표준 시간대',ds:'시스템 전역 시간대 설정',type:'select',opts:['Asia/Seoul (KST)','UTC'],def:'Asia/Seoul (KST)'},
 {cat:'일반',key:'SYS.LANG',nm:'기본 언어',ds:'신규 사용자 기본 표시 언어',type:'select',opts:['한국어','English','中文'],def:'한국어'},
 {cat:'일반',key:'SYS.SESSION',nm:'세션 유지 시간',ds:'미사용 시 자동 로그아웃까지 시간',type:'number',unit:'분',def:30},
 {cat:'생산',key:'PRD.SHIFT',nm:'교대 운영 방식',ds:'공장 기본 교대 패턴',type:'select',opts:['2교대 (주·야)','3교대','1교대'],def:'2교대 (주·야)'},
 {cat:'생산',key:'PRD.WO_AUTO',nm:'작업지시 자동 발행',ds:'생산계획 확정 시 작업지시 자동 생성',type:'toggle',def:true},
 {cat:'생산',key:'PRD.OEE_TARGET',nm:'OEE 목표치',ds:'라인 OEE 목표 기준값',type:'number',unit:'%',def:85},
 {cat:'품질',key:'QC.DEFECT_LIMIT',nm:'불량률 관리 한계',ds:'공정 불량률 경고 발동 임계값',type:'number',unit:'%',def:2.0},
 {cat:'품질',key:'QC.SAMPLING',nm:'검사 방식',ds:'기본 품질 검사 방식',type:'select',opts:['전수 검사','샘플링 검사','AQL 기준'],def:'샘플링 검사'},
 {cat:'품질',key:'QC.HOLD_AUTO',nm:'불합격 자동 보류',ds:'검사 불합격 시 로트 자동 보류 처리',type:'toggle',def:true},
 {cat:'보안',key:'SEC.PW_EXPIRE',nm:'비밀번호 만료 주기',ds:'비밀번호 강제 변경 주기',type:'number',unit:'일',def:90},
 {cat:'보안',key:'SEC.LOGIN_LOCK',nm:'로그인 실패 잠금 횟수',ds:'연속 실패 시 계정 잠금 기준',type:'number',unit:'회',def:5},
 {cat:'보안',key:'SEC.MFA',nm:'2단계 인증 (MFA)',ds:'관리자 계정 2단계 인증 강제',type:'toggle',def:true},
 {cat:'인터페이스',key:'IF.SAP_CYCLE',nm:'SAP 연동 주기',ds:'SAP B1 데이터 동기화 간격',type:'select',opts:['실시간','15분','30분','1시간'],def:'30분'},
 {cat:'인터페이스',key:'IF.RETRY',nm:'연동 실패 재시도 횟수',ds:'인터페이스 오류 시 자동 재시도 횟수',type:'number',unit:'회',def:3},
 {cat:'인터페이스',key:'IF.OPC_BUFFER',nm:'설비 데이터 버퍼링',ds:'OPC-UA 수집 데이터 임시 버퍼 사용',type:'toggle',def:true}
];
var val={},dirty=false;
function initVal(){CFG.forEach(function(c){val[c.key]=c.def;});}
function vis(){
  var fc=document.getElementById('fCat').value;
  var kw=document.getElementById('fKw').value.trim().toLowerCase();
  return CFG.filter(function(c){
    if(fc&&c.cat!==fc)return false;
    if(kw&&c.nm.toLowerCase().indexOf(kw)<0&&c.key.toLowerCase().indexOf(kw)<0)return false;
    return true;});
}
function render(){
  document.getElementById('kTot').textContent=CFG.length;
  var cats=[];CFG.forEach(function(c){if(cats.indexOf(c.cat)<0)cats.push(c.cat);});
  document.getElementById('kCat').textContent=cats.length;
  var chg=CFG.filter(function(c){return val[c.key]!==c.def;}).length;
  document.getElementById('kChg').textContent=chg;
  var v=vis();
  var byCat={};v.forEach(function(c){(byCat[c.cat]=byCat[c.cat]||[]).push(c);});
  var ic={'일반':'⚙️','생산':'🏭','품질':'🔬','보안':'🔐','인터페이스':'🔌'};
  var h='';
  Object.keys(byCat).forEach(function(cat){
    h+='<div class="grp"><div class="grp-h">'+(ic[cat]||'•')+' '+cat+' 설정</div>';
    byCat[cat].forEach(function(c){
      var changed=val[c.key]!==c.def;
      h+='<div class="cfg-r'+(changed?' chg':'')+'">'+
        '<div class="cfg-info"><div class="cfg-nm">'+c.nm+'<span class="key">'+c.key+'</span></div>'+
        '<div class="cfg-ds">'+c.ds+'</div></div>'+
        '<div class="cfg-ctl">'+ctl(c)+'</div></div>';
    });
    h+='</div>';
  });
  document.getElementById('groups').innerHTML=h||'<div style="text-align:center;color:#9ca3af;padding:30px;">조건에 맞는 설정이 없습니다.</div>';
}
function ctl(c){
  var cur=val[c.key];
  if(c.type==='toggle'){
    return '<div class="tk'+(cur?' on':'')+'" onclick="setVal(\''+c.key+'\',\'toggle\')"><i></i></div>';
  }
  if(c.type==='select'){
    return '<select onchange="setVal(\''+c.key+'\',this.value)">'+
      c.opts.map(function(o){return '<option'+(o===cur?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
  }
  if(c.type==='number'){
    return '<input type="number" value="'+cur+'" step="any" onchange="setVal(\''+c.key+'\',this.value)">'+
      (c.unit?'<span class="unit">'+c.unit+'</span>':'');
  }
  return '<input type="text" value="'+cur+'" onchange="setVal(\''+c.key+'\',this.value)">';
}
function setVal(key,v){
  var c=CFG.filter(function(x){return x.key===key;})[0];
  if(v==='toggle')val[key]=!val[key];
  else if(c.type==='number')val[key]=parseFloat(v);
  else val[key]=v;
  setDirty(true);render();
}
function setDirty(v){dirty=v;document.getElementById('dirty').style.display=v?'inline-block':'none';}
function save(){
  if(!dirty){toast('info','변경 없음','저장할 변경 사항이 없습니다.');return;}
  var chg=CFG.filter(function(c){return val[c.key]!==c.def;}).length;
  /* commit: new defaults */
  CFG.forEach(function(c){c.def=val[c.key];});
  setDirty(false);render();
  toast('','설정 저장 완료',chg+'개 항목의 변경 사항이 시스템에 적용되었습니다.');
}
function resetDefaults(){
  CFG.forEach(function(c){val[c.key]=c.def;});
  setDirty(false);render();
  toast('info','기본값 복원','저장된 값으로 모든 설정을 복원했습니다.');
}
function exportCsv(){
  var csv='Category,Key,Name,CurrentValue,Type\n';
  CFG.forEach(function(c){
    csv+=[c.cat,c.key,c.nm,'"'+val[c.key]+'"',c.type].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='SYS_Config_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','시스템 설정을 CSV로 내보냈습니다.');
}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
initVal();render();
</script>
</body>
</html>
