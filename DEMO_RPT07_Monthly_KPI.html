<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RPT-07 Monthly KPI · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.rpt-title{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.rpt-title h2{font-size:16px;font-weight:900;}
.rpt-title .sub{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:13px 15px;border-left:3px solid var(--c);}
.kpi .kv{font-size:27px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:5px;}
.score-hero{background:linear-gradient(135deg,#03251a,#064e3b);border-radius:10px;padding:18px 22px;display:flex;align-items:center;gap:24px;margin-bottom:16px;color:#fff;}
.sh-gauge{width:96px;height:96px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sh-gauge .hole{width:70px;height:70px;background:#03251a;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sh-gauge .gv{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;color:#34d399;}
.sh-gauge .gl{font-size:7px;color:rgba(255,255,255,.6);}
.sh-info h3{font-size:15px;font-weight:800;}
.sh-info p{font-size:11px;color:rgba(255,255,255,.65);margin-top:4px;line-height:1.6;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
thead th.c{text-align:center;}
tbody td{padding:9px 9px;border-bottom:1px solid #eef1f5;}
tbody tr.cat td{background:#03251a;color:#34d399;font-weight:800;font-size:10px;padding:6px 9px;}
tbody tr:hover:not(.cat) td{background:#f0fdf4;}
.mono{font-family:'JetBrains Mono',monospace;}
.spark{display:inline-flex;align-items:flex-end;gap:2px;height:22px;}
.spark i{width:5px;background:#a7f3d0;border-radius:1px;min-height:2px;}
.spark i.last{background:#059669;}
.ach{display:inline-flex;align-items:center;gap:5px;}
.ach .at{width:54px;height:8px;background:#eef1f5;border-radius:4px;overflow:hidden;}
.ach .at i{display:block;height:100%;}
.ach b{font-family:'JetBrains Mono',monospace;font-size:10px;}
.st{display:inline-block;font-size:9px;font-weight:700;padding:2px 9px;border-radius:9px;}
.st-ok{background:#d1fae5;color:#065f46;}.st-warn{background:#fef3c7;color:#92400e;}.st-bad{background:#fee2e2;color:#991b1b;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:240px;max-width:380px;animation:ti .25s ease;}
.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">RPT-07</div>
  <div class="sh-tt"><div class="sh-en">Monthly KPI Scorecard</div><div class="sh-ko">월간 KPI — 핵심성과지표 종합 스코어카드</div></div>
  <span class="sh-tag">/rpt/monthly-kpi</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>대상 월 Month</label>
    <select id="fMonth" onchange="apply()"><option>2026년 5월</option><option>2026년 4월</option><option>2026년 3월</option></select></div>
  <div class="fld"><label>부문 Category</label>
    <select id="fCat" onchange="apply()"><option value="">전체</option><option>생산</option><option>품질</option><option>납기</option><option>설비</option><option>원가</option></select></div>
  <button class="btn btn-p btn-sm" onclick="apply()">🔍 적용</button>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-s" onclick="printRpt()">🖨 인쇄</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
  </div>
</div>
<div class="body">
  <div class="rpt-title"><h2>월간 KPI 스코어카드</h2><span class="sub" id="rSub">2026년 5월 · 전 부문</span></div>
  <div class="score-hero">
    <div class="sh-gauge" id="heroGauge"><div class="hole"><div class="gv" id="heroV">0</div><div class="gl">SCORE</div></div></div>
    <div class="sh-info"><h3 id="heroT">종합 KPI 달성도</h3><p id="heroP">-</p></div>
  </div>
  <div class="kpis">
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kPass">0</div><div class="kl">목표 달성 지표 · Pass</div></div>
    <div class="kpi" style="--c:#f59e0b"><div class="kv" id="kWarn">0</div><div class="kl">근접 지표 · Near</div></div>
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kFail">0</div><div class="kl">미달 지표 · Fail</div></div>
    <div class="kpi" style="--c:#2563eb"><div class="kv" id="kAvg">0%</div><div class="kl">평균 달성률 · Achievement</div></div>
  </div>
  <div class="panel">
    <div class="panel-h">📊 KPI 상세 스코어카드</div>
    <table>
      <thead><tr>
        <th>KPI 지표</th><th class="c">목표</th><th class="c">실적</th>
        <th class="c" style="width:150px;">달성률</th><th class="c">6개월 추이</th><th class="c">평가</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
/* dir: 'up'=higher better, 'dn'=lower better. trend index 5 = current month */
var KPI=[
 {cat:'생산',nm:'생산 계획 달성률',unit:'%',target:100,dir:'up',trend:[97,99,101,98,103,101.4]},
 {cat:'생산',nm:'설비 종합 가동률',unit:'%',target:90,dir:'up',trend:[88,90,87,89,91,89.2]},
 {cat:'품질',nm:'직행률 (FTT)',unit:'%',target:97,dir:'up',trend:[95.8,96.4,96.0,96.9,97.3,97.6]},
 {cat:'품질',nm:'공정 불량률',unit:'%',target:1.5,dir:'dn',trend:[2.1,1.9,2.0,1.7,1.5,1.42]},
 {cat:'품질',nm:'고객 클레임 건수',unit:'건',target:2,dir:'dn',trend:[4,3,5,2,3,2]},
 {cat:'납기',nm:'납기 준수율 (OTD)',unit:'%',target:98,dir:'up',trend:[97.1,97.8,96.9,97.4,98.0,97.6]},
 {cat:'납기',nm:'출하 정시율',unit:'%',target:98,dir:'up',trend:[98.4,99.0,98.2,98.6,99.1,98.7]},
 {cat:'설비',nm:'종합 OEE',unit:'%',target:85,dir:'up',trend:[78.5,80.1,79.0,79.8,81.2,79.6]},
 {cat:'설비',nm:'평균 MTBF',unit:'h',target:350,dir:'up',trend:[300,320,290,330,360,372]},
 {cat:'원가',nm:'재고 회전율',unit:'회',target:5.0,dir:'up',trend:[4.4,4.6,4.5,4.8,5.1,5.2]}
];
function monIdx(){var s=document.getElementById('fMonth').value;
  return s.indexOf('5월')>=0?5:(s.indexOf('4월')>=0?4:3);}
function actual(k){return k.trend[monIdx()];}
function achv(k){
  var a=actual(k);
  if(k.dir==='up')return a/k.target*100;
  /* lower better: target/actual */
  return a===0?200:k.target/a*100;
}
function status(pct){return pct>=100?'ok':(pct>=95?'warn':'bad');}
var STT={ok:{ko:'달성',cls:'st-ok'},warn:{ko:'근접',cls:'st-warn'},bad:{ko:'미달',cls:'st-bad'}};
function r1(n){return Math.round(n*10)/10;}
function vis(){var c=document.getElementById('fCat').value;return KPI.filter(function(k){return !c||k.cat===c;});}
function apply(){
  var v=vis();
  var pass=0,warn=0,fail=0,sum=0;
  v.forEach(function(k){
    var p=achv(k),s=status(p);sum+=Math.min(p,130);
    if(s==='ok')pass++;else if(s==='warn')warn++;else fail++;
  });
  var avg=v.length?r1(sum/v.length):0;
  document.getElementById('kPass').textContent=pass;
  document.getElementById('kWarn').textContent=warn;
  document.getElementById('kFail').textContent=fail;
  document.getElementById('kAvg').textContent=avg+'%';
  /* hero score = pass ratio weighted */
  var score=v.length?Math.round((pass*100+warn*70+fail*30)/v.length):0;
  document.getElementById('heroV').textContent=score;
  var col=score>=85?'#34d399':(score>=70?'#fbbf24':'#f87171');
  document.getElementById('heroGauge').style.background='conic-gradient('+col+' 0% '+score+'%,rgba(255,255,255,.12) '+score+'% 100%)';
  document.getElementById('heroV').style.color=col;
  document.getElementById('heroP').textContent=
    '전체 '+v.length+'개 지표 중 '+pass+'개 달성 · '+warn+'개 근접 · '+fail+'개 미달 — '+
    (score>=85?'우수한 성과입니다.':score>=70?'대체로 양호하나 일부 개선이 필요합니다.':'중점 개선 관리가 필요합니다.');
  document.getElementById('rSub').textContent=document.getElementById('fMonth').value+' · '+
    (document.getElementById('fCat').value||'전 부문');
  renderTable(v);
}
function renderTable(v){
  var h='',curCat='';
  v.forEach(function(k){
    if(k.cat!==curCat){curCat=k.cat;h+='<tr class="cat"><td colspan="6">'+catName(k.cat)+'</td></tr>';}
    var a=actual(k),p=achv(k),s=status(p);
    var mx=Math.max.apply(null,k.trend),mn=Math.min.apply(null,k.trend);
    var spark=k.trend.map(function(t,i){
      var hh=(t-mn)/(mx-mn||1)*20+2;
      return '<i class="'+(i===5?'last':'')+'" style="height:'+hh+'px"></i>';}).join('');
    var col=s==='ok'?'#10b981':(s==='warn'?'#f59e0b':'#dc2626');
    h+='<tr><td><b>'+k.nm+'</b></td>'+
      '<td class="c mono" style="text-align:center;color:#656d76;">'+k.target+k.unit+'</td>'+
      '<td class="c mono" style="text-align:center;font-weight:800;">'+a+k.unit+'</td>'+
      '<td class="c" style="text-align:center;"><span class="ach"><span class="at"><i style="width:'+Math.min(100,p)+'%;background:'+col+'"></i></span>'+
        '<b style="color:'+col+'">'+r1(p)+'%</b></span></td>'+
      '<td class="c" style="text-align:center;"><span class="spark">'+spark+'</span></td>'+
      '<td class="c" style="text-align:center;"><span class="st '+STT[s].cls+'">'+STT[s].ko+'</span></td></tr>';
  });
  document.getElementById('tbody').innerHTML=h;
}
function catName(c){
  return {'생산':'🏭 생산 부문','품질':'✓ 품질 부문','납기':'🚚 납기 부문','설비':'⚙️ 설비 부문','원가':'💰 원가 부문'}[c]||c;
}
function exportCsv(){
  var v=vis();
  var csv='Category,KPI,Target,Actual,Unit,Achievement%,Status\n';
  v.forEach(function(k){
    csv+=[k.cat,k.nm,k.target,actual(k),k.unit,r1(achv(k)),STT[status(achv(k))].ko].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='RPT_MonthlyKPI_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','월간 KPI 스코어카드를 CSV로 내보냈습니다.');
}
function printRpt(){toast('info','인쇄 미리보기','월간 KPI 리포트 인쇄를 준비합니다. (데모)');}
function resetAll(){
  document.getElementById('fMonth').selectedIndex=0;document.getElementById('fCat').value='';
  apply();toast('info','초기화','리포트 조건을 초기화했습니다.');
}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4000);
}
apply();
</script>
</body>
</html>
