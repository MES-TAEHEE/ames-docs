<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>INJ-08 Andon Emergency · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--sc:#ea580c;--em:#dc2626;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:radial-gradient(ellipse at 50% 30%,#1a1208,#0a0805);color:#e8e2d8;font-size:14px;display:flex;flex-direction:column;overflow:hidden;}
.head{flex-shrink:0;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--em);background:linear-gradient(180deg,rgba(220,38,38,.15),rgba(0,0,0,.3));}
.head .id{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:#fca5a5;}
.head .tt{flex:1;}
.head .en{font-size:18px;font-weight:800;color:#fff;}
.head .ko{font-size:11px;color:#fda4af;}
.back{background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:13px;font-weight:700;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:inherit;}
.back:active{background:rgba(234,88,12,.18);}
.alarm{font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:6px 12px;border-radius:6px;background:var(--em);color:#fff;display:flex;align-items:center;gap:6px;animation:siren 1s infinite;}
@keyframes siren{50%{background:#fca5a5;color:#7f1d1d;}}
.alarm .d{font-size:14px;}
.body{flex:1;display:grid;grid-template-columns:1.3fr 1fr;gap:14px;padding:18px 24px;min-height:0;overflow:hidden;}
.col{display:flex;flex-direction:column;gap:13px;min-height:0;}
.col:last-child{overflow-y:auto;}
.col:last-child::-webkit-scrollbar{width:8px;}.col:last-child::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
.sec-t{font-size:11px;color:#fca5a5;text-transform:uppercase;letter-spacing:2px;font-weight:800;display:flex;align-items:center;gap:8px;}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.cbtn{padding:22px 18px;background:rgba(255,255,255,.04);border:2px solid #3a2a14;border-radius:13px;cursor:pointer;text-align:center;transition:all .12s;border-top:5px solid var(--c);}
.cbtn:active{transform:scale(.97);background:rgba(220,38,38,.15);}
.cbtn .ic{font-size:42px;}
.cbtn .nm{font-size:17px;font-weight:800;color:#fff;margin-top:6px;}
.cbtn .ds{font-size:11px;color:#fdba74;margin-top:3px;}
.cbtn .eta{font-family:'JetBrains Mono',monospace;font-size:10px;color:#a8997f;margin-top:4px;letter-spacing:1px;}
.big-stop{padding:30px;background:linear-gradient(180deg,#dc2626,#7f1d1d);border:none;border-radius:13px;color:#fff;font-size:24px;font-weight:900;font-family:inherit;cursor:pointer;letter-spacing:4px;box-shadow:0 6px 0 #450a0a;width:100%;}
.big-stop:active{transform:translateY(3px);box-shadow:0 3px 0 #450a0a;}
.big-stop .sub{display:block;font-size:11px;font-weight:600;letter-spacing:2px;margin-top:5px;opacity:.85;}
/* active calls */
.calls{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-radius:11px;padding:14px 18px;flex:1;display:flex;flex-direction:column;min-height:0;}
.calls h3{font-size:11px;color:#fdba74;text-transform:uppercase;letter-spacing:2px;font-weight:800;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.calls .badge{margin-left:auto;background:var(--em);color:#fff;font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px;}
.c-list{flex:1;overflow-y:auto;}
.c-list::-webkit-scrollbar{width:8px;}.c-list::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
.call{background:rgba(0,0,0,.3);border:1px solid #3a2a14;border-left:4px solid var(--st);border-radius:8px;padding:11px 14px;margin-bottom:8px;}
.call .ch{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.call .ci{font-size:18px;}
.call .ct{font-size:13px;font-weight:800;color:#fff;flex:1;}
.call .stb{font-size:9px;font-weight:800;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.08);color:var(--st);}
.call .st-act .stb{background:var(--st);color:#fff;animation:bl 1.2s infinite;}
@keyframes bl{50%{opacity:.5;}}
.call .cm{font-size:11px;color:#a8997f;display:flex;justify-content:space-between;}
.call .cm b{font-family:'JetBrains Mono',monospace;color:#fdba74;}
.call .cact{display:flex;gap:6px;margin-top:7px;}
.call .ca{flex:1;padding:7px;background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;font-family:inherit;}
.call .ca:active{background:rgba(234,88,12,.18);}
.call .ca.ok{color:#86efac;border-color:#14532d;}
.call .ca.cancel{color:#fca5a5;border-color:#7f1d1d;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal-ov.on{display:flex;}
.confirm{background:#1a1208;border:2px solid var(--em);border-radius:14px;padding:30px 36px;max-width:480px;text-align:center;}
.confirm .ic{font-size:64px;animation:bl 1s infinite;}
.confirm .ti{font-size:22px;font-weight:900;color:#fff;margin-top:8px;}
.confirm .ds{font-size:13px;color:#fdba74;margin-top:8px;line-height:1.6;}
.confirm .acts{display:flex;gap:11px;margin-top:22px;}
.confirm .b{flex:1;padding:14px;border:none;border-radius:9px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;}
.confirm .b.cancel{background:#1a1208;border:1px solid #3a2a14;color:#a8997f;}
.confirm .b.send{background:linear-gradient(180deg,var(--em),#7f1d1d);color:#fff;letter-spacing:2px;}
.toasts{position:fixed;top:14px;right:14px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1a1208;border-radius:10px;padding:13px 17px;border-left:5px solid var(--em);font-size:13px;min-width:280px;max-width:400px;animation:ti .25s ease;color:#fff;box-shadow:0 8px 26px rgba(0,0,0,.5);}
.toast.ok{border-left-color:#16a34a;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:3px;}
.toast .tb{color:#a8997f;font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="head">
  <button class="back" onclick="back()">‹ 대시보드</button>
  <div class="id">INJ-08</div>
  <div class="tt"><div class="en">Andon Emergency Call</div><div class="ko">안돈 호출 — 긴급 지원 요청 시스템</div></div>
  <span class="alarm"><span class="d">🚨</span>ANDON ALERT SYSTEM</span>
</div>
<div class="body">
  <div class="col">
    <div class="sec-t"><span style="font-size:16px;">🆘</span>호출 유형 선택 · CALL TYPE</div>
    <div class="btn-grid">
      <div class="cbtn" style="--c:#f59e0b" onclick="ask('반장 호출','👨‍💼','반장에게 즉시 호출 신호를 보냅니다','3분')"><div class="ic">👨‍💼</div><div class="nm">반장 호출</div><div class="ds">일반 작업 문의</div><div class="eta">ETA · 3분</div></div>
      <div class="cbtn" style="--c:#3b82f6" onclick="ask('정비 호출','🔧','설비 정비반에 호출 신호를 보냅니다','5분')"><div class="ic">🔧</div><div class="nm">정비 호출</div><div class="ds">설비 이상·고장</div><div class="eta">ETA · 5분</div></div>
      <div class="cbtn" style="--c:#8b5cf6" onclick="ask('품질 호출','🔬','품질팀에 호출 신호를 보냅니다','5분')"><div class="ic">🔬</div><div class="nm">품질 호출</div><div class="ds">불량·이상 발생</div><div class="eta">ETA · 5분</div></div>
      <div class="cbtn" style="--c:#10b981" onclick="ask('자재 부족','📦','자재팀에 즉시 보충 요청을 보냅니다','7분')"><div class="ic">📦</div><div class="nm">자재 부족</div><div class="ds">원자재 보충 요청</div><div class="eta">ETA · 7분</div></div>
    </div>
    <div class="sec-t" style="margin-top:6px;"><span style="font-size:16px;">⚠</span>비상 정지 · EMERGENCY STOP</div>
    <button class="big-stop" onclick="ask('🚨 비상 정지 / 안전 사고','🚨','전체 라인 비상 정지 신호를 발송합니다. 안전 담당·반장·관리자에게 즉시 통보됩니다','즉시')">
      🚨 EMERGENCY STOP
      <span class="sub">안전 사고 · 비상 정지 (안전 담당 즉시 통보)</span>
    </button>
  </div>
  <div class="col">
    <div class="calls">
      <h3>📡 진행 중 호출 <span class="badge" id="badge">2</span></h3>
      <div class="c-list" id="cList"></div>
    </div>
  </div>
</div>

<div class="modal-ov" id="modalConfirm">
  <div class="confirm">
    <div class="ic" id="cIc">🚨</div>
    <div class="ti" id="cTi">호출 확인</div>
    <div class="ds" id="cDs"></div>
    <div class="acts">
      <button class="b cancel" onclick="closeModal()">취소</button>
      <button class="b send" onclick="confirm()">▶ 즉시 호출</button>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var ICON={'반장 호출':'#f59e0b','정비 호출':'#3b82f6','품질 호출':'#8b5cf6','자재 부족':'#10b981','🚨 비상 정지 / 안전 사고':'#dc2626'};
var CALLS=[
 {ty:'정비 호출',ic:'🔧',at:'09:12',by:'박작업',st:'응답 대기',col:'#fbbf24',act:false,eta:'5분'},
 {ty:'자재 부족',ic:'📦',at:'09:05',by:'박작업',st:'배송 중',col:'#10b981',act:true,eta:'2분'}
];
var pend=null;
function ask(t,i,d,eta){pend={t:t,i:i,d:d,eta:eta};
  document.getElementById('cIc').textContent=i;
  document.getElementById('cTi').textContent=t+' 확인';
  document.getElementById('cDs').innerHTML=d+'.<br><b style="color:#fff;">예상 응답 시간: '+eta+'</b><br><br>「즉시 호출」을 누르면 알림이 즉시 발송됩니다.';
  document.getElementById('modalConfirm').classList.add('on');
}
function closeModal(){document.getElementById('modalConfirm').classList.remove('on');pend=null;}
function confirm(){
  if(!pend)return;
  CALLS.unshift({ty:pend.t,ic:pend.i,at:new Date().toTimeString().slice(0,5),by:'박작업',st:'호출 중',col:'#dc2626',act:true,eta:pend.eta});
  renderCalls();closeModal();
  toast('','🚨 호출 발송됨',pend.t+' — 알림이 발송되었습니다. ETA '+pend.eta);
  /* simulate status progression */
  var c=CALLS[0];
  setTimeout(function(){c.st='응답 중';c.col='#fbbf24';renderCalls();
    toast('info','응답 확인',pend.t+' — 담당자가 응답을 확인했습니다.');},2500);
  setTimeout(function(){c.st='도착';c.col='#22c55e';renderCalls();
    toast('ok','담당자 도착',pend.t+' — 담당자가 현장에 도착했습니다.');},6000);
  pend=null;
}
function renderCalls(){
  var n=CALLS.filter(function(c){return c.st!=='해결';}).length;
  document.getElementById('badge').textContent=n;
  document.getElementById('cList').innerHTML=CALLS.map(function(c,i){
    var aCls=(c.st==='호출 중'||c.st==='응답 중'||c.st==='배송 중')?'st-act':'';
    return '<div class="call '+aCls+'" style="--st:'+c.col+'">'+
      '<div class="ch"><span class="ci">'+c.ic+'</span>'+
      '<span class="ct">'+c.ty+'</span>'+
      '<span class="stb">'+c.st+'</span></div>'+
      '<div class="cm"><span>호출 '+c.at+' · '+c.by+'</span><b>ETA '+c.eta+'</b></div>'+
      '<div class="cact">'+
        (c.st==='해결'?'<span class="ca ok">✓ 종료됨</span>':
          '<button class="ca ok" onclick="resolve('+i+')">✓ 해결 처리</button>'+
          '<button class="ca cancel" onclick="cancel('+i+')">✕ 취소</button>')+
      '</div></div>';
  }).join('')||'<div style="text-align:center;color:#a8997f;padding:20px;font-size:12px;">진행 중인 호출이 없습니다.</div>';
}
function resolve(i){CALLS[i].st='해결';CALLS[i].col='#86efac';renderCalls();
  toast('ok','호출 해결 ✓',CALLS[i].ty+' — 정상 처리되었습니다.');}
function cancel(i){CALLS.splice(i,1);renderCalls();toast('','호출 취소','호출이 취소되었습니다.');}
function back(){toast('','뒤로 이동','POP 대시보드로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='info'?'ℹ ':type==='ok'?'✓ ':'🚨 ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3500);
}
renderCalls();
</script>
</body>
</html>
