<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WH-03 Inventory Status · A-MES PDA Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--pda:#06b6d4;--pda-dk:#0e7490;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:#0a1419;color:#cddde2;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
.pda{width:420px;max-width:100%;height:100%;max-height:760px;background:#0f1f25;border:2px solid #1a3540;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.pda-top{flex-shrink:0;background:linear-gradient(180deg,#1a3540,#0f1f25);padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:2px solid var(--pda);}
.pda-id{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#22d3ee;}
.pda-t{flex:1;font-size:13px;font-weight:800;color:#fff;}
.pda-bat{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.live{font-size:8px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:3px;}
.live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.pda-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;}
.pda-body::-webkit-scrollbar{width:6px;}.pda-body::-webkit-scrollbar-thumb{background:#1a3540;border-radius:3px;}
.search{display:flex;gap:8px;}
.search input{flex:1;padding:11px 14px;background:#1a3540;border:1px solid #2c5564;border-radius:8px;color:#fff;font-size:13px;font-family:inherit;}
.search input:focus{outline:none;border-color:var(--pda);}
.search button{padding:11px 13px;background:var(--pda);border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.k{background:rgba(6,182,212,.08);border:1px solid #1a3540;border-top:3px solid var(--c);border-radius:9px;padding:9px 12px;}
.k .l{font-size:9px;color:#67e8f9;font-family:'JetBrains Mono',monospace;}
.k .v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;color:var(--c);margin-top:2px;line-height:1;}
.k .s{font-size:9px;color:#7a9aa3;}
.section-h{font-size:10px;color:#67e8f9;text-transform:uppercase;letter-spacing:2px;font-weight:800;display:flex;align-items:center;gap:6px;}
.section-h .b{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;background:rgba(6,182,212,.18);padding:2px 6px;border-radius:4px;color:#22d3ee;}
.inv-r{background:rgba(255,255,255,.03);border:1px solid #1a3540;border-radius:9px;padding:11px 13px;cursor:pointer;border-left:3px solid var(--st);}
.inv-r:active{transform:scale(.98);}
.inv-r .h{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.inv-r .code{font-family:'JetBrains Mono',monospace;font-size:10px;color:#22d3ee;}
.inv-r .loc{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:800;color:#fbbf24;background:rgba(245,158,11,.12);padding:2px 7px;border-radius:4px;}
.inv-r .nm{font-size:12px;font-weight:800;color:#fff;}
.inv-r .qty{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.inv-r .qv{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:900;color:var(--st);}
.inv-r .qs{font-size:10px;color:#7a9aa3;}
.inv-r .qbar{height:5px;background:#1a3540;border-radius:3px;overflow:hidden;margin-top:5px;}
.inv-r .qbar i{display:block;height:100%;background:var(--st);}
.bottom-bar{flex-shrink:0;display:flex;gap:8px;padding:11px 14px;background:#1a3540;border-top:1px solid #0a1419;}
.bottom-bar button{flex:1;padding:13px 0;background:linear-gradient(180deg,var(--pda),var(--pda-dk));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:1px;box-shadow:0 3px 0 #155e75;}
.bottom-bar button:active{transform:translateY(2px);box-shadow:0 1px 0 #155e75;}
.bottom-bar button.sec{background:#0f1f25;color:#67e8f9;border:1px solid #1a3540;box-shadow:none;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#0f1f25;border:1px solid #1a3540;border-radius:9px;padding:12px 15px;border-left:4px solid var(--pda);font-size:12px;min-width:250px;max-width:340px;animation:ti .25s ease;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:#7a9aa3;font-size:10px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="pda">
  <div class="pda-top">
    <div class="pda-id">WH-03</div>
    <div class="pda-t">재고 현황</div>
    <span class="live"><span class="d"></span>LIVE</span>
    <span class="pda-bat">🔋 76%</span>
  </div>
  <div class="pda-body">
    <div class="search">
      <input placeholder="🔍 자재명·코드·로케이션" id="kw" oninput="filter()">
      <button onclick="scan()">📷</button>
    </div>
    <div class="kpis">
      <div class="k" style="--c:#22d3ee"><div class="l">총 SKU</div><div class="v">142</div><div class="s">품목</div></div>
      <div class="k" style="--c:#22c55e"><div class="l">정상</div><div class="v">126</div><div class="s">88.7%</div></div>
      <div class="k" style="--c:#fbbf24"><div class="l">부족</div><div class="v">12</div><div class="s">발주 필요</div></div>
      <div class="k" style="--c:#fca5a5"><div class="l">품절</div><div class="v">4</div><div class="s">긴급</div></div>
    </div>
    <div class="section-h">📦 자재 재고 <span class="b" id="cnt">8건</span></div>
    <div id="list"></div>
  </div>
  <div class="bottom-bar">
    <button class="sec" onclick="back()">← 메뉴</button>
    <button onclick="scan()">📷 자재 스캔</button>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var INV=[
 {code:'RM-PP-BLK',nm:'PP 수지 (블랙)',qty:'8,200 KG',loc:'A-03-2',pct:65,st:'ok'},
 {code:'RM-ABS-NAT',nm:'ABS 수지 (내추럴)',qty:'5,400 KG',loc:'A-04-1',pct:78,st:'ok'},
 {code:'RM-PP-BLK',nm:'PP 수지 (블랙)',qty:'3,100 KG',loc:'A-03-3',pct:25,st:'low'},
 {code:'PNT-BC-001',nm:'베이스코트 블랙',qty:'420 L',loc:'B-02-1',pct:84,st:'ok'},
 {code:'AM-CLIP-01',nm:'고정 클립',qty:'12,400 EA',loc:'C-05-3',pct:82,st:'ok'},
 {code:'SP-BRG-001',nm:'볼베어링 6206',qty:'8 EA',loc:'E-01-2',pct:18,st:'low'},
 {code:'AM-BOLT-M8',nm:'볼트 M8×20',qty:'0 EA',loc:'C-04-1',pct:0,st:'out'},
 {code:'PNT-CC-001',nm:'클리어코트',qty:'180 L',loc:'B-02-3',pct:45,st:'ok'}
];
function color(st){return st==='out'?'#fca5a5':(st==='low'?'#fbbf24':'#22c55e');}
function render(){
  var kw=(document.getElementById('kw').value||'').toLowerCase();
  var rows=INV.filter(function(r){return !kw||r.nm.toLowerCase().indexOf(kw)>=0||r.code.toLowerCase().indexOf(kw)>=0||r.loc.toLowerCase().indexOf(kw)>=0;});
  document.getElementById('cnt').textContent=rows.length+'건';
  document.getElementById('list').innerHTML=rows.map(function(r){
    var c=color(r.st);
    return '<div class="inv-r" style="--st:'+c+'" onclick="pick(\''+r.code+'\')">'+
      '<div class="h"><span class="code">'+r.code+'</span><span class="loc">📍 '+r.loc+'</span></div>'+
      '<div class="nm">'+r.nm+'</div>'+
      '<div class="qty"><span class="qv">'+r.qty+'</span><span class="qs">'+(r.st==='out'?'⛔ 품절':r.st==='low'?'⚠ 안전재고 미달':'✓ 정상')+'</span></div>'+
      '<div class="qbar"><i style="width:'+r.pct+'%"></i></div></div>';
  }).join('');
}
function filter(){render();}
function pick(c){toast('',c+' 상세','자재 상세 화면으로 이동합니다. (데모)');}
function scan(){toast('','📷 자재 스캔','자재 라벨을 스캔하면 즉시 재고를 조회합니다.');}
function back(){toast('','PDA 메뉴','PDA 메뉴로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">• '+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3000);
}
render();
</script>
</body>
</html>
