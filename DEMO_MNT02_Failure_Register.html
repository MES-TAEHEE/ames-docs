<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MNT-02 Failure Register · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--pp:#059669;--pp-dk:#047857;--bg:#f6f8fa;--bd:#d0d7de;--ink:#24292f;--sub:#656d76;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}
.scr-head{background:linear-gradient(135deg,#03251a,#052e1f);padding:16px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--pp);flex-shrink:0;}
.sh-id{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#34d399;line-height:.9;}
.sh-tt{flex:1;}
.sh-en{font-size:16px;font-weight:800;color:#fff;}
.sh-ko{font-size:11px;color:rgba(255,255,255,.5);}
.sh-tag{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:rgba(52,211,153,.16);color:#6ee7b7;border:1px solid rgba(52,211,153,.3);}
.sh-live{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 9px;border-radius:4px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.sh-live .d{width:6px;height:6px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:9px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld label{font-size:8px;font-weight:700;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;}
select,input,textarea{padding:5px 9px;border:1px solid var(--bd);border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--ink);}
.btn{padding:6px 13px;border-radius:5px;font-size:11px;font-weight:700;border:1px solid transparent;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:active{transform:translateY(1px);}
.btn-p{background:var(--pp);color:#fff;}.btn-p:hover{background:var(--pp-dk);}
.btn-s{background:#f6f8fa;color:var(--ink);border-color:var(--bd);}.btn-s:hover{background:#eef1f5;}
.btn-w{background:#f59e0b;color:#fff;}.btn-w:hover{background:#d97706;}
.btn-r{background:#dc2626;color:#fff;}.btn-r:hover{background:#b91c1c;}
.btn-sm{padding:3px 9px;font-size:10px;}
.body{flex:1;overflow-y:auto;padding:16px 24px 40px;}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:12px 14px;border-left:3px solid var(--c);}
.kpi .kv{font-size:24px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--c);}
.kpi .kl{font-size:10px;color:var(--sub);margin-top:4px;}
.panel{background:#fff;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.panel-h{padding:9px 14px;background:#f0fdf4;border-bottom:1px solid var(--bd);font-size:11px;font-weight:800;color:var(--pp);}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
thead th{background:#f0f3f7;padding:9px 9px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
tbody td{padding:8px 9px;border-bottom:1px solid #eef1f5;vertical-align:middle;}
tbody tr:hover td{background:#f0fdf4;}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.sev{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.sev1{background:#fee2e2;color:#991b1b;}.sev2{background:#ffedd5;color:#9a3412;}
.sev3{background:#fef3c7;color:#92400e;}.sev4{background:#e0f2fe;color:#075985;}
.stt{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;}
.stt .dot{width:6px;height:6px;border-radius:50%;}
.s-new{background:#fee2e2;color:#991b1b;}.s-new .dot{background:#dc2626;animation:bl .8s infinite;}
.s-prog{background:#dbeafe;color:#1e40af;}.s-prog .dot{background:#3b82f6;}
.s-done{background:#d1fae5;color:#065f46;}.s-done .dot{background:#10b981;}
.empty{padding:26px;text-align:center;color:#9ca3af;}
.ov{position:fixed;inset:0;background:rgba(3,20,14,.55);display:none;align-items:center;justify-content:center;z-index:100;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:10px;width:460px;max-width:94vw;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4);max-height:92vh;display:flex;flex-direction:column;}
.modal-h{background:linear-gradient(135deg,#03251a,#052e1f);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.modal-h .mt{font-size:14px;font-weight:800;flex:1;}
.modal-h .mx{cursor:pointer;font-size:18px;color:rgba(255,255,255,.6);}
.modal-b{padding:18px;overflow-y:auto;}
.ff{margin-bottom:11px;}
.ff label{display:block;font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;margin-bottom:4px;}
.ff label .req{color:#dc2626;}
.ff select,.ff input,.ff textarea{width:100%;}
.ff textarea{resize:vertical;min-height:54px;}
.ff2{display:flex;gap:9px;}.ff2>div{flex:1;}
.modal-f{padding:12px 18px;background:#f6f8fa;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #eef1f5;font-size:12px;gap:14px;}
.drow .dk{color:var(--sub);white-space:nowrap;}
.drow .dv{font-weight:700;text-align:right;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#fff;border-radius:8px;padding:11px 15px;box-shadow:0 8px 26px rgba(0,0,0,.22);border-left:4px solid var(--pp);font-size:12px;min-width:250px;max-width:380px;animation:ti .25s ease;}
.toast.err{border-left-color:#dc2626;}.toast.warn{border-left-color:#f59e0b;}.toast.info{border-left-color:#2563eb;}
.toast .tt{font-weight:800;margin-bottom:2px;}
.toast .tb{color:var(--sub);font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="scr-head">
  <div class="sh-id">MNT-02</div>
  <div class="sh-tt"><div class="sh-en">Failure Register</div><div class="sh-ko">고장 등록 — 설비 고장 접수·조치·완료 워크플로</div></div>
  <span class="sh-tag">/mnt/failure</span>
  <span class="sh-live"><span class="d"></span>LIVE DEMO</span>
</div>
<div class="toolbar">
  <div class="fld"><label>설비 Equipment</label>
    <select id="fEq" onchange="render()"><option value="">전체 All</option></select></div>
  <div class="fld"><label>상태 Status</label>
    <select id="fStat" onchange="render()"><option value="">전체</option><option value="new">접수</option><option value="prog">조치 중</option><option value="done">완료</option></select></div>
  <div class="fld"><label>심각도 Severity</label>
    <select id="fSev" onchange="render()"><option value="">전체</option><option value="1">긴급</option><option value="2">높음</option><option value="3">보통</option><option value="4">낮음</option></select></div>
  <button class="btn btn-s btn-sm" onclick="resetAll()">↺ 초기화</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-r" onclick="openNew()">＋ 고장 등록</button>
    <button class="btn btn-s" onclick="exportCsv()">📥 Export</button>
  </div>
</div>
<div class="body">
  <div class="kpis">
    <div class="kpi" style="--c:#dc2626"><div class="kv" id="kToday">0</div><div class="kl">금일 고장 · Today</div></div>
    <div class="kpi" style="--c:#ef4444"><div class="kv" id="kNew">0</div><div class="kl">미조치 · 접수 대기</div></div>
    <div class="kpi" style="--c:#3b82f6"><div class="kv" id="kProg">0</div><div class="kl">조치 중 · In Progress</div></div>
    <div class="kpi" style="--c:#10b981"><div class="kv" id="kDone">0</div><div class="kl">완료 · Resolved</div></div>
    <div class="kpi" style="--c:#6366f1"><div class="kv" id="kMttr">0</div><div class="kl">평균 수리시간 MTTR · 분</div></div>
  </div>
  <div class="panel">
    <div class="panel-h">🛠 고장 이력 — <span id="sub" style="font-weight:400;color:#656d76;">0건</span></div>
    <table>
      <thead><tr>
        <th>고장 번호</th><th>설비</th><th>발생 일시</th><th>증상</th>
        <th style="text-align:center;">심각도</th><th style="text-align:center;">상태</th>
        <th style="text-align:center;">수리(분)</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">조건에 맞는 고장 이력이 없습니다.</div>
  </div>
</div>

<!-- new failure modal -->
<div class="ov" id="ovNew">
  <div class="modal">
    <div class="modal-h"><span class="mt">🚨 신규 고장 등록</span><span class="mx" onclick="closeOv('ovNew')">✕</span></div>
    <div class="modal-b">
      <div class="ff"><label>고장 설비 <span class="req">*</span></label><select id="nEq"></select></div>
      <div class="ff2">
        <div class="ff"><label>발생 일시 <span class="req">*</span></label><input type="datetime-local" id="nWhen" value="2026-05-20T13:46"></div>
        <div class="ff"><label>심각도 <span class="req">*</span></label>
          <select id="nSev"><option value="1">긴급 — 라인 정지</option><option value="2">높음 — 생산 차질</option><option value="3" selected>보통</option><option value="4">낮음 — 경미</option></select></div>
      </div>
      <div class="ff"><label>고장 증상 <span class="req">*</span></label>
        <textarea id="nSym" placeholder="예: 구동 모터 과열로 자동 정지, 알람 E-204 발생"></textarea></div>
      <div class="ff"><label>접수자</label>
        <select id="nRep"><option>김성호</option><option>박주니어</option><option>한지원</option><option>서민재</option><option>생산반장</option></select></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovNew')">취소</button>
      <button class="btn btn-r" onclick="addFail()">＋ 고장 접수</button>
    </div>
  </div>
</div>
<!-- complete modal -->
<div class="ov" id="ovDone">
  <div class="modal">
    <div class="modal-h"><span class="mt">고장 조치 완료 처리</span><span class="mx" onclick="closeOv('ovDone')">✕</span></div>
    <div class="modal-b">
      <div id="dnInfo" style="margin-bottom:12px;"></div>
      <div class="ff"><label>고장 원인 <span class="req">*</span></label>
        <select id="dnCause"><option>부품 마모·노후</option><option>윤활 불량</option><option>과부하 운전</option><option>전기 계통 이상</option><option>오조작</option><option>기타</option></select></div>
      <div class="ff"><label>조치 내용 <span class="req">*</span></label>
        <textarea id="dnAction" placeholder="예: 구동모터 베어링 교체 후 시운전 정상 확인"></textarea></div>
      <div class="ff"><label>수리 완료 일시 <span class="req">*</span></label>
        <input type="datetime-local" id="dnEnd" value="2026-05-20T15:10"></div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeOv('ovDone')">취소</button>
      <button class="btn btn-p" onclick="confirmComplete()">✓ 완료 처리</button>
    </div>
  </div>
</div>
<!-- detail modal -->
<div class="ov" id="ovDt">
  <div class="modal">
    <div class="modal-h"><span class="mt">고장 상세</span><span class="mx" onclick="closeOv('ovDt')">✕</span></div>
    <div class="modal-b" id="dtBody"></div>
    <div class="modal-f"><button class="btn btn-p" onclick="closeOv('ovDt')">확인</button></div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
var EQLIST=[
 {id:'EQ-INJ-001',nm:'사출기 1호기'},{id:'EQ-INJ-002',nm:'사출기 2호기'},
 {id:'EQ-ASY-001',nm:'조립1라인 컨베이어'},{id:'EQ-ASY-002',nm:'토크 체결기 #1'},
 {id:'EQ-PNT-001',nm:'도장 부스 1라인'},{id:'EQ-INS-001',nm:'비전 검사기 #1'},
 {id:'EQ-UTL-001',nm:'공기압축기 #1'}
];
var SEV={'1':{ko:'긴급',cls:'sev1'},'2':{ko:'높음',cls:'sev2'},'3':{ko:'보통',cls:'sev3'},'4':{ko:'낮음',cls:'sev4'}};
var ST={new:{ko:'접수',cls:'s-new'},prog:{ko:'조치 중',cls:'s-prog'},done:{ko:'완료',cls:'s-done'}};
var FAIL=[
 {id:'FL-2605-018',eq:'EQ-INJ-002',when:'2026-05-20 13:46',rep:'생산반장',sev:'1',sym:'구동 모터 과열 자동정지 (알람 E-204)',
  st:'prog',cause:'',action:'',end:'',mttr:null},
 {id:'FL-2605-017',eq:'EQ-ASY-002',when:'2026-05-20 09:12',rep:'한지원',sev:'3',sym:'토크값 편차 발생, 캘리브레이션 필요',
  st:'new',cause:'',action:'',end:'',mttr:null},
 {id:'FL-2605-015',eq:'EQ-PNT-001',when:'2026-05-19 15:30',rep:'서민재',sev:'2',sym:'분사 노즐 막힘으로 도막 불균일',
  st:'done',cause:'부품 마모·노후',action:'노즐 3개 교체, 시운전 정상 확인',end:'2026-05-19 17:05',mttr:95},
 {id:'FL-2605-012',eq:'EQ-INJ-001',when:'2026-05-18 10:20',rep:'김성호',sev:'3',sym:'형개 시 이상 소음',
  st:'done',cause:'윤활 불량',action:'형개 실린더 급유 및 가이드 점검',end:'2026-05-18 11:10',mttr:50},
 {id:'FL-2605-009',eq:'EQ-UTL-001',when:'2026-05-16 08:05',rep:'정비반',sev:'2',sym:'압축기 토출 압력 저하',
  st:'done',cause:'부품 마모·노후',action:'밸브 플레이트 교체',end:'2026-05-16 10:40',mttr:155},
 {id:'FL-2605-006',eq:'EQ-INS-001',when:'2026-05-14 13:50',rep:'한지원',sev:'4',sym:'조명 LED 일부 점멸',
  st:'done',cause:'전기 계통 이상',action:'LED 바 교체',end:'2026-05-14 14:25',mttr:35}
];
var seq=19;
function nowStr(){var d=new Date();return d.toISOString().slice(0,16).replace('T',' ');}
function eqNm(id){var e=EQLIST.filter(function(x){return x.id===id;})[0];return e?e.nm:id;}
function fmtDT(s){return s.replace('T',' ');}
function diffMin(a,b){return Math.round((new Date(b)-new Date(a))/60000);}
function byId(id){return FAIL.filter(function(f){return f.id===id;})[0];}
function initSel(){
  var o='<option value="">전체 All</option>';
  EQLIST.forEach(function(e){o+='<option value="'+e.id+'">'+e.id+' '+e.nm+'</option>';});
  document.getElementById('fEq').innerHTML=o;
  document.getElementById('nEq').innerHTML=EQLIST.map(function(e){return '<option value="'+e.id+'">'+e.id+' '+e.nm+'</option>';}).join('');
}
function vis(){
  var fe=document.getElementById('fEq').value,fs=document.getElementById('fStat').value,fv=document.getElementById('fSev').value;
  return FAIL.filter(function(f){
    if(fe&&f.eq!==fe)return false;
    if(fs&&f.st!==fs)return false;
    if(fv&&f.sev!==fv)return false;
    return true;});
}
function render(){
  document.getElementById('kToday').textContent=FAIL.filter(function(f){return f.when.indexOf('2026-05-20')===0;}).length;
  document.getElementById('kNew').textContent=FAIL.filter(function(f){return f.st==='new';}).length;
  document.getElementById('kProg').textContent=FAIL.filter(function(f){return f.st==='prog';}).length;
  document.getElementById('kDone').textContent=FAIL.filter(function(f){return f.st==='done';}).length;
  var done=FAIL.filter(function(f){return f.mttr!=null;});
  document.getElementById('kMttr').textContent=done.length?Math.round(done.reduce(function(s,f){return s+f.mttr;},0)/done.length):0;
  var v=vis(),h='';
  v.forEach(function(f){
    h+='<tr><td class="mono" style="font-weight:700;cursor:pointer;" onclick="detail(\''+f.id+'\')">'+f.id+'</td>'+
      '<td><b>'+eqNm(f.eq)+'</b><div class="mono" style="color:#656d76;">'+f.eq+'</div></td>'+
      '<td class="mono">'+f.when+'</td>'+
      '<td style="max-width:240px;">'+f.sym+'</td>'+
      '<td style="text-align:center;"><span class="sev '+SEV[f.sev].cls+'">'+SEV[f.sev].ko+'</span></td>'+
      '<td style="text-align:center;"><span class="stt '+ST[f.st].cls+'"><span class="dot"></span>'+ST[f.st].ko+'</span></td>'+
      '<td style="text-align:center;font-family:JetBrains Mono,monospace;font-weight:700;">'+(f.mttr!=null?f.mttr:'—')+'</td>'+
      '<td>'+actionBtn(f)+'</td></tr>';
  });
  document.getElementById('tbody').innerHTML=h;
  document.getElementById('empty').style.display=v.length?'none':'block';
  document.getElementById('sub').textContent=v.length+'건';
}
function actionBtn(f){
  if(f.st==='new')return '<button class="btn btn-w btn-sm" onclick="startRepair(\''+f.id+'\')">▶ 조치 시작</button>';
  if(f.st==='prog')return '<button class="btn btn-p btn-sm" onclick="openDone(\''+f.id+'\')">✓ 완료 처리</button>';
  return '<button class="btn btn-s btn-sm" onclick="detail(\''+f.id+'\')">상세</button>';
}
function openNew(){
  document.getElementById('nSym').value='';document.getElementById('nWhen').value='2026-05-20T13:46';
  document.getElementById('nSev').value='3';openOv('ovNew');
}
function addFail(){
  var sym=document.getElementById('nSym').value.trim();
  if(!sym){toast('err','입력 오류','고장 증상은 필수 항목입니다.');return;}
  var when=document.getElementById('nWhen').value;
  if(!when){toast('err','입력 오류','발생 일시를 입력하세요.');return;}
  var id='FL-2605-'+('00'+seq++).slice(-3);
  FAIL.unshift({id:id,eq:document.getElementById('nEq').value,when:fmtDT(when),
    rep:document.getElementById('nRep').value,sev:document.getElementById('nSev').value,
    sym:sym,st:'new',cause:'',action:'',end:'',mttr:null});
  closeOv('ovNew');render();
  toast('warn','고장 접수 완료',id+' 「'+eqNm(document.getElementById('nEq').value)+'」 고장이 접수되었습니다.');
}
function startRepair(id){
  var f=byId(id);f.st='prog';f.repairStart=nowStr();render();
  toast('info',id+' 조치 시작','정비 담당자가 배정되어 조치가 진행 중입니다.');
}
var doneId=null;
function openDone(id){
  doneId=id;var f=byId(id);
  document.getElementById('dnInfo').innerHTML=
    '<div class="drow"><span class="dk">고장 번호</span><span class="dv">'+f.id+'</span></div>'+
    '<div class="drow"><span class="dk">설비</span><span class="dv">'+eqNm(f.eq)+'</span></div>'+
    '<div class="drow"><span class="dk">발생 일시</span><span class="dv">'+f.when+'</span></div>'+
    '<div class="drow"><span class="dk">증상</span><span class="dv" style="max-width:250px;">'+f.sym+'</span></div>';
  document.getElementById('dnAction').value='';
  openOv('ovDone');
}
function confirmComplete(){
  var f=byId(doneId);
  var action=document.getElementById('dnAction').value.trim();
  if(!action){toast('err','입력 오류','조치 내용은 필수 항목입니다.');return;}
  var end=document.getElementById('dnEnd').value;
  if(!end){toast('err','입력 오류','수리 완료 일시를 입력하세요.');return;}
  var m=diffMin(f.when.replace(' ','T'),end);
  if(m<=0){toast('err','시간 오류','완료 일시가 발생 일시보다 빠릅니다.');return;}
  f.st='done';f.cause=document.getElementById('dnCause').value;f.action=action;
  f.end=fmtDT(end);f.mttr=m;
  closeOv('ovDone');render();
  toast('',f.id+' 조치 완료','수리시간 '+m+'분으로 고장 조치가 완료되었습니다.');
}
function detail(id){
  var f=byId(id);
  var rows=[
    ['고장 번호',f.id],['설비',eqNm(f.eq)+' ('+f.eq+')'],['발생 일시',f.when],
    ['접수자',f.rep],['심각도','<span class="sev '+SEV[f.sev].cls+'">'+SEV[f.sev].ko+'</span>'],
    ['상태','<span class="stt '+ST[f.st].cls+'"><span class="dot"></span>'+ST[f.st].ko+'</span>'],
    ['증상',f.sym]
  ];
  if(f.cause)rows.push(['고장 원인',f.cause]);
  if(f.action)rows.push(['조치 내용',f.action]);
  if(f.end)rows.push(['완료 일시',f.end]);
  if(f.mttr!=null)rows.push(['수리 시간',f.mttr+'분']);
  document.getElementById('dtBody').innerHTML=rows.map(function(r){
    return '<div class="drow"><span class="dk">'+r[0]+'</span><span class="dv" style="max-width:280px;">'+r[1]+'</span></div>';}).join('');
  openOv('ovDt');
}
function exportCsv(){
  var v=vis();
  var csv='FailureID,Equipment,EquipName,Occurred,Reporter,Severity,Symptom,Status,Cause,Action,Completed,MTTR_min\n';
  v.forEach(function(f){
    csv+=[f.id,f.eq,eqNm(f.eq),f.when,f.rep,SEV[f.sev].ko,'"'+f.sym+'"',ST[f.st].ko,
      f.cause||'-','"'+(f.action||'')+'"',f.end||'-',f.mttr!=null?f.mttr:'-'].join(',')+'\n';});
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='MNT_Failure_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();a.remove();
  toast('','Export 완료','고장 이력 '+v.length+'건을 CSV로 내보냈습니다.');
}
function resetAll(){
  document.getElementById('fEq').value='';document.getElementById('fStat').value='';
  document.getElementById('fSev').value='';render();
  toast('info','초기화','고장 이력 필터를 초기화했습니다.');
}
function openOv(id){document.getElementById(id).classList.add('on');}
function closeOv(id){document.getElementById(id).classList.remove('on');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='err'?'⛔ ':type==='warn'?'⚠ ':type==='info'?'ℹ ':'✅ ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},4400);
}
initSel();render();
</script>
</body>
