<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PNT-05 Oven Monitor R2 · A-MES Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
:root{--sc:#ea580c;--sc-dk:#c2410c;}
html,body{height:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:radial-gradient(ellipse at 50% 30%,#1a1208,#0a0805);color:#e8e2d8;font-size:14px;display:flex;flex-direction:column;overflow:hidden;}
.head{flex-shrink:0;padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--sc);background:rgba(0,0,0,.3);}
.head .id{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:#fb923c;}
.head .tt{flex:1;}
.head .en{font-size:17px;font-weight:800;color:#fff;}
.head .ko{font-size:11px;color:#a8997f;}
.back{background:#1a1208;border:1px solid #3a2a14;color:#fdba74;font-size:13px;font-weight:700;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:inherit;}
.r-badge{background:linear-gradient(180deg,#f59e0b,#d97706);color:#fff;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:900;padding:6px 14px;border-radius:7px;letter-spacing:2px;}
.live{font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:5px 10px;border-radius:5px;background:#16a34a;color:#fff;display:flex;align-items:center;gap:5px;}
.live .d{width:7px;height:7px;border-radius:50%;background:#fff;animation:bl 1.4s infinite;}
@keyframes bl{50%{opacity:.3;}}
.body{flex:1;display:flex;flex-direction:column;padding:18px 24px;gap:14px;min-height:0;overflow-y:auto;}
.body::-webkit-scrollbar{width:8px;}.body::-webkit-scrollbar-thumb{background:#4a3618;border-radius:4px;}
.zones{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.zone{background:linear-gradient(160deg,rgba(245,158,11,.08),rgba(0,0,0,.3));border:1px solid #3a2a14;border-top:4px solid var(--c);border-radius:11px;padding:14px 16px;text-align:center;}
.zone .zn{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fdba74;}
.zone .nm{font-size:10px;color:#a8997f;font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
.zone .temp{font-family:'JetBrains Mono',monospace;font-size:46px;font-weight:900;color:var(--c);line-height:.95;margin:8px 0 3px;}
.zone .uom{font-size:11px;color:#a8997f;}
.zone .range{font-size:9px;color:#fdba74;margin-top:5px;font-family:'JetBrains Mono',monospace;}
.zone .gauge{height:10px;background:#1a1208;border-radius:5px;overflow:hidden;margin-top:8px;position:relative;}
.zone .gauge i{display:block;height:100%;background:var(--c);border-radius:5px;transition:width .4s;}
.zone .gauge .tgt{position:absolute;top:-2px;bottom:-2px;width:2px;background:#fff;opacity:.5;}
.zone.alarm{border-top-color:#dc2626;animation:zb 1s infinite;}
@keyframes zb{50%{background:linear-gradient(160deg,rgba(220,38,38,.15),rgba(0,0,0,.3));}}
.zone.alarm .temp{color:#fca5a5;}
.lots-in{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-radius:11px;padding:14px 18px;}
.lots-in h3{font-size:11px;color:#fdba74;text-transform:uppercase;letter-spacing:2px;margin-bottom:11px;font-weight:800;display:flex;align-items:center;gap:8px;}
.lots-in h3 .b{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(234,88,12,.18);color:#fb923c;padding:3px 8px;border-radius:5px;}
.lot-row{display:grid;grid-template-columns:auto 1fr 100px 130px 120px;gap:11px;align-items:center;padding:11px 0;border-bottom:1px dashed rgba(255,255,255,.07);}
.lot-row:last-child{border:none;}
.lot-row .sw{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,.1);}
.lot-row .info .lid{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:#fff;}
.lot-row .info .ds{font-size:11px;color:#fdba74;}
.lot-row .qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:800;color:#fbbf24;text-align:right;}
.lot-row .timer{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:900;color:#22c55e;text-align:center;}
.lot-row .timer.warn{color:#fbbf24;}
.lot-row .pbar{background:#1a1208;height:6px;border-radius:3px;overflow:hidden;}
.lot-row .pbar i{display:block;height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);}
.lot-row .pgi{font-size:9px;color:#a8997f;font-family:'JetBrains Mono',monospace;margin-top:3px;text-align:right;}
.chart-card{background:rgba(255,255,255,.04);border:1px solid #3a2a14;border-radius:11px;padding:14px 18px;}
.chart-card h3{font-size:11px;color:#fdba74;text-transform:uppercase;letter-spacing:2px;margin-bottom:11px;font-weight:800;}
.chart{display:flex;align-items:flex-end;gap:5px;height:110px;border-bottom:2px solid #3a2a14;padding:0 4px;position:relative;}
.tgt-line{position:absolute;left:4px;right:4px;border-top:1px dashed #dc2626;}
.tgt-l{position:absolute;right:4px;font-size:9px;color:#fca5a5;font-family:'JetBrains Mono',monospace;background:#1a1208;padding:0 4px;}
.cbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.cbar .b{width:80%;background:linear-gradient(180deg,#f59e0b,#d97706);border-radius:3px 3px 0 0;}
.cbar .bv{font-size:8px;font-family:'JetBrains Mono',monospace;color:#fbbf24;}
.cbar .bl{font-size:8px;color:#a8997f;font-family:'JetBrains Mono',monospace;}
.alert-bar{background:rgba(245,158,11,.12);border:1px solid #f59e0b;color:#fbbf24;border-radius:9px;padding:11px 14px;font-size:12px;display:none;align-items:center;gap:10px;}
.alert-bar.on{display:flex;}
.alert-bar.crit{background:rgba(220,38,38,.15);border-color:#dc2626;color:#fca5a5;}
.alert-bar .ic{font-size:22px;animation:bl 1s infinite;}
.toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1a1208;border-radius:10px;padding:13px 17px;border-left:5px solid var(--sc);font-size:13px;min-width:280px;max-width:400px;animation:ti .25s ease;color:#fff;box-shadow:0 8px 26px rgba(0,0,0,.5);}
.toast.warn{border-left-color:#f59e0b;}.toast.err{border-left-color:#dc2626;}.toast.ok{border-left-color:#16a34a;}
.toast .tt{font-weight:800;margin-bottom:3px;}
.toast .tb{color:#a8997f;font-size:11px;line-height:1.5;}
@keyframes ti{from{opacity:0;transform:translateX(40px);}}
</style>
</head>
<body>
<div class="head">
  <button class="back" onclick="back()">‹ 대시보드</button>
  <div class="id">PNT-05</div>
  <div class="tt"><div class="en">Oven Monitor</div><div class="ko">오븐 모니터 — 4-zone 온도 및 LOT 통과 시간 감시</div></div>
  <span class="r-badge">R2 OVEN</span>
  <span class="live"><span class="d"></span>LIVE</span>
</div>
<div class="body">
  <div class="zones" id="zones"></div>
  <div class="alert-bar" id="alertBar"><span class="ic">⚠</span><span id="alertTxt"></span></div>
  <div class="lots-in">
    <h3>🔥 오븐 통과 중 LOT <span class="b" id="cntInOven">3개</span></h3>
    <div id="lotsList"></div>
  </div>
  <div class="chart-card">
    <h3>📈 오븐 Zone 2 온도 추이 (최근 10분)</h3>
    <div class="chart" id="chart">
      <div class="tgt-line" style="bottom:75%;"></div>
      <div class="tgt-l" style="bottom:75%;">목표 120℃ ± 5</div>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>
<script>
var ZONES=[
 {n:'Zone 1',ds:'예열·Preheat',target:80,range:5,cur:81,c:'#22c55e'},
 {n:'Zone 2',ds:'경화·Curing',target:120,range:5,cur:118,c:'#f59e0b'},
 {n:'Zone 3',ds:'경화·Curing',target:135,range:5,cur:138,c:'#dc2626'},
 {n:'Zone 4',ds:'냉각·Cooling',target:45,range:5,cur:44,c:'#0891b2'}
];
var CMAP={'블랙':'#0A0A0A','그레이':'#8D948D','화이트':'#F4F4F4','레드':'#CC0605','블루':'#0E294B'};
var OLOTS=[
 {id:'LOT-2605-2105',item:'그릴 도장',color:'그레이',qty:32,enter:'08:42',totalSec:1200,elapsedSec:456},
 {id:'LOT-2605-2104',item:'프론트 범퍼',color:'블랙',qty:48,enter:'08:51',totalSec:1500,elapsedSec:780},
 {id:'LOT-2605-2103',item:'사이드 몰딩',color:'그레이',qty:54,enter:'09:02',totalSec:1100,elapsedSec:1060}
];
var TEMPHIST=[120,121,119,120,122,118,121,120,119,118];
function renderZones(){
  document.getElementById('zones').innerHTML=ZONES.map(function(z,i){
    var off=Math.abs(z.cur-z.target);
    var alarm=off>z.range;
    var pct=Math.min(100,Math.max(0,(z.cur/(z.target*1.5))*100));
    var col=alarm?'#dc2626':z.c;
    return '<div class="zone'+(alarm?' alarm':'')+'" style="--c:'+col+'">'+
      '<div class="zn">'+z.n+'</div>'+
      '<div class="nm">'+z.ds+'</div>'+
      '<div class="temp">'+z.cur.toFixed(1)+'</div>'+
      '<div class="uom">℃</div>'+
      '<div class="range">'+z.target+' ± '+z.range+'℃</div>'+
      '<div class="gauge"><i style="width:'+pct+'%"></i>'+
      '<span class="tgt" style="left:'+(z.target/(z.target*1.5)*100)+'%"></span></div></div>';
  }).join('');
  var alarms=ZONES.filter(function(z){return Math.abs(z.cur-z.target)>z.range;});
  var ab=document.getElementById('alertBar');
  if(alarms.length){ab.classList.add('on');ab.classList.add('crit');
    document.getElementById('alertTxt').textContent='⚠ Zone '+alarms.map(function(z){return z.n.slice(-1);}).join(', ')+' 온도 범위 이탈 — 즉시 점검 필요';}
  else{ab.classList.remove('on');}
}
function renderLots(){
  document.getElementById('lotsList').innerHTML=OLOTS.map(function(l){
    var pct=Math.min(100,Math.round(l.elapsedSec/l.totalSec*100));
    var rem=Math.max(0,l.totalSec-l.elapsedSec);
    var rm=Math.floor(rem/60),rs=rem%60;
    var warn=rem<300;
    return '<div class="lot-row"><div class="sw" style="background:'+(CMAP[l.color]||'#888')+'"></div>'+
      '<div class="info"><div class="lid">'+l.id+'</div><div class="ds">'+l.item+' · '+l.color+'</div></div>'+
      '<div class="qty">'+l.qty+' EA</div>'+
      '<div class="timer'+(warn?' warn':'')+'">'+String(rm).padStart(2,'0')+':'+String(rs).padStart(2,'0')+'<div style="font-size:8px;color:#a8997f;font-weight:400;letter-spacing:1px;margin-top:2px;">잔여 시간</div></div>'+
      '<div><div class="pbar"><i style="width:'+pct+'%"></i></div><div class="pgi">'+pct+'% · 입고 '+l.enter+'</div></div></div>';
  }).join('');
  document.getElementById('cntInOven').textContent=OLOTS.length+'개';
}
function renderChart(){
  var max=Math.max.apply(null,TEMPHIST),min=Math.min.apply(null,TEMPHIST);
  var bars=TEMPHIST.map(function(t,i){
    var h=20+((t-min)/(max-min+1))*80;
    return '<div class="cbar"><div class="bv">'+t+'</div><div class="b" style="height:'+h+'px;"></div><div class="bl">-'+(9-i)+'m</div></div>';
  }).join('');
  document.getElementById('chart').innerHTML=
    '<div class="tgt-line" style="bottom:75%;"></div><div class="tgt-l" style="bottom:75%;">목표 120℃ ± 5</div>'+bars;
}
function tick(){
  ZONES.forEach(function(z){z.cur+=(Math.random()-0.5)*2.5;});
  OLOTS.forEach(function(l){l.elapsedSec=Math.min(l.totalSec,l.elapsedSec+3);});
  /* drop completed */
  for(var i=OLOTS.length-1;i>=0;i--){
    if(OLOTS[i].elapsedSec>=OLOTS[i].totalSec){
      var nm=OLOTS[i].id;
      OLOTS.splice(i,1);
      toast('ok',nm+' 오븐 통과 완료 ✓','R3 언로딩 단계로 이송됩니다.');
    }
  }
  /* shift temp chart */
  TEMPHIST.shift();TEMPHIST.push(Math.round(ZONES[1].cur*10)/10);
  renderZones();renderLots();renderChart();
}
function back(){toast('','뒤로 이동','POP 대시보드로 돌아갑니다.');}
function toast(type,title,body){
  var d=document.createElement('div');d.className='toast'+(type?' '+type:'');
  d.innerHTML='<div class="tt">'+(type==='warn'?'⚠ ':type==='err'?'⛔ ':type==='ok'?'✓ ':'• ')+title+'</div><div class="tb">'+body+'</div>';
  document.getElementById('toasts').appendChild(d);
  setTimeout(function(){d.style.transition='opacity .3s';d.style.opacity='0';setTimeout(function(){d.remove();},300);},3500);
}
renderZones();renderLots();renderChart();
setInterval(tick,3000);
</script>
</body>
</html>
